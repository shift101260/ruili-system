<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>睿立業務系統 - 核心管理平台</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome 圖標 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cosmic: {
                            950: '#060b19', // 深邃基底
                            900: '#0a142c', // 左側導覽
                            800: '#112246', // 卡片區塊
                            700: '#1a3160', // 輸入框/邊框
                            600: '#234280', // 次要互動
                            500: '#315cb5', // 主色調亮藍
                            400: '#4c7cd4'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #060b19; color: #e2e8f0; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0a142c; }
        ::-webkit-scrollbar-thumb { background: #1a3160; border-radius: 3px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <!-- LEFT SIDEBAR -->
    <aside class="w-72 bg-cosmic-900 border-r border-cosmic-700/50 flex flex-col justify-between shrink-0 select-none">
        <div>
            <!-- LOGO 區域 -->
            <div class="p-6 border-b border-cosmic-700/30 flex items-center space-x-3">
                <div class="w-10 h-10 bg-gradient-to-tr from-cosmic-500 to-cyan-400 rounded-xl flex items-center justify-center shadow-lg shadow-cosmic-500/20">
                    <i class="fa-solid fa-chart-network text-white text-lg"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-wider text-white">睿立集團</h1>
                    <p class="text-xs text-slate-400">RUILI GROUP SYSTEM</p>
                </div>
            </div>

            <!-- 導覽功能列表 -->
            <nav class="p-4 space-y-1.5 overflow-y-auto max-h-[calc(100vh-160px)]">
                
                <!-- 1. 案件評估大項目 -->
                <div>
                    <button onclick="toggleCategory('case-eval')" id="btn-case-eval" class="w-full flex items-center justify-between px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-folder-open w-5 text-center text-cyan-400"></i>
                            <span class="font-medium text-sm tracking-wide">案件評估</span>
                        </div>
                        <i id="arrow-case-eval" class="fa-solid fa-chevron-down text-xs text-slate-500 transition-transform duration-200"></i>
                    </button>
                    <!-- 專屬案件評估的獨立動態子清單 -->
                    <div id="sub-list-case-eval" class="hidden pl-9 pr-2 mt-1 space-y-1 border-l border-cosmic-700/40 ml-6">
                        <!-- JS 動態插入 -->
                    </div>
                </div>

                <!-- 2. 工廠太陽能自建 -->
                <div>
                    <button onclick="toggleCategory('solar')" id="btn-solar" class="w-full flex items-center justify-between px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-solar-panel w-5 text-center text-amber-400"></i>
                            <span class="font-medium text-sm tracking-wide">工廠太陽能自建</span>
                        </div>
                        <i id="arrow-solar" class="fa-solid fa-chevron-down text-xs text-slate-500 transition-transform duration-200"></i>
                    </button>
                    <!-- 專屬工廠太陽能自建的獨立動態子清單 -->
                    <div id="sub-list-solar" class="hidden pl-9 pr-2 mt-1 space-y-1 border-l border-cosmic-700/40 ml-6">
                        <!-- JS 動態插入 -->
                    </div>
                </div>

                <!-- 3. 工廠買賣案件資料表 -->
                <button onclick="switchTab('trading')" id="btn-trading" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60 text-left">
                    <i class="fa-solid fa-building-circle-arrow-right w-5 text-center text-emerald-400"></i>
                    <span class="font-medium text-sm tracking-wide">工廠買賣案件資料表</span>
                </button>

                <!-- 4. 公司會議記錄 -->
                <button onclick="switchTab('internal-meet')" id="btn-internal-meet" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60 text-left">
                    <i class="fa-solid fa-comments w-5 text-center text-indigo-400"></i>
                    <span class="font-medium text-sm tracking-wide">公司會議記錄</span>
                </button>

                <!-- 5. 合作夥伴會議記錄 -->
                <button onclick="switchTab('partner-meet')" id="btn-partner-meet" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60 text-left">
                    <i class="fa-solid fa-handshake w-5 text-center text-purple-400"></i>
                    <span class="font-medium text-sm tracking-wide">合作夥伴會議記錄</span>
                </button>
            </nav>
        </div>

        <!-- 側邊欄下方個人資訊 -->
        <div class="p-4 border-t border-cosmic-700/30 bg-cosmic-950/40">
            <div class="flex items-center space-x-3">
                <div class="w-9 h-9 rounded-full bg-cosmic-700 flex items-center justify-center font-bold text-sm text-cyan-300 border border-cosmic-500/30">
                    經理
                </div>
                <div class="overflow-hidden">
                    <p class="text-xs text-slate-400">專案登入身分</p>
                    <p class="text-sm font-medium text-slate-200 truncate">系統管理員</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT CONTAINER -->
    <main class="flex-1 flex flex-col overflow-hidden bg-cosmic-950">
        
        <!-- TOP CONTROL BAR -->
        <header class="h-16 border-b border-cosmic-700/40 px-8 flex items-center justify-between shrink-0 bg-cosmic-900/40 backdrop-blur-md">
            <div class="flex items-center space-x-4">
                <div class="relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                    <input type="text" id="global-search" oninput="filterCases()" placeholder="檢索當前分類下的公司名稱..." class="w-80 bg-cosmic-950 border border-cosmic-700 rounded-xl pl-10 pr-4 py-1.5 text-sm focus:outline-none focus:border-cosmic-500 transition placeholder-slate-500">
                </div>
            </div>
            <div class="flex items-center space-x-3">
                <button onclick="addNewCase()" class="bg-gradient-to-r from-cosmic-500 to-blue-600 hover:from-cosmic-400 hover:to-blue-500 text-white text-xs font-semibold px-4 py-2 rounded-xl flex items-center space-x-1.5 shadow-lg shadow-cosmic-500/10 transition">
                    <i class="fa-solid fa-plus"></i>
                    <span>＋ 新增當前分類案件</span>
                </button>
                <button onclick="window.print()" class="bg-cosmic-800 hover:bg-cosmic-700 text-slate-300 text-xs font-semibold px-3.5 py-2 rounded-xl border border-cosmic-700/60 transition">
                    <i class="fa-solid fa-print mr-1"></i> 匯出/列印
                </button>
                <button onclick="saveToCloud()" class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-semibold px-4 py-2 rounded-xl transition flex items-center space-x-1.5 shadow-md">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <span>儲存同步</span>
                </button>
            </div>
        </header>

        <!-- ROUTING TABS VIEWPORT -->
        <div class="flex-1 overflow-y-auto p-8">
            
            <!-- TAB 1: 案件評估 -->
            <section id="tab-case-eval" class="tab-content active space-y-6">
                <div>
                    <h2 class="text-2xl font-bold text-white tracking-wide">案件評估管理層</h2>
                    <p class="text-xs text-slate-400 mt-1">即時維護與評估工廠基礎資料、地籍與法規合法化指標</p>
                </div>
                <div id="cases-loop-container" class="space-y-8"></div>
            </section>

            <!-- TAB 2: 工廠太陽能自建 -->
            <section id="tab-solar" class="tab-content space-y-6">
                <div>
                    <h2 class="text-2xl font-bold text-amber-400 tracking-wide">工廠太陽能自建工程模組</h2>
                    <p class="text-xs text-slate-400 mt-1">專注於光電容量、綠電躉購、馬力容量與碳資產效益評估</p>
                </div>
                <div id="solar-loop-container" class="space-y-8"></div>
            </section>

            <!-- TAB 3: 工廠買賣案件資料表 -->
            <section id="tab-trading" class="tab-content space-y-6">
                <div class="bg-cosmic-800/40 border border-cosmic-700/40 rounded-2xl p-8 text-center py-20">
                    <div class="w-16 h-16 bg-emerald-500/10 text-emerald-400 rounded-full flex items-center justify-center mx-auto text-2xl mb-4">
                        <i class="fa-solid fa-building-circle-arrow-right"></i>
                    </div>
                    <h3 class="text-xl font-bold text-white">工廠買賣案件資料表</h3>
                    <p class="text-slate-400 text-sm max-w-md mx-auto mt-2">特定工廠與丁建土地流轉平台。</p>
                </div>
            </section>

            <!-- TAB 4: 公司會議記錄 -->
            <section id="tab-internal-meet" class="tab-content space-y-6">
                <div class="bg-cosmic-800/40 border border-cosmic-700/40 rounded-2xl p-8 text-center py-20">
                    <div class="w-16 h-16 bg-indigo-500/10 text-indigo-400 rounded-full flex items-center justify-center mx-auto text-2xl mb-4">
                        <i class="fa-solid fa-comments"></i>
                    </div>
                    <h3 class="text-xl font-bold text-white">公司內部會議記錄</h3>
                    <p class="text-slate-400 text-sm max-w-md mx-auto mt-2">跨部門政策與改善進度追蹤紀錄。</p>
                </div>
            </section>

            <!-- TAB 5: 合作夥伴會議記錄 -->
            <section id="tab-partner-meet" class="tab-content space-y-6">
                <div class="bg-cosmic-800/40 border border-cosmic-700/40 rounded-2xl p-8 text-center py-20">
                    <div class="w-16 h-16 bg-purple-500/10 text-purple-400 rounded-full flex items-center justify-center mx-auto text-2xl mb-4">
                        <i class="fa-solid fa-handshake"></i>
                    </div>
                    <h3 class="text-xl font-bold text-white">合作夥伴會議記錄</h3>
                    <p class="text-slate-400 text-sm max-w-md mx-auto mt-2">聯席會議決議與外部技師配合備忘錄。</p>
                </div>
            </section>

        </div>
    </main>

    <script>
        // 【核心修正：完全拆分為獨立的動態資料儲存陣列】
        let caseEvalData = [
            {
                id: "eval-1",
                companyName: "大鼎精密工業（法規評估案）",
                date: "2026-07-18T10:00",
                status: "初期評估",
                manager: "樊靖畇",
                address: "高雄市岡山區本工路88號",
                remark: "法規合法化案件流程控管",
                avgElectricBill: "185000",
                contractCapacity: "120"
            },
            {
                id: "eval-2",
                companyName: "旭東橡膠製品廠（用地變更案）",
                date: "2026-07-18T14:30",
                status: "準備簽約",
                manager: "鄭家承",
                address: "高雄市路竹區環球路12號",
                remark: "特定工廠改善計畫審查中",
                avgElectricBill: "320000",
                contractCapacity: "250"
            }
        ];

        let solarData = [
            {
                id: "solar-1",
                companyName: "國泰鋼鐵頂樓（光電自建案）",
                date: "2026-07-18T11:00",
                status: "已報價",
                manager: "陳宥騰",
                address: "高雄市小港區中鋼路1號",
                remark: "預計建置容量 400kWp，評估饋線中",
                avgElectricBill: "950000",
                contractCapacity: "500"
            }
        ];

        // 追蹤當前選定的資料 ID
        let currentEvalSelectedId = "eval-1";
        let currentSolarSelectedId = "solar-1";
        let currentActiveTab = "case-eval";

        const managersList = ["樊靖畇", "鄭家承", "陳宥騰", "楊裕憲", "黃逸豪", "李宜璇", "王瑋聆", "許先生"];
        const statusConfig = {
            "初期評估": "bg-emerald-600 text-white",
            "已報價": "bg-blue-600 text-white",
            "準備簽約": "bg-amber-500 text-slate-900",
            "已簽約": "bg-red-600 text-white",
            "結案": "bg-purple-600 text-white",
            "沒下文": "bg-slate-700 text-white"
        };

        // 折疊控制與選單刷新
        function toggleCategory(catId) {
            const subList = document.getElementById(`sub-list-${catId}`);
            const arrow = document.getElementById(`arrow-${catId}`);
            const isHidden = subList.classList.contains('hidden');

            document.getElementById('sub-list-case-eval').classList.add('hidden');
            document.getElementById('sub-list-solar').classList.add('hidden');
            document.getElementById('arrow-case-eval').classList.remove('rotate-180');
            document.getElementById('arrow-solar').classList.remove('rotate-180');

            if (isHidden) {
                subList.classList.remove('hidden');
                arrow.classList.add('rotate-180');
            }
            switchTab(catId);
        }

        // 渲染獨立的側邊欄項目
        function renderSidebarSubLists() {
            // 渲染案件評估清單
            const evalContainer = document.getElementById('sub-list-case-eval');
            evalContainer.innerHTML = caseEvalData.map(c => `
                <button onclick="selectSpecificCase('${c.id}', 'case-eval')" class="w-full text-left py-1.5 px-3 rounded-lg text-xs truncate transition ${currentEvalSelectedId === c.id && currentActiveTab === 'case-eval' ? 'bg-cosmic-500 text-white font-semibold shadow-md' : 'text-slate-400 hover:text-slate-200 hover:bg-cosmic-800/40'}">
                    <i class="fa-solid fa-folder mr-2 text-cyan-400 opacity-80"></i>${c.companyName}
                </button>
            `).join('');

            // 渲染太陽能自建清單 (完全與評估案分開)
            const solarContainer = document.getElementById('sub-list-solar');
            solarContainer.innerHTML = solarData.map(c => `
                <button onclick="selectSpecificCase('${c.id}', 'solar')" class="w-full text-left py-1.5 px-3 rounded-lg text-xs truncate transition ${currentSolarSelectedId === c.id && currentActiveTab === 'solar' ? 'bg-amber-600 text-white font-semibold shadow-md' : 'text-slate-400 hover:text-slate-200 hover:bg-cosmic-800/40'}">
                    <i class="fa-solid fa-sun mr-2 text-amber-400 opacity-80"></i>${c.companyName}
                </button>
            `).join('');
        }

        function selectSpecificCase(id, tabId) {
            if (tabId === 'case-eval') currentEvalSelectedId = id;
            if (tabId === 'solar') currentSolarSelectedId = id;
            
            document.getElementById(`sub-list-${tabId}`).classList.remove('hidden');
            document.getElementById(`arrow-${tabId}`).classList.add('rotate-180');
            switchTab(tabId);
        }

        function switchTab(tabId) {
            currentActiveTab = tabId;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            
            document.querySelectorAll('nav button[id^="btn-"]').forEach(el => {
                el.classList.remove('bg-cosmic-800', 'text-white');
            });
            const activeBtn = document.getElementById(`btn-${tabId}`);
            if(activeBtn) activeBtn.classList.add('bg-cosmic-800', 'text-white');

            renderSidebarSubLists();
            renderMainForms();
        }

        function renderMainForms() {
            if (currentActiveTab === 'case-eval') {
                const activeCase = caseEvalData.find(c => c.id === currentEvalSelectedId) || caseEvalData[0];
                document.getElementById("cases-loop-container").innerHTML = activeCase ? generateFormHTML(activeCase, 'eval') : `<div class="text-slate-500 text-sm">請先點擊左側新增公司案件</div>`;
            }
            if (currentActiveTab === 'solar') {
                const activeCase = solarData.find(c => c.id === currentSolarSelectedId) || solarData[0];
                document.getElementById("solar-loop-container").innerHTML = activeCase ? generateFormHTML(activeCase, 'solar') : `<div class="text-slate-500 text-sm">請先點擊左側新增太陽能案件</div>`;
            }
        }

        function generateFormHTML(c, mode) {
            const isSolarMode = mode === 'solar';
            return `
                <div class="bg-cosmic-800/70 border ${isSolarMode ? 'border-amber-500/40':'border-cosmic-700/50'} rounded-2xl shadow-xl overflow-hidden backdrop-blur-sm">
                    <div class="bg-cosmic-900/60 px-6 py-4 border-b border-cosmic-700/50 flex flex-wrap items-center justify-between gap-4">
                        <div class="flex items-center space-x-4">
                            <div>
                                <label class="block text-[11px] text-slate-400 mb-1">日期 / 時間</label>
                                <input type="datetime-local" value="${c.date}" onchange="updateField('${c.id}', 'date', this.value)" class="bg-cosmic-950 border border-cosmic-700 rounded-lg px-2.5 py-1 text-xs text-slate-200">
                            </div>
                            <div>
                                <label class="block text-[11px] text-slate-400 mb-1">案件狀態</label>
                                <select onchange="updateField('${c.id}', 'status', this.value); renderMainForms();" class="bg-cosmic-950 border border-cosmic-700 rounded-lg px-2.5 py-1 text-xs font-semibold ${statusConfig[c.status] || 'bg-slate-700'}">
                                    ${Object.keys(statusConfig).map(st => `<option value="${st}" ${c.status === st ? 'selected':''}>${st}</option>`).join('')}
                                </select>
                            </div>
                            <div>
                                <label class="block text-[11px] text-slate-400 mb-1">經理人</label>
                                <select onchange="updateField('${c.id}', 'manager', this.value)" class="bg-cosmic-950 border border-cosmic-700 rounded-lg px-2.5 py-1 text-xs text-slate-200">
                                    ${managersList.map(m => `<option value="${m}" ${c.manager === m ? 'selected':''}>${m}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                        <button onclick="deleteCase('${c.id}')" class="text-xs bg-red-950/40 hover:bg-red-900/60 text-red-400 border border-red-900/50 px-3 py-1.5 rounded-xl transition">
                            <i class="fa-solid fa-trash-can mr-1"></i> 刪除此案
                        </button>
                    </div>

                    <div class="p-6 space-y-6">
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div class="lg:col-span-2 bg-cosmic-950/40 border border-cosmic-700/30 p-4 rounded-xl space-y-3">
                                <h4 class="text-xs font-bold ${isSolarMode?'text-amber-400':'text-cyan-400'} tracking-wide border-b border-cosmic-700/30 pb-1.5">
                                    <i class="fa-solid fa-industry mr-1.5"></i>${isSolarMode ? '二、太陽能自建資料表':'二、工廠基本資料層'}
                                </h4>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                                    <div>
                                        <label class="text-[11px] text-slate-400">公司/廠房名稱</label>
                                        <input type="text" value="${c.companyName}" oninput="updateField('${c.id}', 'companyName', this.value); renderSidebarSubLists();" class="w-full bg-cosmic-900 border border-cosmic-700 rounded-lg px-2.5 py-1.5 text-xs text-white focus:outline-none focus:border-cosmic-500">
                                    </div>
                                    <div>
                                        <label class="text-[11px] text-slate-400">廠區地址</label>
                                        <input type="text" value="${c.address}" oninput="updateField('${c.id}', 'address', this.value)" class="w-full bg-cosmic-900 border border-cosmic-700 rounded-lg px-2.5 py-1.5 text-xs text-white">
                                    </div>
                                </div>
                            </div>
                            <div class="bg-cosmic-950/40 border border-cosmic-700/30 p-4 rounded-xl flex flex-col justify-between">
                                <div>
                                    <h4 class="text-xs font-bold text-slate-300 border-b border-cosmic-700/30 pb-1.5 mb-2">業務即時備註</h4>
                                    <textarea oninput="updateField('${c.id}', 'remark', this.value)" class="w-full bg-cosmic-900 border border-cosmic-700 rounded-lg px-2.5 py-1.5 text-xs text-white h-16 resize-none focus:outline-none">${c.remark}</textarea>
                                </div>
                            </div>
                        </div>

                        <!-- 數據與電費評估層 -->
                        <div class="bg-cosmic-950/40 border border-cosmic-700/30 p-4 rounded-xl">
                            <h4 class="text-xs font-bold text-teal-400 tracking-wide border-b border-cosmic-700/30 pb-1.5 mb-3"><i class="fa-solid fa-bolt mr-1.5"></i>核心數據指標分析</h4>
                            <div class="grid grid-cols-2 md:grid-cols-3 gap-3 text-xs">
                                <div class="bg-cosmic-900/60 p-2.5 rounded-lg border border-cosmic-700/30">
                                    <div class="text-slate-400 text-[11px]">每月平均電費</div>
                                    <input type="number" value="${c.avgElectricBill}" oninput="updateField('${c.id}', 'avgElectricBill', this.value); renderMainForms();" class="bg-transparent border-b border-cosmic-700 text-white font-bold text-sm w-full mt-1 focus:outline-none focus:border-cosmic-500">
                                </div>
                                <div class="bg-cosmic-900/60 p-2.5 rounded-lg border border-cosmic-700/30">
                                    <div class="text-slate-400 text-[11px]">契約容量 (kW)</div>
                                    <input type="number" value="${c.contractCapacity}" oninput="updateField('${c.id}', 'contractCapacity', this.value); renderMainForms();" class="bg-transparent border-b border-cosmic-700 text-amber-400 font-bold text-sm w-full mt-1 focus:outline-none focus:border-cosmic-500">
                                </div>
                                <div class="bg-cosmic-900/60 p-2.5 rounded-lg border border-cosmic-700/30 flex flex-col justify-center">
                                    <div class="text-slate-400 text-[11px]">分類群組歸屬</div>
                                    <div class="text-sm font-bold ${isSolarMode?'text-amber-400':'text-cyan-400'} mt-1">${isSolarMode?'太陽能自建模組':'特定工廠評估模組'}</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 頁尾標準元件 -->
                    <footer class="bg-cosmic-950 px-6 py-3 border-t border-cosmic-700/40 text-[11px] text-slate-500 flex justify-between items-center">
                        <div><strong>睿立資產管理顧問有限公司</strong></div>
                        <div class="text-amber-500/80">⚠️ 備註說明：此文件報價及建議有效期限一個月</div>
                    </footer>
                </div>
            `;
        }

        // 修改更新映射 (依據前綴判斷更新哪一個陣列)
        function updateField(id, field, value) {
            if (id.startsWith('eval-')) {
                let target = caseEvalData.find(c => c.id === id);
                if(target) target[field] = value;
            } else {
                let target = solarData.find(c => c.id === id);
                if(target) target[field] = value;
            }
        }

        // 【核心修正：依據當前打開的頁籤，將新案件精準新增到對應的陣列中】
        function addNewCase() {
            const timestamp = Date.now();
            if (currentActiveTab === 'case-eval') {
                const newId = "eval-" + timestamp;
                caseEvalData.unshift({
                    id: newId,
                    companyName: "新案件評估案 " + (caseEvalData.length + 1),
                    date: new Date().toISOString().slice(0, 16),
                    status: "初期評估", manager: "樊靖畇", address: "", remark: "", avgElectricBill: "0", contractCapacity: "0"
                });
                currentEvalSelectedId = newId;
            } else if (currentActiveTab === 'solar') {
                const newId = "solar-" + timestamp;
                solarData.unshift({
                    id: newId,
                    companyName: "新太陽能自建案 " + (solarData.length + 1),
                    date: new Date().toISOString().slice(0, 16),
                    status: "初期評估", manager: "樊靖畇", address: "", remark: "", avgElectricBill: "0", contractCapacity: "0"
                });
                currentSolarSelectedId = newId;
            } else {
                alert("請先切換至「案件評估」或「工廠太陽能自建」再執行新增。");
                return;
            }

            // 強制打開當前大分類的下拉子選單
            document.getElementById(`sub-list-${currentActiveTab}`).classList.remove('hidden');
            renderSidebarSubLists();
            renderMainForms();
        }

        // 刪除案件
        function deleteCase(id) {
            if (confirm("確定要刪除這筆儲存資料嗎？")) {
                if (id.startsWith('eval-')) {
                    caseEvalData = caseEvalData.filter(c => c.id !== id);
                    if(caseEvalData.length > 0) currentEvalSelectedId = caseEvalData[0].id;
                } else {
                    solarData = solarData.filter(c => c.id !== id);
                    if(solarData.length > 0) currentSolarSelectedId = solarData[0].id;
                }
                renderSidebarSubLists();
                renderMainForms();
            }
        }

        // 當前頁籤內的關鍵字篩選
        function filterCases() {
            const query = document.getElementById("global-search").value.toLowerCase().trim();
            if (currentActiveTab === 'case-eval') {
                const filtered = caseEvalData.filter(c => c.companyName.toLowerCase().includes(query));
                document.getElementById('sub-list-case-eval').innerHTML = filtered.map(c => `
                    <button onclick="selectSpecificCase('${c.id}', 'case-eval')" class="w-full text-left py-1.5 px-3 rounded-lg text-xs truncate ${currentEvalSelectedId === c.id ? 'bg-cosmic-500 text-white' : 'text-slate-400'}">
                        <i class="fa-solid fa-folder mr-2 text-cyan-400"></i>${c.companyName}
                    </button>
                `).join('');
            } else if (currentActiveTab === 'solar') {
                const filtered = solarData.filter(c => c.companyName.toLowerCase().includes(query));
                document.getElementById('sub-list-solar').innerHTML = filtered.map(c => `
                    <button onclick="selectSpecificCase('${c.id}', 'solar')" class="w-full text-left py-1.5 px-3 rounded-lg text-xs truncate ${currentSolarSelectedId === c.id ? 'bg-amber-600 text-white' : 'text-slate-400'}">
                        <i class="fa-solid fa-sun mr-2 text-amber-400"></i>${c.companyName}
                    </button>
                `).join('');
            }
        }

        function saveToCloud() {
            alert(`【儲存成功】\n已成功同步區分：\n- 案件評估：${caseEvalData.length} 筆資料\n- 太陽能自建：${solarData.length} 筆資料`);
        }

        window.onload = function() {
            toggleCategory('case-eval'); 
        };
    </script>
</body>
</html>
