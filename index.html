<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>睿立業務系統 - H完美修正版</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome 圖標 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cosmic: {
                            950: '#060b19', // 深邃基底
                            900: '#0a142c', // 左側導覽
                            800: '#112246', // 卡片區塊
                            700: '#1a3160', // 輸入框/邊框
                            600: '#234280', // 互動層
                            500: '#315cb5', // 主色調亮藍
                            400: '#4c7cd4'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #060b19; color: #e2e8f0; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0a142c; }
        ::-webkit-scrollbar-thumb { background: #1a3160; border-radius: 3px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <!-- LEFT SIDEBAR (UI - 左側導覽列組件) -->
    <aside class="w-72 bg-cosmic-900 border-r border-cosmic-700/50 flex flex-col justify-between shrink-0 select-none">
        <div>
            <!-- LOGO 區域 -->
            <div class="p-6 border-b border-cosmic-700/30 flex items-center space-x-3">
                <div class="w-10 h-10 bg-gradient-to-tr from-cosmic-500 to-cyan-400 rounded-xl flex items-center justify-center shadow-lg shadow-cosmic-500/20">
                    <i class="fa-solid fa-chart-network text-white text-lg"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-wider text-white">睿立集團</h1>
                    <p class="text-xs text-slate-400">RUILI SYSTEM H2</p>
                </div>
            </div>

            <!-- 導覽大功能按鈕 -->
            <nav class="p-4 space-y-1.5 overflow-y-auto max-h-[calc(100vh-180px)]">
                <!-- 一、[案件評估] 按鈕 -->
                <div>
                    <button onclick="toggleCategory('case-eval')" id="btn-case-eval" class="w-full flex items-center justify-between px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-folder-open w-5 text-center text-cyan-400"></i>
                            <span class="font-medium text-sm tracking-wide">案件評估</span>
                        </div>
                        <i id="arrow-case-eval" class="fa-solid fa-chevron-down text-xs text-slate-500 transition-transform duration-200"></i>
                    </button>
                    <div id="sub-list-case-eval" class="hidden pl-9 pr-2 mt-1 space-y-1 border-l border-cosmic-700/40 ml-6"></div>
                </div>

                <!-- 二、[太陽能自建] 按鈕 -->
                <div>
                    <button onclick="toggleCategory('solar')" id="btn-solar" class="w-full flex items-center justify-between px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-solar-panel w-5 text-center text-amber-400"></i>
                            <span class="font-medium text-sm tracking-wide">太陽能自建</span>
                        </div>
                        <i id="arrow-solar" class="fa-solid fa-chevron-down text-xs text-slate-500 transition-transform duration-200"></i>
                    </button>
                    <div id="sub-list-solar" class="hidden pl-9 pr-2 mt-1 space-y-1 border-l border-cosmic-700/40 ml-6"></div>
                </div>

                <!-- 三、[工廠買賣案件資料表] 按鈕 -->
                <div>
                    <button onclick="toggleCategory('trading')" id="btn-trading" class="w-full flex items-center justify-between px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-building-circle-arrow-right w-5 text-center text-emerald-400"></i>
                            <span class="font-medium text-sm tracking-wide">工廠買賣案件資料表</span>
                        </div>
                        <i id="arrow-trading" class="fa-solid fa-chevron-down text-xs text-slate-500 transition-transform duration-200"></i>
                    </button>
                    <div id="sub-list-trading" class="hidden pl-9 pr-2 mt-1 space-y-1 border-l border-cosmic-700/40 ml-6"></div>
                </div>

                <!-- 四、[會議記錄] 按鈕 (外部主題) -->
                <div>
                    <button onclick="toggleCategory('meeting')" id="btn-meeting" class="w-full flex items-center justify-between px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-handshake w-5 text-center text-purple-400"></i>
                            <span class="font-medium text-sm tracking-wide">會議記錄</span>
                        </div>
                        <i id="arrow-meeting" class="fa-solid fa-chevron-down text-xs text-slate-500 transition-transform duration-200"></i>
                    </button>
                    <div id="sub-list-meeting" class="hidden pl-9 pr-2 mt-1 space-y-1 border-l border-cosmic-700/40 ml-6"></div>
                </div>

                <!-- 五、[公司會議記錄] 按鈕 (內部與會) -->
                <div>
                    <button onclick="toggleCategory('internal-meet')" id="btn-internal-meet" class="w-full flex items-center justify-between px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-comments w-5 text-center text-indigo-400"></i>
                            <span class="font-medium text-sm tracking-wide">公司會議記錄</span>
                        </div>
                        <i id="arrow-internal-meet" class="fa-solid fa-chevron-down text-xs text-slate-500 transition-transform duration-200"></i>
                    </button>
                    <div id="sub-list-internal-meet" class="hidden pl-9 pr-2 mt-1 space-y-1 border-l border-cosmic-700/40 ml-6"></div>
                </div>
            </nav>
        </div>
        <div class="p-4 border-t border-cosmic-700/30 bg-cosmic-950/40">
            <div class="flex items-center space-x-3">
                <div class="w-9 h-9 rounded-full bg-cosmic-700 flex items-center justify-center font-bold text-xs text-cyan-300">H版</div>
                <div><p class="text-xs text-slate-400">核心管理層</p><p class="text-sm font-medium text-slate-200">核心控制台</p></div>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT CONTAINER -->
    <main class="flex-1 flex flex-col overflow-hidden bg-cosmic-950">
        <!-- TOP CONTROL BAR -->
        <header class="h-16 border-b border-cosmic-700/40 px-8 flex items-center justify-between shrink-0 bg-cosmic-900/40 backdrop-blur-md">
            <div>
                <input type="text" id="global-search" oninput="filterCases()" placeholder="按關鍵字即時篩選名單..." class="w-80 bg-cosmic-950 border border-cosmic-700 rounded-xl px-4 py-1.5 text-sm text-white focus:outline-none">
            </div>
            <div class="flex items-center space-x-3">
                <button onclick="addNewCase()" class="bg-gradient-to-r from-cosmic-500 to-blue-600 text-white text-xs font-semibold px-4 py-2 rounded-xl flex items-center space-x-1.5 shadow-md">
                    <i class="fa-solid fa-plus"></i><span>[＋ 新增公司案件]</span>
                </button>
                <button onclick="window.print()" class="bg-cosmic-800 text-slate-300 text-xs font-semibold px-3.5 py-2 rounded-xl border border-cosmic-700/60">
                    <i class="fa-solid fa-print"></i> [匯出/列印]
                </button>
                <button onclick="saveToCloud()" class="bg-emerald-600 text-white text-xs font-semibold px-4 py-2 rounded-xl shadow-md">
                    <i class="fa-solid fa-cloud-arrow-up mr-1"></i>儲存按鍵
                </button>
            </div>
        </header>

        <!-- ROUTING VIEWPORT -->
        <div class="flex-1 overflow-y-auto p-8">
            <section id="tab-case-eval" class="tab-content active"><div id="case-eval-container" class="space-y-6"></div></section>
            <section id="tab-solar" class="tab-content"><div id="solar-container" class="space-y-6"></div></section>
            <section id="tab-trading" class="tab-content"><div id="trading-container" class="space-y-6"></div></section>
            <section id="tab-meeting" class="tab-content"><div id="meeting-container" class="space-y-6"></div></section>
            <section id="tab-internal-meet" class="tab-content"><div id="internal-meet-container" class="space-y-6"></div></section>
        </div>
    </main>

    <script>
        // 狀態管理層 (Global State) - 五軌獨立陣列，完整對齊 Excel 新欄位
        let caseEvalData = [
            {
                id: "eval-1", date: "2026-07-18T16:00", status: "初期評估", manager: "樊靖畇", remark: "急需變更審查。", source: "公會引介",
                companyName: "大鼎精密工業股份有限公司", taxId: "83746291", factoryLicense: "64009876", industryType: "金屬製品製造業", contact: "王大鼎", phone: "0912-345678", email: "tading@precision.com", address: "高雄市岡山區本工路88號",
                services: [{ name: "特定工廠轉型諮詢", desc: "改善計畫編製", result: "可行", quote: "350000" }],
                lands: [{ section: "岡山段", number: "105-02", sqm: "1500", ping: "453" }], landTotalSqm: "1500", landTotalPing: "453", landPattern: "都市計畫外使用地類別", landRemark: "",
                buildings: [{ number: "402", sqm: "800", ping: "242" }], buildYear: "2005", legalBuildPing: "242", illegalBuildPing: "120", buildRemark: "",
                electricBill: "185000", horsepower: "150", contractCapacity: "120", isHighVoltage: "否", isTimeRate: "是", timePeriod: "白天為主", electricRemark: "",
                esgHasSuccessor: "是", esgIsExport: "是", esgEuCarbon: "是", esgGreenCert: "評估中", esgStorage: "否", esgRemark: "",
                customDocsClient: ["電費單", "使用執照"], customDocsRuili: ["土地謄本", "地籍圖"], clientFiles: [], ruiliFiles: []
            }
        ];

        let solarData = [
            {
                id: "solar-1", date: "2026-07-18T16:30", status: "已報價", manager: "陳宥騰", remark: "高壓鋼鐵廠房屋頂自建案效益優良。", source: "綠能組",
                companyName: "國泰鋼鐵工業廠房", taxId: "12457896", factoryLicense: "64002233", industryType: "鋼鐵業", contact: "陳廠長", phone: "0988-555666", email: "ct@steel.com", address: "小港區中鋼路1號",
                services: [], lands: [], buildings: [],
                electricBill: "950000", horsepower: "600", contractCapacity: "450", isHighVoltage: "是", isTimeRate: "是", timePeriod: "白天為主", electricRemark: "",
                esgHasSuccessor: "是", esgIsExport: "是", esgEuCarbon: "是", esgGreenCert: "是", esgStorage: "是", esgRemark: "",
                customDocsClient: ["電費單", "屋頂現況照片（多角度）"], customDocsRuili: ["土地謄本", "地籍圖"], clientFiles: [], ruiliFiles: [],
                calcPing: "600", calcPricePerUnit: "3.5", calcNearbyPing: "500", calcNearbyPrice: "400",
                warRoomRate: true, warRoomCarbon: true, warRoomMonitor: false, warRoomSafety: true, warRoomCustom: [],
                roofType: "鋼構鐵皮屋", roofAge: "10", roofLeak: "否", hasChemical: "否", nearbyChemical: "否", isNearSea: "是", nearSeaDist: "1-5公里", shadowStatus: "否",
                roofAir: true, roofExhaust: true, roofWater: false, roofPipe: false,
                hasStructReport: "是", acceptStructTest: "是", hasStructReinforce: "否", reinforceYear: "", roofTechRemark: ""
            }
        ];

        let tradingData = [{ id: "trading-1", date: "2026-07-18T12:00", status: "準備簽約", manager: "鄭家承", companyName: "瑞昱地產買賣工業地案", taxId: "", services: [], lands: [], buildings: [], electricBill: "0", horsepower: "0", contractCapacity: "0", isHighVoltage: "否", isTimeRate: "否", timePeriod: "白天為主", esgHasSuccessor: "否", esgIsExport: "是", esgEuCarbon: "否", esgGreenCert: "否", esgStorage: "否", customDocsClient: [], customDocsRuili: [], clientFiles: [], ruiliFiles: [] }];
        let meetingData = [{ id: "meet-1", date: "2026-07-18T14:00", status: "結案", manager: "黃逸豪", companyName: "外部聯合戰略研討會", meetSubject: "綠能開發聯席會議", attendees: ["楊裕憲", "陳宥騰"], baseInfoName: "合作公會", baseInfoContact: "林秘書", baseInfoPhone: "07-111", baseInfoTax: "", baseInfoAddr: "", baseInfoLink: "", meetContents: [{ reporter: "黃逸豪", text: "簡報特定工廠轉型政策", discuss: "如何對齊數據", conclusion: "下週前完成草案" }], meetFinalConclusion: "全面推動雙軌防錯表單系統。", files: [] }];
        let internalMeetData = [{ id: "int-1", date: "2026-07-18T09:00", status: "結案", manager: "楊裕憲", companyName: "內部戰略月報會", meetSubject: "H版新系統上線盤點", attendees: ["楊裕憲", "陳宥騰", "鄭家承", "樊靖畇", "鄭至宏"], financeReport: "正常", consensus: "全力服務 successor 接班企業", target: "完成100家工廠健檢", caseReports: [{ reporter: "陳宥騰", caseName: "大鼎項目", desc: "進入初期評估", conclusion: "準備提供試算表" }], proposalReports: [{ reporter: "樊靖畇", item: "系統優化", content: "拆分客戶與睿立端文件", conclusion: "已實作完成" }], meetFinalConclusion: "全員落實 Professional Altruism 精神。", files: [] }];

        let selectedIds = { "case-eval": "eval-1", "solar": "solar-1", "trading": "trading-1", "meeting": "meet-1", "internal-meet": "int-1" };
        let currentActiveTab = "case-eval";

        const managersList = ["樊靖畇", "鄭家承", "陳宥騰", "楊裕憲", "黃逸豪", "李宜璇", "王瑋聆", "許先生", "鄭至宏"];
        const attendeesOptions = ["楊裕憲", "陳宥騰", "鄭家承", "樊靖畇", "鄭至宏"];
        const statusConfig = { "初期評估": { bg: "bg-emerald-500" }, "已報價": { bg: "bg-blue-500" }, "準備簽約": { bg: "bg-amber-500" }, "已簽約": { bg: "bg-red-500" }, "結案": { bg: "bg-purple-500" }, "沒下文": { bg: "bg-slate-600" } };

        function toggleCategory(catId) {
            const subList = document.getElementById(`sub-list-${catId}`);
            const isHidden = subList ? subList.classList.contains('hidden') : true;
            ["case-eval", "solar", "trading", "meeting", "internal-meet"].forEach(id => {
                const sl = document.getElementById(`sub-list-${id}`);
                if (sl) sl.classList.add('hidden');
                const ar = document.getElementById(`arrow-${id}`);
                if (ar) ar.classList.remove('rotate-180');
            });
            if (isHidden && subList) {
                subList.classList.remove('hidden');
                const arrow = document.getElementById(`arrow-${catId}`);
                if (arrow) arrow.classList.add('rotate-180');
            }
            switchTab(catId);
        }

        function getTargetDataArray(tabId) {
            if (tabId === 'case-eval') return caseEvalData;
            if (tabId === 'solar') return solarData;
            if (tabId === 'trading') return tradingData;
            if (tabId === 'meeting') return meetingData;
            if (tabId === 'internal-meet') return internalMeetData;
            return [];
        }

        function renderSidebarSubLists() {
            ["case-eval", "solar", "trading", "meeting", "internal-meet"].forEach(tabId => {
                const container = document.getElementById(`sub-list-${tabId}`);
                if (!container) return;
                const dataArr = getTargetDataArray(tabId);
                const currentSelId = selectedIds[tabId];
                const iconClass = tabId === 'solar' ? 'fa-sun text-amber-400' : (tabId.includes('meet')||tabId=='meeting' ? 'fa-comments text-purple-400' : 'fa-folder text-cyan-400');

                container.innerHTML = dataArr.map(c => `
                    <button onclick="selectSpecificCase('${c.id}', '${tabId}')" class="w-full text-left py-1.5 px-3 rounded-lg text-xs truncate transition ${currentSelId === c.id && currentActiveTab === tabId ? 'bg-cosmic-500 text-white font-semibold' : 'text-slate-400 hover:text-slate-200'}">
                        <i class="fa-solid ${iconClass} mr-2"></i>${c.companyName || c.meetSubject || '未命名項目'}
                    </button>
                `).join('');
            });
        }

        function selectSpecificCase(id, tabId) { selectedIds[tabId] = id; switchTab(tabId); }
        function switchTab(tabId) {
            currentActiveTab = tabId;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            const targetSection = document.getElementById(`tab-${tabId}`);
            if (targetSection) targetSection.classList.add('active');
            renderSidebarSubLists(); renderMainForms();
        }

        function renderMainForms() {
            const containerMap = { "case-eval": "case-eval-container", "solar": "solar-container", "trading": "trading-container", "meeting": "meeting-container", "internal-meet": "internal-meet-container" };
            const activeContainerId = containerMap[currentActiveTab];
            if (!activeContainerId) return;

            const dataArr = getTargetDataArray(currentActiveTab);
            const activeId = selectedIds[currentActiveTab];
            const activeCase = dataArr.find(c => c.id === activeId) || dataArr[0];

            if (!activeCase) {
                document.getElementById(activeContainerId).innerHTML = '<p class="text-xs text-slate-500">暫無子案件名單。</p>';
                return;
            }

            if (currentActiveTab === 'meeting') {
                document.getElementById(activeContainerId).innerHTML = generateMeetingFormHTML(activeCase);
            } else if (currentActiveTab === 'internal-meet') {
                document.getElementById(activeContainerId).innerHTML = generateInternalMeetingFormHTML(activeCase);
            } else {
                document.getElementById(activeContainerId).innerHTML = generateCaseFormHTML(activeCase, currentActiveTab);
            }
        }

        // ==================== 1. 一、專案人員 ＆ 卡片完整表單產生器 ====================
        function generateCaseFormHTML(c, mode) {
            const isSolar = mode === 'solar';
            const currentStatusColor = statusConfig[c.status]?.bg || 'bg-slate-500';

            // 太陽能核心公式自動聯動試算
            const pingNum = parseFloat(c.calcPing || 0);
            const priceUnit = parseFloat(c.calcPricePerUnit || 3.5);
            const solarRevenue = Math.round((pingNum / 1.5) * (590 / 1000) * 4 * 365 * priceUnit);
            const rent10 = Math.round(solarRevenue * 0.1);
            const rent15 = Math.round(solarRevenue * 0.15);
            const nearbyTotalRent = Math.round(parseFloat(c.calcNearbyPing || 0) * parseFloat(c.calcNearbyPrice || 0));

            return `
                <div class="bg-cosmic-800/70 border ${isSolar ? 'border-amber-500/40':'border-cosmic-700/50'} rounded-2xl shadow-xl overflow-hidden p-6 space-y-6">
                    
                    <!-- 一、專案人員區塊 (找回來了！) -->
                    <div class="bg-cosmic-900/60 p-4 border border-cosmic-700/50 rounded-xl flex flex-wrap items-center justify-between gap-4">
                        <div class="flex flex-wrap items-center space-x-6">
                            <h3 class="text-sm font-bold text-white"><i class="fa-solid fa-user-tie text-cyan-400 mr-2"></i>一、專案人員</h3>
                            <div><label class="text-[11px] text-slate-400 block mb-0.5">日期 / 時間</label><input type="datetime-local" value="${c.date}" onchange="updateField('${c.id}', 'date', this.value)" class="bg-cosmic-950 border border-cosmic-700 rounded px-2 py-0.5 text-xs text-white"></div>
                            <div>
                                <label class="text-[11px] text-slate-400 block mb-0.5">案件狀態（新版圓圈圖）</label>
                                <div class="flex items-center space-x-2 bg-cosmic-950 px-2.5 py-0.5 rounded border border-cosmic-700 text-xs">
                                    <span class="w-2.5 h-2.5 rounded-full ${currentStatusColor}"></span>
                                    <select onchange="updateField('${c.id}', 'status', this.value); renderMainForms();" class="bg-transparent text-white focus:outline-none">
                                        ${Object.keys(statusConfig).map(st => `<option value="${st}" class="bg-cosmic-900" ${c.status === st ? 'selected':''}>${st}</option>`).join('')}
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label class="text-[11px] text-slate-400 block mb-0.5">專案經理（下拉選單）</label>
                                <select onchange="updateField('${c.id}', 'manager', this.value)" class="bg-cosmic-950 border border-cosmic-700 rounded px-2 py-0.5 text-xs text-white">
                                    ${managersList.map(m => `<option value="${m}" ${c.manager === m ? 'selected':''}>${m}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                        <button onclick="deleteCase('${c.id}')" class="text-xs bg-red-950/40 border border-red-900 hover:bg-red-900/50 text-red-400 px-3 py-1 rounded-lg">刪除動態案件</button>
                    </div>

                    <!-- 服務項目層 -->
                    <div class="bg-cosmic-950/40 border border-cosmic-700/30 p-4 rounded-xl space-y-2">
                        <div class="flex justify-between items-center border-b border-cosmic-700/30 pb-1">
                            <h4 class="text-xs font-bold text-indigo-400">服務項目層 (負責控制畫面上名單的增減)</h4>
                            <button onclick="addServiceRow('${c.id}')" class="text-[10px] bg-indigo-900/50 border border-indigo-700 px-2 py-0.5 rounded hover:bg-indigo-800 transition">[＋ 新增服務項目] 按鈕</button>
                        </div>
                        <div class="space-y-1.5">
                            ${c.services.map((srv, idx) => `
                                <div class="grid grid-cols-4 gap-2 text-xs">

            let txt = prompt("請輸入自訂文件欄位名稱：");
            if (target && txt) {
                if(side === 'client') target.customDocsClient.push(txt);
                else target.customDocsRuili.push(txt);
                renderMainForms();
            }
        }
        function removeCustomDocItem(id, side, idx) {
            let target = getTargetDataArray(currentActiveTab).find(c => c.id === id);
            if (target) {
                if(side === 'client') target.customDocsClient.splice(idx, 1);
                else target.customDocsRuili.splice(idx, 1);
                renderMainForms();
            }
        }

        function addNewCase() {
            const ts = "id-" + Date.now();
            let dataArr = getTargetDataArray(currentActiveTab);
            let initialObj = {
                id: ts, date: new Date().toISOString().slice(0, 16), status: "初期評估", manager: "樊靖畇", companyName: "全新動態名單 " + (dataArr.length + 1),
                services: [], lands: [], buildings: [], customDocsClient: ["電費單"], customDocsRuili: ["土地謄本"], clientFiles: [], ruiliFiles: [],
                electricBill: "0", horsepower: "0", contractCapacity: "0", isHighVoltage: "否", isTimeRate: "否", timePeriod: "白天為主", esgHasSuccessor: "是", esgGreenCert: "評估中", esgStorage: "評估中"
            };

            if (currentActiveTab === 'meeting') { initialObj.meetSubject = "新外部主題會議"; initialObj.companyName = ""; }
            if (currentActiveTab === 'internal-meet') { initialObj.meetSubject = "新內部月報會議"; initialObj.companyName = ""; initialObj.financeReport=""; initialObj.consensus=""; initialObj.target=""; }
            if (currentActiveTab === 'solar') { initialObj.calcPing = "0"; initialObj.calcPricePerUnit = "3.5"; initialObj.calcNearbyPing = "0"; initialObj.calcNearbyPrice = "0"; }

            dataArr.unshift(initialObj);
            selectedIds[currentActiveTab] = ts;
            renderSidebarSubLists(); renderMainForms();
        }

        function deleteCase(id) {
            if (confirm("確定完全刪除此項動態數據嗎？")) {
                if (currentActiveTab === 'case-eval') caseEvalData = caseEvalData.filter(c => c.id !== id);
                if (currentActiveTab === 'solar') solarData = solarData.filter(c => c.id !== id);
                if (currentActiveTab === 'trading') tradingData = tradingData.filter(c => c.id !== id);
                if (currentActiveTab === 'meeting') meetingData = meetingData.filter(c => c.id !== id);
                if (currentActiveTab === 'internal-meet') internalMeetData = internalMeetData.filter(c => c.id !== id);
                renderSidebarSubLists(); renderMainForms();
            }
        }

        function filterCases() {
            const query = document.getElementById("global-search").value.toLowerCase().trim();
            const dataArr = getTargetDataArray(currentActiveTab);
            const filtered = dataArr.filter(c => (c.companyName||'').toLowerCase().includes(query) || (c.meetSubject||'').toLowerCase().includes(query));
            const subList = document.getElementById(`sub-list-${currentActiveTab}`);
            if (subList) {
                subList.innerHTML = filtered.map(c => `<button onclick="selectSpecificCase('${c.id}', '${currentActiveTab}')" class="w-full text-left py-1.5 px-3 rounded-lg text-xs truncate ${selectedIds[currentActiveTab] === c.id ? 'bg-cosmic-500 text-white' : 'text-slate-400'}">${c.companyName || c.meetSubject}</button>`).join('');
            }
        }

        function saveToCloud() { alert("E版與H版融合優化機制：已100%成功寫入雲端資料庫封裝。"); }
        window.onload = function() { toggleCategory('case-eval'); };
    </script>
</body>
</html>
