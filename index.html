<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>睿立業務系統 - 核心管理平台</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome 圖標 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cosmic: {
                            950: '#060b19', // 深邃基底
                            900: '#0a142c', // 左側導覽
                            800: '#112246', // 卡片區塊
                            700: '#1a3160', // 輸入框/邊框
                            600: '#234280', // 次要互動
                            500: '#315cb5', // 主色調亮藍
                            400: '#4c7cd4'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #060b19; color: #e2e8f0; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0a142c; }
        ::-webkit-scrollbar-thumb { background: #1a3160; border-radius: 3px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <!-- LEFT SIDEBAR -->
    <aside class="w-72 bg-cosmic-900 border-r border-cosmic-700/50 flex flex-col justify-between shrink-0">
        <div>
            <!-- LOGO 區域 -->
            <div class="p-6 border-b border-cosmic-700/30 flex items-center space-x-3">
                <div class="w-10 h-10 bg-gradient-to-tr from-cosmic-500 to-cyan-400 rounded-xl flex items-center justify-center shadow-lg shadow-cosmic-500/20">
                    <i class="fa-solid fa-chart-network text-white text-lg"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-wider text-white">睿立集團</h1>
                    <p class="text-xs text-slate-400">RUILI GROUP SYSTEM</p>
                </div>
            </div>
            <!-- 導覽功能列表 -->
            <nav class="p-4 space-y-1.5">
                <button onclick="switchTab('case-eval')" id="btn-case-eval" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60 active-nav">
                    <i class="fa-solid fa-folder-open w-5 text-center text-cyan-400"></i>
                    <span class="font-medium text-sm tracking-wide">案件評估</span>
                </button>
                <button onclick="switchTab('solar')" id="btn-solar" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60">
                    <i class="fa-solid fa-solar-panel w-5 text-center text-amber-400"></i>
                    <span class="font-medium text-sm tracking-wide">工廠太陽能自建</span>
                </button>
                <button onclick="switchTab('trading')" id="btn-trading" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60">
                    <i class="fa-solid fa-building-circle-arrow-right w-5 text-center text-emerald-400"></i>
                    <span class="font-medium text-sm tracking-wide">工廠買賣案件資料表</span>
                </button>
                <button onclick="switchTab('internal-meet')" id="btn-internal-meet" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60">
                    <i class="fa-solid fa-comments w-5 text-center text-indigo-400"></i>
                    <span class="font-medium text-sm tracking-wide">公司會議記錄</span>
                </button>
                <button onclick="switchTab('partner-meet')" id="btn-partner-meet" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60">
                    <i class="fa-solid fa-handshake w-5 text-center text-purple-400"></i>
                    <span class="font-medium text-sm tracking-wide">合作夥伴會議記錄</span>
                </button>
            </nav>
        </div>

        <!-- 側邊欄下方個人資訊 -->
        <div class="p-4 border-t border-cosmic-700/30 bg-cosmic-950/40">
            <div class="flex items-center space-x-3">
                <div class="w-9 h-9 rounded-full bg-cosmic-700 flex items-center justify-center font-bold text-sm text-cyan-300 border border-cosmic-500/30">
                    經理
                </div>
                <div class="overflow-hidden">
                    <p class="text-xs text-slate-400">專案登入身分</p>
                    <p class="text-sm font-medium text-slate-200 truncate">系統管理員</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT CONTAINER -->
    <main class="flex-1 flex flex-col overflow-hidden bg-cosmic-950">
        
        <!-- TOP CONTROL BAR -->
        <header class="h-16 border-b border-cosmic-700/40 px-8 flex items-center justify-between shrink-0 bg-cosmic-900/40 backdrop-blur-md">
            <div class="flex items-center space-x-4">
                <div class="relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                    <input type="text" id="global-search" oninput="filterCases()" placeholder="關鍵字檢索公司名稱/統編/地號..." class="w-80 bg-cosmic-950 border border-cosmic-700 rounded-xl pl-10 pr-4 py-1.5 text-sm focus:outline-none focus:border-cosmic-500 transition placeholder-slate-500">
                </div>
            </div>
            <div class="flex items-center space-x-3">
                <button onclick="addNewCase()" class="bg-gradient-to-r from-cosmic-500 to-blue-600 hover:from-cosmic-400 hover:to-blue-500 text-white text-xs font-semibold px-4 py-2 rounded-xl flex items-center space-x-1.5 shadow-lg shadow-cosmic-500/10 transition">
                    <i class="fa-solid fa-plus"></i>
                    <span>＋ 新增公司案件</span>
                </button>
                <button onclick="window.print()" class="bg-cosmic-800 hover:bg-cosmic-700 text-slate-300 text-xs font-semibold px-3.5 py-2 rounded-xl border border-cosmic-700/60 transition">
                    <i class="fa-solid fa-print mr-1"></i> 匯出/列印
                </button>
                <button onclick="saveToCloud()" class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-semibold px-4 py-2 rounded-xl transition flex items-center space-x-1.5 shadow-md">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <span>儲存同步</span>
                </button>
            </div>
        </header>

        <!-- ROUTING TABS VIEWPORT -->
        <div class="flex-1 overflow-y-auto p-8">
            
            <!-- TAB 1: 案件評估 (CORE ARCHITECTURE) -->
            <section id="tab-case-eval" class="tab-content active space-y-6">
                <!-- 頁面標題 -->
                <div class="flex justify-between items-center">
                    <div>
                        <h2 class="text-2xl font-bold text-white tracking-wide">案件評估管理層</h2>
                        <p class="text-xs text-slate-400 mt-1">即時維護與評估工廠基礎資料、建地、土地型態及 ESG 環節</p>
                    </div>
                </div>

                <!-- 案件名單動態渲染容器 -->
                <div id="cases-loop-container" class="space-y-8">
                    <!-- JavaScript 會在這裡動態渲染案件 -->
                </div>
            </section>

            <!-- TAB 2: 工廠太陽能自建 (MOCK) -->
            <section id="tab-solar" class="tab-content space-y-6">
                <div class="bg-cosmic-800/40 border border-cosmic-700/40 rounded-2xl p-8 text-center py-20">
                    <div class="w-16 h-16 bg-amber-500/10 text-amber-400 rounded-full flex items-center justify-center mx-auto text-2xl mb-4">
                        <i class="fa-solid fa-solar-panel"></i>
                    </div>
                    <h3 class="text-xl font-bold text-white">工廠太陽能自建模組</h3>
                    <p class="text-slate-400 text-sm max-w-md mx-auto mt-2">提供饋線容量查詢、躉購電價試算與綠電自用效益評估表。</p>
                </div>
            </section>

            <!-- TAB 3: 工廠買賣案件資料表 (MOCK) -->
            <section id="tab-trading" class="tab-content space-y-6">
                <div class="bg-cosmic-800/40 border border-cosmic-700/40 rounded-2xl p-8 text-center py-20">
                    <div class="w-16 h-16 bg-emerald-500/10 text-emerald-400 rounded-full flex items-center justify-center mx-auto text-2xl mb-4">
                        <i class="fa-solid fa-building-circle-arrow-right"></i>
                    </div>
                    <h3 class="text-xl font-bold text-white">工廠買賣案件資料表</h3>
                    <p class="text-slate-400 text-sm max-w-md mx-auto mt-2">媒合特定工廠、合法丁建土地流轉，整合買賣方意願需求。</p>
                </div>
            </section>

            <!-- TAB 4: 公司會議記錄 (MOCK) -->
            <section id="tab-internal-meet" class="tab-content space-y-6">
                <div class="bg-cosmic-800/40 border border-cosmic-700/40 rounded-2xl p-8 text-center py-20">
                    <div class="w-16 h-16 bg-indigo-500/10 text-indigo-400 rounded-full flex items-center justify-center mx-auto text-2xl mb-4">
                        <i class="fa-solid fa-comments"></i>
                    </div>
                    <h3 class="text-xl font-bold text-white">公司內部會議記錄</h3>
                    <p class="text-slate-400 text-sm max-w-md mx-auto mt-2">記錄工廠改善方案進度、跨部門政策追蹤與內部工作指派。</p>
                </div>
            </section>

            <!-- TAB 5: 合作夥伴會議記錄 (MOCK) -->
            <section id="tab-partner-meet" class="tab-content space-y-6">
                <div class="bg-cosmic-800/40 border border-cosmic-700/40 rounded-2xl p-8 text-center py-20">
                    <div class="w-16 h-16 bg-purple-500/10 text-purple-400 rounded-full flex items-center justify-center mx-auto text-2xl mb-4">
                        <i class="fa-solid fa-handshake"></i>
                    </div>
                    <h3 class="text-xl font-bold text-white">合作夥伴會議記錄</h3>
                    <p class="text-slate-400 text-sm max-w-md mx-auto mt-2">與地政士事務所、綠能技師、公會代表聯席會議之決議備忘錄。</p>
                </div>
            </section>

        </div>
    </main>

    <!-- BUSINESS RULES INLINE INJECTIONS -->
    <script>
        // 初始化假資料
        let casesData = [
            {
                id: "case-1",
                date: "2026-07-18T10:00",
                status: "初期評估",
                manager: "樊靖畇",
                remark: "客戶急需特定工廠變更評估，工廠頂樓欲同步規劃太陽能。",
                source: "公會轉介",
                companyName: "大鼎精密工業股份有限公司",
                taxId: "83746291",
                factoryLicense: "64009876",
                industryType: "金屬製品製造業",
                contact: "王大鼎",
                phone: "0912-345678",
                email: "tading@precision.com",
                address: "高雄市岡山區本工路88號",
                services: [
                    { name: "特定工廠合法化轉型", desc: "特定工廠登記申請及實質改善計畫", result: "可行，符合建蔽率規定", quote: "350000" },
                    { name: "屋頂太陽能自建評估", desc: "綠能一體化設計，整合結構補強", result: "估計可建置 200kWp", quote: "120000" }
                ],
                lands: [
                    { section: "岡山段", number: "105-002", sqm: "1500", ping: "453.75" }
                ],
                landTotalSqm: "1500",
                landTotalPing: "453.75",
                landPattern: "都市計畫外使用地類別",
                landRemark: "特定農業區丁種建築用地",
                buildings: [
                    { number: "建號 402", sqm: "800", ping: "242" }
                ],
                buildYear: "2005",
                legalBuildPing: "242",
                illegalBuildPing: "120",
                buildRemark: "後方雨遮部分屬於120坪既存違章",
                esg: {
                    hasSuccessor: "是",
                    isExport: "是",
                    euCarbonRequired: "是",
                    avgElectricBill: "185000",
                    horsepower: "150",
                    contractCapacity: "120",
                    isHighVoltage: "否",
                    isTimeRate: "是",
                    electricTimePeriods: ["白天為主"]
                },
                docsChecked: ["電費單", "屋頂現況照片（多角度）", "使用執照"],
                customDocInput: "",
                uploadedFilesCount: 2,
                ruili调阅FilesCount: 1
            }
        ];

        // 靜態選項下拉
        const managersList = ["樊靖畇", "鄭家承", "陳宥騰", "楊裕憲", "黃逸豪", "李宜璇", "王瑋聆", "許先生"];
        const statusConfig = {
            "初期評估": "bg-emerald-600 hover:bg-emerald-700 text-white",
            "已報價": "bg-blue-600 hover:bg-blue-700 text-white",
            "準備簽約": "bg-amber-500 hover:bg-amber-600 text-slate-900",
            "已簽約": "bg-red-600 hover:bg-red-700 text-white",
            "結案": "bg-purple-600 hover:bg-purple-700 text-white",
            "沒下文": "bg-slate-700 hover:bg-slate-800 text-white"
        };

        // Tab 切換
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            
            document.querySelectorAll('nav button').forEach(el => {
                el.classList.remove('bg-cosmic-800', 'text-white', 'border-l-4', 'border-cosmic-500');
            });
            const activeBtn = document.getElementById(`btn-${tabId}`);
            if(activeBtn) {
                activeBtn.classList.add('bg-cosmic-800', 'text-white', 'border-l-4', 'border-cosmic-500');
            }
        }

        // 渲染案件列表
        function renderCases(dataToShow = casesData) {
            const container = document.getElementById("cases-loop-container");
            container.innerHTML = "";

            if(dataToShow.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-slate-500 text-sm">查無符合篩選條件的案件。</div>`;
                return;
            }

            dataToShow.forEach((c) => {
                const caseCard = document.createElement("div");
                caseCard.className = "bg-cosmic-800/70 border border-cosmic-700/50 rounded-2xl shadow-xl overflow-hidden backdrop-blur-sm transition hover:border-cosmic-500/40";
                caseCard.id = `card-${c.id}`;

                caseCard.innerHTML = `
                    <!-- 頂部區塊：專案人員控制與基本狀態 -->
                    <div class="bg-cosmic-900/60 px-6 py-4 border-b border-cosmic-700/50 flex flex-wrap items-center justify-between gap-4">
                        <div class="flex items-center space-x-4">
                            <div>
                                <label class="block text-[11px] text-slate-400 font-medium uppercase tracking-wider mb-1">日期 / 時間</label>
                                <input type="datetime-local" value="${c.date}" onchange="updateField('${c.id}', 'date', this.value)" class="bg-cosmic-950 border border-cosmic-700 rounded-lg px-2.5 py-1 text-xs focus:outline-none text-slate-200">
                            </div>
                            <div>
                                <label class="block text-[11px] text-slate-400 font-medium uppercase tracking-wider mb-1">案件狀態</label>
                                <select onchange="updateField('${c.id}', 'status', this.value); renderCases();" class="bg-cosmic-950 border border-cosmic-700 rounded-lg px-2.5 py-1 text-xs font-semibold ${statusConfig[c.status] || 'bg-slate-700'} focus:outline-none">
                                    ${Object.keys(statusConfig).map(st => `<option value="${st}" ${c.status === st ? 'selected':''}>${st}</option>`).join('')}
                                </select>
                            </div>
                            <div>
                                <label class="block text-[11px] text-slate-400 font-medium uppercase tracking-wider mb-1">專案經理</label>
                                <select onchange="updateField('${c.id}', 'manager', this.value)" class="bg-cosmic-950 border border-cosmic-700 rounded-lg px-2.5 py-1 text-xs focus:outline-none text-slate-200">
                                    ${managersList.map(m => `<option value="${m}" ${c.manager === m ? 'selected':''}>${m}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                        <div class="flex items-center space-x-2">
                            <button onclick="deleteCase('${c.id}')" class="text-xs bg-red-950/40 hover:bg-red-900/60 text-red-400 border border-red-900/50 px-3 py-1.5 rounded-xl transition">
                                <i class="fa-solid fa-trash-can mr-1"></i> 刪除案件
                            </button>
                        </div>
                    </div>

                    <!-- 表單主體內容 -->
                    <div class="p-6 space-y-6">
                        
                        <!-- 二、公司基本資料 與 業務即時備註 -->
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div class="lg:col-span-2 bg-cosmic-950/40 border border-cosmic-700/30 p-4 rounded-xl space-y-3">
                                <h4 class="text-xs font-bold text-cyan-400 tracking-wide border-b border-cosmic-700/30 pb-1.5"><i class="fa-solid fa-industry mr-1.5"></i>二、公司基本資料</h4>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                                    <div>
                                        <label class="text-[11px] text-slate-400">公司名稱</label>
                                        <input type="text" value="${c.companyName}" oninput="updateField('${c.id}', 'companyName', this.value)" class="w-full bg-cosmic-900 border border-cosmic-700 rounded-lg px-2.5 py-1.5 text-xs text-white focus:outline-none">
                                    </div>
                                    <div>
                                        <label class="text-[11px] text-slate-400">統一編號</label>
                                        <input type="text" value="${c.taxId}" oninput="updateField('${c.id}', 'taxId', this.value)" class="w-full bg-cosmic-900 border border-cosmic-700 rounded-lg px-2.5 py-1.5 text-xs text-white focus:outline-none">
                                    </div>
                                    <div>
                                        <label class="text-[11px] text-slate-400">工廠登記證字號</label>
                                        <input type="text" value="${c.factoryLicense}" oninput="updateField('${c.id}', 'factoryLicense', this.value)" class="w-full bg-cosmic-900 border border-cosmic-700 rounded-lg px-2.5 py-1.5 text-xs text-white focus:outline-none">
                                    </div>
                                    <div>
                                        <label class="text-[11px] text-slate-400">產業類型</label>
                                        <input type="text" value="${c.industryType}" oninput="updateField('${c.id}', 'industryType', this.value)" class="w-full bg-cosmic-900 border border-cosmic-700 rounded-lg px-2.5 py-1.5 text-xs text-white focus:outline-none">
                                    </div>
                                    <div>
                                        <label class="text-[11px] text-slate-400">聯絡人</label>
                                        <input type="text" value="${c.contact}" oninput="updateField('${c.id}', 'contact', this.value)" class="w-full bg-cosmic-900 border border-cosmic-700 rounded-lg px-2.5 py-1.5 text-xs text-white focus:outline-none">
                                    </div>
                                    <div>
                                        <label class="text-[11px] text-slate-400">聯絡電話</label>
                                        <input type="text" value="${c.phone}" oninput="updateField('${c.id}', 'phone', this.value)" class="w-full bg-cosmic-900 border border-cosmic-700 rounded-lg px-2.5 py-1.5 text-xs text-white focus:outline-none">
                                    </div>
                                    <div class="md:col-span-2">
                                        <label class="text-[11px] text-slate-400">E-mail</label>
                                        <input type="email" value="${c.email}" oninput="updateField('${c.id}', 'email', this.value)" class="w-full bg-cosmic-900 border border-cosmic-700 rounded-lg px-2.5 py-1.5 text-xs text-white focus:outline-none">
                                    </div>
                                    <div class="md:col-span-2">
                                        <label class="text-[11px] text-slate-400">工廠地址</label>
                                        <input type="text" value="${c.address}" oninput="updateField('${c.id}', 'address', this.value)" class="w-full bg-cosmic-900 border border-cosmic-700 rounded-lg px-2.5 py-1.5 text-xs text-white focus:outline-none">
                                    </div>
                                </div>
                            </div>

                            <div class="space-y-4">
                                <div class="bg-cosmic-950/40 border border-cosmic-700/30 p-4 rounded-xl h-full flex flex-col justify-between">
                                    <div>
                                        <h4 class="text-xs font-bold text-amber-400 tracking-wide border-b border-cosmic-700/30 pb-1.5"><i class="fa-solid fa-comment-dots mr-1.5"></i>業務即時狀態備註</h4>
                                        <textarea oninput="updateField('${c.id}', 'remark', this.value)" class="w-full bg-cosmic-900 border border-cosmic-700 rounded-lg px-2.5 py-1.5 text-xs text-white focus:outline-none mt-2 h-24 resize-none">${c.remark}</textarea>
                                    </div>
                                    <div class="mt-2">
                                        <label class="text-[11px] text-slate-400 block">案件來源</label>
                                        <input type="text" value="${c.source}" oninput="updateField('${c.id}', 'source', this.value)" class="w-full bg-cosmic-900 border border-cosmic-700 rounded-lg px-2.5 py-1.5 text-xs text-white focus:outline-none">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 服務項目 (動態陣列嵌套) -->
                        <div class="bg-cosmic-950/40 border border-cosmic-700/30 p-4 rounded-xl">
                            <div class="flex justify-between items-center border-b border-cosmic-700/30 pb-1.5 mb-3">
                                <h4 class="text-xs font-bold text-indigo-400 tracking-wide"><i class="fa-solid fa-hand-holding-heart mr-1.5"></i>服務項目層</h4>
                                <button onclick="addService('${c.id}')" class="text-[11px] bg-indigo-900/50 hover:bg-indigo-800 text-indigo-300 border border-indigo-700/40 px-2.5 py-1 rounded-lg transition">
                                    <i class="fa-solid fa-plus mr-1"></i> 新增服務項目
                                </button>
                            </div>
                            <div class="overflow-x-auto">
                                <table class="w-full text-left text-xs">
                                    <thead>
                                        <tr class="text-slate-400 border-b border-cosmic-700/50">

                target.services.push({ name: "新服務項目", desc: "", result: "", quote: "0" });
                renderCases();
            }
        }
        function updateService(id, idx, field, value) {
            let target = casesData.find(c => c.id === id);
            if(target && target.services[idx]) target.services[idx][field] = value;
        }

            if(target) {
                target.services.splice(idx, 1);
                renderCases();
            }

        function addLand(id) {
            let target = casesData.find(c => c.id === id);

                target.lands.push({ section: "", number: "", sqm: "0", ping: "0" });
                renderCases();
            }
        }
        function updateLand(id, idx, field, value) {
            let target = casesData.find(c => c.id === id);
            if(target && target.lands[idx]) target.lands[idx][field] = value;
        }
        function autoCalcLand(idx, id, triggerField) {
            let target = casesData.find(c => c.id === id);
            if(!target || !target.lands[idx]) return;
            let item = target.lands[idx];
            if(triggerField === 'sqm') {
                item.ping = (parseFloat(item.sqm) * 0.3025).toFixed(2);
            } else {
                item.sqm = (parseFloat(item.ping) / 0.3025).toFixed(2);
            }
            // 重新加總
            let totalSqm = target.lands.reduce((sum, current) => sum + parseFloat(current.sqm || 0), 0);
            let totalPing = target.lands.reduce((sum, current) => sum + parseFloat(current.ping || 0), 0);
            target.landTotalSqm = totalSqm.toFixed(2);
            target.landTotalPing = totalPing.toFixed(2);
            
            // 局部同步 UI 數值而不完整重刷，避免游標跳移
            const card = document.getElementById(`card-${id}`);
            if(card) {
                renderCases(); // 土地項目較少時，重新渲染最安全
            }
        }

            let target = casesData.find(c => c.id === id);
            if(target) {
                target.lands.splice(idx, 1);
                renderCases();
            }

            if(target && target.buildings[idx]) target.buildings[idx][field] = value;

            let target = casesData.find(c => c.id === id);
            if(!target || !target.buildings[idx]) return;
            let item = target.buildings[idx];
            if(triggerField === 'sqm') {
                item.ping = (parseFloat(item.sqm) * 0.3025).toFixed(2);
            } else {
                item.sqm = (parseFloat(item.ping) / 0.3025).toFixed(2);

        }
        function deleteBuilding(id, idx) {
            let target = casesData.find(c => c.id === id);
            if(target) {
                target.buildings.splice(idx, 1);
                renderCases();
            }
        }

        // ESG 複選控制
        function toggleEsgTimePeriod(id, time) {
            let target = casesData.find(c => c.id === id);
            if(target && target.esg) {
                let arr = target.esg.electricTimePeriods;
                if(arr.includes(time)) {
                    target.esg.electricTimePeriods = arr.filter(t => t !== time);
                } else {
                    target.esg.electricTimePeriods.push(time);
                }
            }
        }

        // 文件清單複選控制與自訂填寫
        function toggleDocChecked(id, doc) {
            let target = casesData.find(c => c.id === id);
            if(target) {
                if(target.docsChecked.includes(doc)) {
                    target.docsChecked = target.docsChecked.filter(d => d !== doc);
                } else {
                    target.docsChecked.push(doc);
                }
            }
        }
        function addCustomDoc(id) {
            const inputEl = document.getElementById(`custom-doc-${id}`);
            if(!inputEl || !inputEl.value.trim()) return;
            let target = casesData.find(c => c.id === id);
            if(target) {
                target.docsChecked.push(inputEl.value.trim());
                inputEl.value = "";
                renderCases();
            }
        }

        // 頂部控制：新增案件
        function addNewCase() {
            const newId = "case-" + Date.now();
            const newCase = {
                id: newId,
                date: new Date().toISOString().slice(0, 16),
                status: "初期評估",
                manager: "樊靖畇",
                remark: "新建立的空白工廠評估案件。",
                source: "業務開發",
                companyName: "新創製造工廠名稱",
                taxId: "",
                factoryLicense: "",
                industryType: "",
                contact: "",
                phone: "",
                email: "",
                address: "",
                services: [],
                lands: [],
                landTotalSqm: "0",
                landTotalPing: "0",
                landPattern: "都市計畫內使用分區",
                landRemark: "",
                buildings: [],
                buildYear: "",
                legalBuildPing: "0",
                illegalBuildPing: "0",
                buildRemark: "",
                esg: {
                    hasSuccessor: "否",
                    isExport: "否",
                    euCarbonRequired: "否",
                    avgElectricBill: "0",
                    horsepower: "0",
                    contractCapacity: "0",
                    isHighVoltage: "否",
                    isTimeRate: "否",
                    electricTimePeriods: []
                },
                docsChecked: [],
                customDocInput: "",
                uploadedFilesCount: 0,
                ruili调阅FilesCount: 0
            };
            casesData.unshift(newCase);
            renderCases();
            switchTab('case-eval');
            document.getElementById(`card-${newId}`).scrollIntoView({ behavior: 'smooth' });
        }

        // 頂部控制：刪除案件
        function deleteCase(id) {
            if(confirm("確定要移除此工廠評估案件嗎？（此操作僅影響目前前端記憶體陣列）")) {
                casesData = casesData.filter(c => c.id !== id);
                renderCases();
            }
        }

        // 關鍵字動態篩選
        function filterCases() {
            const query = document.getElementById("global-search").value.toLowerCase().trim();
            if(!query) {
                renderCases(casesData);
                return;
            }
            const filtered = casesData.filter(c => {
                return c.companyName.toLowerCase().includes(query) || 
                       c.taxId.includes(query) || 
                       c.address.toLowerCase().includes(query) ||
                       c.lands.some(ld => ld.section.includes(query) || ld.number.includes(query));
            });
            renderCases(filtered);
        }

        // 模擬寫入/更新雲端資料庫
        function saveToCloud() {
            alert(`【同步成功】\n已成功將現有 ${casesData.length} 筆本地動態變更案件寫入雲端資料庫 (PostgreSQL/MySQL)。`);
        }

        // 系統啟動載入
        window.onload = function() {
            switchTab('case-eval');
            renderCases();
        };
    </script>
</body>
</html>
