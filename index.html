<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>睿立業務系統 - M核心管理平台</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome 圖標 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cosmic: {
                            950: '#060b19', 900: '#0a142c', 800: '#112246', 700: '#1a3160', 600: '#234280', 500: '#315cb5', 400: '#4c7cd4'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #060b19; color: #e2e8f0; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* 📜 M版直式 A4 列印與一鍵匯出排版優化 */
        @media print {
            body { background: white !important; color: black !important; }
            aside, header, .no-print { display: none !important; }
            main { padding: 0 !important; overflow: visible !important; }
            .print-container { 
                width: 210mm !important; 
                min-height: 297mm !important; 
                background: white !important; 
                color: black !important; 
                padding: 15mm !important;
                box-shadow: none !important;
                border: none !important;
            }
            input, select, textarea { 
                background: transparent !important; 
                color: black !important; 
                border: none !important; 
                border-bottom: 1px solid #ccc !important;
                border-radius: 0 !important;
                padding: 2px !important;
            }
            .bg-cosmic-950, .bg-cosmic-900, .bg-cosmic-800, .bg-cosmic-950\/40, .bg-cosmic-900\/60 { background: transparent !important; }
            footer { border-top: 2px solid black !important; color: black !important; }
            h3, h4 { color: black !important; border-bottom: 1px solid black !important; }
        }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <!-- LEFT SIDEBAR -->
    <aside class="w-72 bg-cosmic-900 border-r border-cosmic-700/50 flex flex-col justify-between shrink-0 select-none">
        <div>
            <div class="p-6 border-b border-cosmic-700/30 flex items-center space-x-3">
                <div class="w-10 h-10 bg-gradient-to-tr from-cosmic-500 to-cyan-400 rounded-xl flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-folder-tree text-white text-lg"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-wider text-white">睿立集團</h1>
                    <p class="text-xs text-slate-400">RUILI SYSTEM M</p>
                </div>
            </div>

            <!-- 五大主功能軌道完全保留不遺漏 -->
            <nav class="p-4 space-y-1.5 overflow-y-auto max-h-[calc(100vh-180px)]">
                <div>
                    <button onclick="toggleCategory('case-eval')" class="w-full flex items-center justify-between px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-folder-open w-5 text-center text-cyan-400"></i>
                            <span class="font-medium text-sm tracking-wide">專案管理</span>
                        </div>
                        <i id="arrow-case-eval" class="fa-solid fa-chevron-down text-xs text-slate-500"></i>
                    </button>
                    <div id="sub-list-case-eval" class="hidden pl-9 pr-2 mt-1 space-y-1 border-l border-cosmic-700/40 ml-6"></div>
                </div>

                <div>
                    <button onclick="toggleCategory('solar')" class="w-full flex items-center justify-between px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-solar-panel w-5 text-center text-amber-400"></i>
                            <span class="font-medium text-sm tracking-wide">太陽能自建</span>
                        </div>
                        <i id="arrow-solar" class="fa-solid fa-chevron-down text-xs text-slate-500"></i>
                    </button>
                    <div id="sub-list-solar" class="hidden pl-9 pr-2 mt-1 space-y-1 border-l border-cosmic-700/40 ml-6"></div>
                </div>

                <div>
                    <button onclick="toggleCategory('trading')" class="w-full flex items-center justify-between px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-building-circle-arrow-right w-5 text-center text-emerald-400"></i>
                            <span class="font-medium text-sm tracking-wide">工廠買賣案件資料表</span>
                        </div>
                        <i id="arrow-trading" class="fa-solid fa-chevron-down text-xs text-slate-500"></i>
                    </button>
                    <div id="sub-list-trading" class="hidden pl-9 pr-2 mt-1 space-y-1 border-l border-cosmic-700/40 ml-6"></div>
                </div>

                <div>
                    <button onclick="toggleCategory('meeting')" class="w-full flex items-center justify-between px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-handshake w-5 text-center text-purple-400"></i>
                            <span class="font-medium text-sm tracking-wide">會議記錄</span>
                        </div>
                        <i id="arrow-meeting" class="fa-solid fa-chevron-down text-xs text-slate-500"></i>
                    </button>
                    <div id="sub-list-meeting" class="hidden pl-9 pr-2 mt-1 space-y-1 border-l border-cosmic-700/40 ml-6"></div>
                </div>

                <div>
                    <button onclick="toggleCategory('internal-meet')" class="w-full flex items-center justify-between px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-comments w-5 text-center text-indigo-400"></i>
                            <span class="font-medium text-sm tracking-wide">公司會議記錄</span>
                        </div>
                        <i id="arrow-internal-meet" class="fa-solid fa-chevron-down text-xs text-slate-500"></i>
                    </button>
                    <div id="sub-list-internal-meet" class="hidden pl-9 pr-2 mt-1 space-y-1 border-l border-cosmic-700/40 ml-6"></div>
                </div>
            </nav>
        </div>
    </aside>

    <!-- MAIN CONTAINER -->
    <main class="flex-1 flex flex-col overflow-hidden bg-cosmic-950">
        <!-- TOP BAR -->
        <header class="h-16 border-b border-cosmic-700/40 px-8 flex items-center justify-between shrink-0 bg-cosmic-900/40 backdrop-blur-md">
            <div><input type="text" id="global-search" oninput="filterCases()" placeholder="按公司關鍵字即時篩選名單..." class="w-80 bg-cosmic-950 border border-cosmic-700 rounded-xl px-4 py-1.5 text-sm text-white"></div>
            <div class="flex items-center space-x-3">
                <button onclick="addNewCase()" class="bg-gradient-to-r from-cosmic-500 to-blue-600 text-white text-xs font-semibold px-4 py-2 rounded-xl flex items-center space-x-1.5 shadow-md"><i class="fa-solid fa-plus"></i><span>[＋ 新增公司案件]</span></button>
                <button onclick="window.print()" class="bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white text-xs font-semibold px-4 py-2 rounded-xl flex items-center shadow-lg transition"><i class="fa-solid fa-file-pdf mr-1.5"></i> 一鍵直式A4列印/存檔</button>
                <button onclick="saveToCloud()" class="bg-emerald-600 text-white text-xs font-semibold px-4 py-2 rounded-xl">儲存按鍵</button>
            </div>
        </header>

        <!-- ROUTING VIEWPORT -->
        <div class="flex-1 overflow-y-auto p-8 flex justify-center">
            <div class="w-full max-w-5xl print-container">
                <section id="tab-case-eval" class="tab-content active"><div id="case-eval-container" class="space-y-6"></div></section>
                <section id="tab-solar" class="tab-content"><div id="solar-container" class="space-y-6"></div></section>
                <section id="tab-trading" class="tab-content"><div id="trading-container" class="space-y-6"></div></section>
                <section id="tab-meeting" class="tab-content"><div id="meeting-container" class="space-y-6"></div></section>
                <section id="tab-internal-meet" class="tab-content"><div id="internal-meet-container" class="space-y-6"></div></section>
            </div>
        </div>
    </main>

    <script>
        // 核心隔離狀態管理
        let caseEvalData = [
            {
                id: "eval-1", companyName: "大鼎精密工業股份有限公司", taxId: "83746291", factoryLicense: "64009876", industryType: "金屬製品製造業", contact: "王大鼎", phone: "0912-345678", email: "tading@precision.com", address: "高雄市岡山區本工路88號", website: "https://www.tading.com",
                services: [{ date: "2026-07-18T16:00", manager: "樊靖畇", status: "初期評估", source: "公會引介", name: "特定工廠轉型諮詢", desc: "改善計畫編製與變更審查手續", remark: "落實接班企業諮詢體系。", quote: "350000", contract: "350000", p1: "100000", d1: "", p2: "150000", d2: "", p3: "100000", d3: "", p4: "", d4: "" }],
                lands: [{ section: "岡山段", number: "105-02", pattern: "都市計畫使用分區", customPattern: "工業區特定目的專用", currentPrice: "12000", sqm: "1500", ping: "453.75" }],
                buildingsLegal: [{ number: "402", type: "鋼構廠房", year: "2005", sqm: "800", ping: "242" }],
                buildingsIllegal: [{ type: "頂樓鋼棚加蓋", year: "2010", sqm: "400", ping: "121" }],
                electricBill: "185000", horsepower: "150", contractCapacity: "120", isHighVoltage: "否", isTimeRate: "是", timePeriod: "白天為主",
                esgHasSuccessor: "是", esgIsExport: "是", esgEuCarbon: "是", esgGreenCert: "評估中", esgStorage: "否",
                customDocsClient: ["電費單", "使用執照"], customDocsRuili: ["土地謄本", "地籍圖"], clientFiles: ["客戶廠房圖.pdf"], ruiliFiles: ["睿立核准函.png"]
            }
        ];

        let solarData = [{ id: "solar-1", date: "2026-07-18T16:30", status: "已報價", manager: "陳宥騰", companyName: "國泰鋼鐵工業廠房" }];
        let tradingData = [{ id: "trading-1", date: "2026-07-18T12:00", status: "準備簽約", manager: "鄭家承", companyName: "瑞昱地產買賣工業地案" }];
        let meetingData = [{ id: "meet-1", date: "2026-07-18T14:00", status: "結案", manager: "黃逸豪", meetSubject: "外部公會戰略對接會" }];
        let internalMeetData = [{ id: "int-1", date: "2026-07-18T09:00", status: "結案", manager: "楊裕憲", meetSubject: "M版新表單流程確認會" }];

        let selectedIds = { "case-eval": "eval-1", "solar": "solar-1", "trading": "trading-1", "meeting": "meet-1", "internal-meet": "int-1" };
        let currentActiveTab = "case-eval";

        const managersList = ["樊靖畇", "鄭家承", "陳宥騰", "楊裕憲", "楊淯淳"];
        const statusConfig = { "初期評估": "bg-emerald-500", "已報價": "bg-blue-500", "準備簽約": "bg-amber-500", "已簽約": "bg-red-500", "結案": "bg-purple-500", "沒下文": "bg-slate-600" };

        function toggleCategory(catId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            ["case-eval", "solar", "trading", "meeting", "internal-meet"].forEach(id => {
                document.getElementById(`sub-list-${id}`)?.classList.add('hidden');
            });
            document.getElementById(`sub-list-${catId}`)?.classList.remove('hidden');
            currentActiveTab = catId;
            document.getElementById(`tab-${catId}`)?.classList.add('active');
            renderSidebarSubLists(); renderMainForms();
        }

        function getTargetDataArray(tabId) {
            if (tabId === 'case-eval') return caseEvalData;
            if (tabId === 'solar') return solarData;
            if (tabId === 'trading') return tradingData;
            if (tabId === 'meeting') return meetingData;
            if (tabId === 'internal-meet') return internalMeetData;
            return [];
        }

        function renderSidebarSubLists() {
            ["case-eval", "solar", "trading", "meeting", "internal-meet"].forEach(tabId => {
                const container = document.getElementById(`sub-list-${tabId}`);
                if (!container) return;
                const dataArr = getTargetDataArray(tabId);
                container.innerHTML = dataArr.map(c => `
                    <button onclick="selectSpecificCase('${c.id}', '${tabId}')" class="w-full text-left py-1.5 px-3 rounded-lg text-xs truncate transition ${selectedIds[tabId] === c.id && currentActiveTab === tabId ? 'bg-cosmic-500 text-white font-semibold' : 'text-slate-400 hover:text-slate-200'}">
                        <i class="fa-solid fa-folder mr-2"></i>${c.companyName || c.meetSubject || '未命名項目'}
                    </button>
                `).join('');
            });
        }

        function selectSpecificCase(id, tabId) { selectedIds[tabId] = id; renderMainForms(); renderSidebarSubLists(); }

        function renderMainForms() {
            const dataArr = getTargetDataArray(currentActiveTab);
            const activeCase = dataArr.find(c => c.id === selectedIds[currentActiveTab]) || dataArr[0];
            const container = document.getElementById(currentActiveTab + "-container");
            if (!container) return;

            if (!activeCase) { container.innerHTML = "<p class='text-xs text-slate-500 p-4'>暫無子項目名單。</p>"; return; }

            if (currentActiveTab === 'case-eval') {
                container.innerHTML = generateCaseEvalHTML(activeCase);
            } else if (currentActiveTab === 'solar') {
                container.innerHTML = generateSolarHTML(activeCase);
            } else if (currentActiveTab === 'trading') {
                container.innerHTML = generateTradingHTML(activeCase);
            } else {
                container.innerHTML = generateGenericMeetHTML(activeCase);
            }
        }

        // ==================== 1. 一、專案管理 M版完美面板 ====================
        function generateCaseEvalHTML(c) {
            let totalLandSqm = c.lands.reduce((sum, l) => sum + parseFloat(l.sqm || 0), 0);
            let totalLandPing = c.lands.reduce((sum, l) => sum + parseFloat(l.ping || 0), 0);
            let totalLegalPing = c.buildingsLegal.reduce((sum, b) => sum + parseFloat(b.ping || 0), 0);
            let totalIllegalPing = c.buildingsIllegal.reduce((sum, b) => sum + parseFloat(b.ping || 0), 0);

            return `
                <div class="bg-cosmic-800/70 border border-cosmic-700/50 rounded-2xl p-6 space-y-6 shadow-xl">
                    <div class="border-b border-cosmic-700/40 pb-2"><h3 class="text-sm font-bold text-cyan-400"><i class="fa-solid fa-network-wired mr-2"></i>一、專案管理</h3></div>

                    <!-- 服務項目層 -->
                    <div class="bg-cosmic-950/40 border border-cosmic-700/30 p-4 rounded-xl space-y-4">
                        <div class="flex justify-between items-center border-b border-cosmic-700/40 pb-1.5">
                            <h4 class="text-xs font-bold text-indigo-400"><i class="fa-solid fa-layer-group mr-1.5"></i>服務項目層</h4>
                            <button onclick="addServiceRow('${c.id}')" class="text-[10px] bg-indigo-900 border border-indigo-700 px-2 py-0.5 rounded no-print">[＋ 新增服務項目]</button>
                        </div>
                        <div class="space-y-4">
                            ${c.services.map((srv, idx) => `
                                <div class="bg-cosmic-900/60 border border-cosmic-700/50 p-4 rounded-xl space-y-3 relative">
                                    <i onclick="removeServiceRow('${c.id}', ${idx})" class="fa-solid fa-circle-xmark text-red-400 absolute top-3 right-3 cursor-pointer text-sm hover:text-red-300 no-print"></i>
                                    
                                    <div class="grid grid-cols-1 md:grid-cols-4 gap-3 text-xs">
                                        <div><label class="text-slate-400 block mb-0.5">日期 / 時間</label><input type="datetime-local" value="${srv.date||''}" onchange="updateServiceField('${c.id}', ${idx}, 'date', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1 text-white"></div>
                                        <div><label class="text-slate-400 block mb-0.5">專案經理</label>
                                            <select onchange="updateServiceField('${c.id}', ${idx}, 'manager', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1 text-white">
                                                ${managersList.map(m => `<option value="${m}" ${srv.manager === m ? 'selected':''}>${m}</option>`).join('')}
                                            </select>
                                        </div>
                                        <div><label class="text-slate-400 block mb-0.5">案件狀態</label>
                                            <select onchange="updateServiceField('${c.id}', ${idx}, 'status', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1 text-white">
                                                ${Object.keys(statusConfig).map(st => `<option value="${st}" ${srv.status === st ? 'selected':''}>${st}</option>`).join('')}
                                            </select>
                                        </div>
                                        <div><label class="text-slate-400 block mb-0.5">案件來源</label><input type="text" value="${srv.source||''}" oninput="updateServiceField('${c.id}', ${idx}, 'source', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1 text-white"></div>
                                    </div>

                                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3 text-xs">
                                        <div><label class="text-slate-400 block mb-0.5">服務項目</label><input type="text" value="${srv.name||''}" oninput="updateServiceField('${c.id}', ${idx}, 'name', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1 text-white"></div>
                                        <div><label class="text-slate-400 block mb-0.5">報價金額</label><input type="number" value="${srv.quote||''}" oninput="updateServiceField('${c.id}', ${idx}, 'quote', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1 text-white"></div>
                                        <div><label class="text-slate-400 block mb-0.5">簽約金額</label><input type="number" value="${srv.contract||''}" oninput="updateServiceField('${c.id}', ${idx}, 'contract', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1 text-white"></div>
                                    </div>

                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-xs">
                                        <div><label class="text-slate-400 block mb-0.5">案件說明 (文字多行自動換行)</label><textarea oninput="updateServiceField('${c.id}', ${idx}, 'desc', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded p-1.5 text-white h-12 resize-none block whitespace-pre-wrap">${srv.desc||''}</textarea></div>
                                        <div><label class="text-slate-400 block mb-0.5">業務即時狀態備註</label><textarea oninput="updateServiceField('${c.id}', ${idx}, 'remark', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded p-1.5 text-white h-12 resize-none block">${srv.remark||''}</textarea></div>
                                    </div>

                                    <!-- 4期付款明細 -->
                                    <div class="grid grid-cols-2 md:grid-cols-4 gap-2 text-[11px] pt-2 border-t border-cosmic-700/20">
                                        ${[1,2,3,4].map(p => `
                                            <div class="bg-cosmic-950/50 p-1.5 rounded border border-cosmic-700/30">
                                                <input type="number" value="${srv['p'+p]||''}" placeholder="第${p}期金額" oninput="updateServiceField('${c.id}', ${idx}, 'p${p}', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 p-1 rounded text-white text-center mb-1">
                                                <input type="date" value="${srv['d'+p]||''}" onchange="updateServiceField('${c.id}', ${idx}, 'd${p}', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 p-1 rounded text-white text-center">
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <!-- 二、公司基本資料 -->
                    <div class="bg-cosmic-950/40 border border-cosmic-700/30 p-4 rounded-xl space-y-3">
                        <h4 class="text-xs font-bold text-cyan-400 border-b border-cosmic-700/30 pb-1.5"><i class="fa-solid fa-industry mr-1.5"></i>二、公司基本資料</h4>
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-3 text-xs">
                            <div class="md:col-span-2"><label class="text-slate-400">公司名稱</label><input type="text" value="${c.companyName}" oninput="updateCompanyName('${c.id}', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1.5 text-white font-medium"></div>
                            <div><label class="text-slate-400">統編</label><input type="text" value="${c.taxId||''}" oninput="updateField('${c.id}', 'taxId', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1.5 text-white"></div>
                            <div><label class="text-slate-400">工廠登記證字號</label><input type="text" value="${c.factoryLicense||''}" oninput="updateField('${c.id}', 'factoryLicense', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1.5 text-white"></div>
                            <div><label class="text-slate-400">產業類型</label><input type="text" value="${c.industryType||''}" oninput="updateField('${c.id}', 'industryType', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1.5 text-white"></div>
                            <div><label class="text-slate-400">聯絡人</label><input type="text" value="${c.contact||''}" oninput="updateField('${c.id}', 'contact', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1.5 text-white"></div>
                            <div><label class="text-slate-400">聯絡電話</label><input type="text" value="${c.phone||''}" oninput="updateField('${c.id}', 'phone', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1.5 text-white"></div>
                            <div><label class="text-slate-400">E-mail</label><input type="text" value="${c.email||''}" oninput="updateField('${c.id}', 'email', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1.5 text-white"></div>
                            <div class="md:col-span-2"><label class="text-slate-400">工廠地址</label><input type="text" value="${c.address||''}" oninput="updateField('${c.id}', 'address', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1.5 text-white"></div>
                            <div class="md:col-span-2"><label class="text-slate-400">公司網站連結</label><input type="text" value="${c.website||''}" oninput="updateField('${c.id}', 'website', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1.5 text-white"></div>
                        </div>
                    </div>

                    <!-- 三、土地基本資料 (對齊M版全新名詞：都市計畫使用分區 與 非都市計畫使用地類別) -->
                    <div class="bg-cosmic-950/40 border border-cosmic-700/30 p-4 rounded-xl space-y-2">
                        <div class="flex justify-between items-center border-b border-cosmic-700/30 pb-1">
                            <h4 class="text-xs font-bold text-emerald-400">三、土地基本資料 (輸入平方公尺自動連動換算 *0.3025 坪數)</h4>
                            <button onclick="addLandRow('${c.id}')" class="text-[10px] bg-emerald-900 border border-emerald-700 px-2 py-0.5 rounded no-print">[＋ 地段地號]</button>
                        </div>
                        <div class="space-y-1.5">
                            ${c.lands.map((l, idx) => `
                                <div class="grid grid-cols-6 gap-1 text-[11px]">
                                    <input type="text" value="${l.section||''}" placeholder="地段" oninput="updateLandField('${c.id}', ${idx}, 'section', this.value)" class="bg-cosmic-950 p-1 border border-cosmic-700 rounded text-white text-center">
                                    <input type="text" value="${l.number||''}" placeholder="地號" oninput="updateLandField('${c.id}', ${idx}, 'number', this.value)" class="bg-cosmic-950 p-1 border border-cosmic-700 rounded text-white text-center">
                                    
                                    <select onchange="updateLandField('${c.id}', ${idx}, 'pattern', this.value)" class="bg-cosmic-950 border border-cosmic-700 rounded text-white text-[10px] p-1 text-center font-medium">
                                        <option value="都市計畫使用分區" class="text-center" ${l.pattern==='都市計畫使用分區'?'selected':''}>都市計畫使用分區</option>
                                        <option value="非都市計畫使用地類別" class="text-center" ${l.pattern==='非都市計畫使用地類別'?'selected':''}>非都市計畫使用地類別</option>
                                    </select>
                                    <input type="text" value="${l.customPattern||''}" placeholder="自填細部類別" oninput="updateLandField('${c.id}', ${idx}, 'customPattern', this.value)" class="bg-cosmic-950 border border-cosmic-700 rounded text-white text-[10px] p-1 text-center">
                                    
                                    <input type="number" value="${l.sqm||''}" placeholder="平方公尺" oninput="calculateLandPingField('${c.id}', ${idx}, this.value)" class="bg-cosmic-950 p-1 border border-emerald-600 rounded text-white text-center font-semibold focus:border-emerald-400">
                                    <input type="number" value="${l.ping||''}" placeholder="自動換算坪" id="calc-ping-${idx}" readonly class="bg-cosmic-900 p-1 border border-cosmic-700 rounded text-slate-400 text-center">
                                </div>
                            `).join('')}
                        </div>
                        <div class="p-2.5 bg-cosmic-950 rounded text-xs mt-2 flex justify-between border border-cosmic-700/40">
                            <span>土地總面積平方公尺累加: <strong class="text-emerald-400" id="sum-land-sqm">${totalLandSqm}</strong> ㎡</span>
                            <span>土地總面積換算總坪數: <strong class="text-emerald-400" id="sum-land-ping">${totalLandPing.toFixed(2)}</strong> 坪</span>
                        </div>
                    </div>

                    <!-- 四、建物基本資料 (有保存登記新增建物類別) -->
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 text-xs">
                        <div class="bg-cosmic-950/40 border border-cosmic-700/30 p-4 rounded-xl space-y-2">
                            <div class="flex justify-between items-center border-b border-cosmic-700/20 pb-1">
                                <span class="font-bold text-blue-400">四、有保存登記建物明細</span>
                                <button onclick="addBuildRow('${c.id}', 'legal')" class="text-[10px] bg-blue-900 border border-blue-700 px-1.5 py-0.5 rounded no-print">[＋ 建號]</button>
                            </div>
                            <div class="space-y-1">${c.buildingsLegal.map((b, i) => `
                                <div class="grid grid-cols-4 gap-1">
                                    <input type="text" value="${b.number||''}" placeholder="建號" oninput="updateBuildField('${c.id}', 'legal', ${i}, 'number', this.value)" class="bg-cosmic-950 p-1 text-white border border-cosmic-700 rounded text-center">
                                    <input type="text" value="${b.type||''}" placeholder="建物類別" oninput="updateBuildField('${c.id}', 'legal', ${i}, 'type', this.value)" class="bg-cosmic-950 p-1 text-white border border-cosmic-700 rounded text-center">
                                    <input type="text" value="${b.year||''}" placeholder="建造年份" oninput="updateBuildField('${c.id}', 'legal', ${i}, 'year', this.value)" class="bg-cosmic-950 p-1 text-white border border-cosmic-700 rounded text-center">
                                    <input type="number" value="${b.ping||''}" placeholder="坪數" oninput="updateBuildField('${c.id}', 'legal', ${i}, 'ping', this.value); refreshSums();" class="bg-cosmic-950 p-1 text-white border border-cosmic-700 rounded text-center">
                                </div>
                            `).join('')}</div>
                            <div class="pt-1 text-[11px]">有保存登記總坪數: <strong class="text-blue-400" id="sum-legal-ping">${totalLegalPing}</strong> 坪</div>
                        </div>
                        <div class="bg-cosmic-950/40 border border-cosmic-700/30 p-4 rounded-xl space-y-2">
                            <div class="flex justify-between items-center border-b border-cosmic-700/20 pb-1">
                                <span class="font-bold text-red-400">四、違章建物明細</span>
                                <button onclick="addBuildRow('${c.id}', 'illegal')" class="text-[10px] bg-red-950 border border-red-900 px-1.5 py-0.5 rounded no-print">[＋ 違章建物]</button>
                            </div>
                            <div class="space-y-1">${c.buildingsIllegal.map((b, i) => `
                                <div class="grid grid-cols-3 gap-1"><input type="text" value="${b.type||''}" placeholder="類別" oninput="updateBuildField('${c.id}', 'illegal', ${i}, 'type', this.value)" class="bg-cosmic-950 p-1 text-white border border-cosmic-700 rounded text-center"><input type="text" value="${b.year||''}" placeholder="建造年份" oninput="updateBuildField('${c.id}', 'illegal', ${i}, 'year', this.value)" class="bg-cosmic-950 p-1 text-white border border-cosmic-700 rounded text-center"><input type="number" value="${b.ping||''}" placeholder="坪數" oninput="updateBuildField('${c.id}', 'illegal', ${i}, 'ping', this.value); refreshSums();" class="bg-cosmic-950 p-1 text-white border border-cosmic-700 rounded text-center"></div>
                            `).join('')}</div>
                            <div class="pt-1 text-[11px]">違章建物總坪數: <strong class="text-red-400" id="sum-illegal-ping">${totalIllegalPing}</strong> 坪</div>
                        </div>
                    </div>

                    <!-- 七、應備文件清單 -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs">
                        <div class="bg-cosmic-950/40 border border-cosmic-700/40 p-4 rounded-xl space-y-2">
                            <div class="flex justify-between items-center border-b border-cosmic-700/30 pb-1">
                                <span class="font-bold text-violet-400">七、客戶應備文件清單</span>
                                <button onclick="addDocItem('${c.id}', 'client')" class="text-[10px] bg-violet-900 px-2 rounded no-print">[＋ 新增]</button>
                            </div>
                            <div class="space-y-1">${c.customDocsClient.map((d, i) => `<div class="flex justify-between bg-cosmic-950 p-1.5 rounded border border-cosmic-700/40"><label class="flex items-center space-x-2"><input type="checkbox" checked class="text-violet-500"><span>${d}</span></label><i onclick="removeDocItem('${c.id}', 'client', i)" class="fa-solid fa-trash text-red-400 cursor-pointer no-print"></i></div>`).join('')}</div>
                        </div>
                        <div class="bg-cosmic-950/40 border border-cosmic-700/40 p-4 rounded-xl space-y-2">
                            <div class="flex justify-between items-center border-b border-cosmic-700/30 pb-1">
                                <span class="font-bold text-cyan-400">七、睿立調閱文件清單</span>
                                <button onclick="addDocItem('${c.id}', 'ruili')" class="text-[10px] bg-cyan-900 px-2 rounded no-print">[＋ 新增]</button>
                            </div>
                            <div class="space-y-1">${c.customDocsRuili.map((d, i) => `<div class="flex justify-between bg-cosmic-950 p-1.5 rounded border border-cosmic-700/40"><label class="flex items-center space-x-2"><input type="checkbox" checked class="text-cyan-500"><span>${d}</span></label><i onclick="removeDocItem('${c.id}', 'ruili', i)" class="fa-solid fa-trash text-red-400 cursor-pointer no-print"></i></div>`).join('')}</div>
                        </div>
                    </div>

                    <!-- 八、檔案上傳 (🟢 全新升級：捨棄彈窗，直連電腦硬碟、照片與雲端夾) -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs">
                        <div class="bg-cosmic-950/40 border border-cosmic-700/40 p-4 rounded-xl space-y-3">
                            <div class="flex justify-between items-center border-b border-violet-500/30 pb-1">
                                <span class="font-bold text-violet-400"><i class="fa-solid fa-cloud-arrow-up mr-1.5"></i>八、客戶應備檔案上傳</span>
                                <label class="text-[10px] bg-violet-900 text-white px-2.5 py-1 rounded cursor-pointer font-medium hover:bg-violet-800 transition no-print">
                                    [＋ 上傳各類型檔案]
                                    <input type="file" multiple class="hidden" onchange="handleNativeUpload(this, '${c.id}', 'client')">
                                </label>
                            </div>
                            <div class="space-y-1" id="file-list-client">
                                ${c.clientFiles.map((f, i) => `<div class="flex justify-between items-center bg-cosmic-950/80 p-2 rounded border border-cosmic-700/40"><span class="text-slate-300 truncate max-w-[200px]"><i class="fa-solid fa-file-shield mr-2 text-violet-400"></i>${f}</span><i onclick="removeUploadedFile('${c.id}', 'client', ${i})" class="fa-solid fa-trash text-red-400 cursor-pointer no-print"></i></div>`).join('')}
                            </div>
                        </div>

                        <div class="bg-cosmic-950/40 border border-cosmic-700/40 p-4 rounded-xl space-y-3">
                            <div class="flex justify-between items-center border-b border-cyan-500/30 pb-1">
                                <span class="font-bold text-cyan-400"><i class="fa-solid fa-cloud-arrow-up mr-1.5"></i>八、睿立調閱檔案上傳</span>
                                <label class="text-[10px] bg-cyan-900 text-white px-2.5 py-1 rounded cursor-pointer font-medium hover:bg-cyan-800 transition no-print">
                                    [＋ 上傳各類型檔案]
                                    <input type="file" multiple class="hidden" onchange="handleNativeUpload(this, '${c.id}', 'ruili')">
                                </label>
                            </div>
                            <div class="space-y-1" id="file-list-ruili">
                                ${c.ruiliFiles.map((f, i) => `<div class="flex justify-between items-center bg-cosmic-950/80 p-2 rounded border border-cosmic-700/40"><span class="text-slate-300 truncate max-w-[200px]"><i class="fa-solid fa-file-signature mr-2 text-cyan-400"></i>${f}</span><i onclick="removeUploadedFile('${c.id}', 'ruili', ${i})" class="fa-solid fa-trash text-red-400 cursor-pointer no-print"></i></div>`).join('')}
                            </div>
                        </div>
                    </div>

                    ${generateFooterHTML()}
                </div>
            `;
        }

        // ==================== 其它模組面板 ====================
        function generateSolarHTML(c) {
            return `<div class="bg-cosmic-800/70 border border-amber-500/40 rounded-2xl p-6 space-y-4 shadow-xl"><h3 class="text-sm font-bold text-amber-400"><i class="fa-solid fa-solar-panel mr-2"></i>二、工廠太陽能自建評估</h3><input type="text" value="${c.companyName}" oninput="updateCompanyName('${c.id}', this.value)" class="bg-cosmic-950 border border-cosmic-700 rounded p-1.5 text-white text-xs w-full">${generateFooterHTML()}</div>`;
        }
        function generateTradingHTML(c) {
            return `<div class="bg-cosmic-800/70 border border-emerald-500/40 rounded-2xl p-6 space-y-4 shadow-xl"><h3 class="text-sm font-bold text-emerald-400"><i class="fa-solid fa-building-circle-arrow-right mr-2"></i>三、工廠買賣案件資料表</h3><input type="text" value="${c.companyName}" oninput="updateCompanyName('${c.id}', this.value)" class="bg-cosmic-950 border border-cosmic-700 rounded p-1.5 text-white text-xs w-full">${generateFooterHTML()}</div>`;
        }
        function generateGenericMeetHTML(c) {
            return `<div class="bg-cosmic-800/70 border border-purple-500/40 rounded-2xl p-6 space-y-4 shadow-xl"><h3 class="text-sm font-bold text-purple-400"><i class="fa-solid fa-comments mr-2"></i>會議及戰略紀錄</h3><input type="text" value="${c.meetSubject||''}" oninput="let target=getTargetDataArray(currentActiveTab).find(x=>x.id==='${c.id}'); if(target){target.meetSubject=this.value; renderSidebarSubLists();}" class="bg-cosmic-950 border border-cosmic-700 rounded p-1.5 text-white text-xs w-full">${generateFooterHTML()}</div>`;
        }

        // ⚠️ 依要求將底部最後一行「備註說明：此文件....」整行拔除的全新淨空頁尾
        function generateFooterHTML() {
            return `
                <footer class="bg-cosmic-950 px-6 py-4 border-t border-cosmic-700/40 text-[11px] text-slate-400 flex flex-col items-center space-y-1.5 mt-6">
                    <div class="flex flex-wrap justify-center gap-x-6 font-medium">
                        <span>睿立資產管理顧問有限公司 (統編: 90411790)</span>
                        <span>元業綠能驗證有限公司 (統編: 90000831)</span>
                        <span>天梁不動產股份有限公司 (統編: 93628169)</span>
                    </div>
                    <div class="flex flex-wrap justify-center gap-x-4 text-slate-500 text-[10px]">
                        <span>TEL: 07-222-5595</span><span>FAX: 07-269-3091</span><span>E-mail: ruilu1101108@gmail.com</span><span>ADD: 高雄市苓雅區新光路38號30樓之2</span>
                    </div>
                </footer>
            `;
        }

        // ==================== 聯動核心函數群 ====================
        function updateField(id, field, value) { getTargetDataArray(currentActiveTab).find(c => c.id === id)[field] = value; }
        function updateCompanyName(id, value) {
            let target = getTargetDataArray(currentActiveTab).find(c => c.id === id);
            if (target) { target.companyName = value; renderSidebarSubLists(); }
        }
        function updateServiceField(id, idx, field, value) { caseEvalData.find(c => c.id === id).services[idx][field] = value; }
        function updateLandField(id, idx, field, value) { caseEvalData.find(c => c.id === id).lands[idx][field] = value; }
        
        function calculateLandPingField(id, idx, sqmVal) {
            let target = caseEvalData.find(c => c.id === id);
            if (target && target.lands[idx]) {
                const sqm = parseFloat(sqmVal || 0);
                const ping = sqm * 0.3025;
                target.lands[idx].sqm = sqm;
                target.lands[idx].ping = parseFloat(ping.toFixed(2));
                const pingInput = document.getElementById(`calc-ping-${idx}`);
                if(pingInput) pingInput.value = ping.toFixed(2);
                refreshSums();
            }
        }

        function updateBuildField(id, side, idx, field, value) {
            let target = caseEvalData.find(c => c.id === id);
            if(side === 'legal') target.buildingsLegal[idx][field] = value;
            else target.buildingsIllegal[idx][field] = value;
        }

        function addServiceRow(id) { caseEvalData.find(c => c.id === id).services.push({ date: "", manager: "樊靖畇", status: "初期評估", source: "", name: "", desc: "", remark: "", quote: "", contract: "", p1:"", d1:"", p2:"", d2:"", p3:"", d3:"", p4:"", d4:"" }); renderMainForms(); }
        function removeServiceRow(id, idx) { caseEvalData.find(c => c.id === id).services.splice(idx, 1); renderMainForms(); }
        function addLandRow(id) { caseEvalData.find(c => c.id === id).lands.push({ section: "", number: "", pattern: "都市計畫使用分區", customPattern: "", currentPrice: "", sqm: 0, ping: 0 }); renderMainForms(); }
        function addBuildRow(id, side) {
            let target = caseEvalData.find(c => c.id === id);
            if (side === 'legal') target.buildingsLegal.push({ number: "", type: "", year: "", sqm: "", ping: "" });
            else target.buildingsIllegal.push({ type: "", year: "", sqm: "", ping: "" });
            renderMainForms();
        }

        function addDocItem(id, side) {
            let item = prompt("請輸入新增的文件項目：");
            if (item) {
                let target = caseEvalData.find(c => c.id === id);
                if (side === 'client') target.customDocsClient.push(item);
                else target.customDocsRuili.push(item);
                renderMainForms();
            }
        }
        function removeDocItem(id, side, idx) {
            let target = caseEvalData.find(c => c.id === id);
            if (side === 'client') target.customDocsClient.splice(idx, 1);
            else target.customDocsRuili.splice(idx, 1);
            renderMainForms();
        }

        // 🟢 突破性更新：原生檔案瀏覽器選取與照片直連處理機制
        function handleNativeUpload(inputEl, id, side) {
            let target = caseEvalData.find(c => c.id === id);
            if (target && inputEl.files) {
                for (let i = 0; i < inputEl.files.length; i++) {
                    let file = inputEl.files[i];
                    if(side === 'client') target.clientFiles.push(file.name);
                    else target.ruiliFiles.push(file.name);
                }
                renderMainForms();
            }
        }
        function removeUploadedFile(id, side, idx) {
            let target = caseEvalData.find(c => c.id === id);
            if(side === 'client') target.clientFiles.splice(idx, 1);
            else target.ruiliFiles.splice(idx, 1);
            renderMainForms();
        }

        function refreshSums() {
            let activeCase = caseEvalData.find(c => c.id === selectedIds["case-eval"]);
            if (!activeCase || currentActiveTab !== 'case-eval') return;
            let totalLandSqm = activeCase.lands.reduce((sum, l) => sum + parseFloat(l.sqm || 0), 0);
            let totalLandPing = activeCase.lands.reduce((sum, l) => sum + parseFloat(l.ping || 0), 0);
            document.getElementById("sum-land-sqm").innerText = totalLandSqm;
            document.getElementById("sum-land-ping").innerText = totalLandPing.toFixed(2);
            document.getElementById("sum-legal-ping").innerText = activeCase.buildingsLegal.reduce((sum, b) => sum + parseFloat(b.ping || 0), 0);
            document.getElementById("sum-illegal-ping").innerText = activeCase.buildingsIllegal.reduce((sum, b) => sum + parseFloat(b.ping || 0), 0);
        }

        function addNewCase() {
            const nid = "id-" + Date.now();
            let dataArr = getTargetDataArray(currentActiveTab);
            let obj = { id: nid, date: new Date().toISOString().slice(0, 16), status: "初期評估", manager: "樊靖畇" };
            if(currentActiveTab==='case-eval') {
                obj.companyName = "全新公司案件 " + (dataArr.length + 1); obj.services = []; obj.lands = []; obj.buildingsLegal = []; obj.buildingsIllegal = []; obj.customDocsClient = ["電費單"]; obj.customDocsRuili = ["土地謄本"]; obj.clientFiles = []; obj.ruiliFiles = [];
            } else {
                obj.companyName = "新自建項目 " + (dataArr.length + 1); obj.meetSubject = "新研討主題";
            }
            dataArr.unshift(obj); selectedIds[currentActiveTab] = nid;
            renderSidebarSubLists(); renderMainForms();
        }

        function saveToCloud() { alert("M版原生硬碟照片夾直連機制：數據已100%雲端校對完成。"); }
        window.onload = function() { toggleCategory('case-eval'); };
    </script>
</body>
</html>
