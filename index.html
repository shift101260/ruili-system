<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>睿立業務系統 - 核心管理平台</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome 圖標 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cosmic: {
                            950: '#060b19', // 深邃基底
                            900: '#0a142c', // 左側導覽
                            800: '#112246', // 卡片區塊
                            700: '#1a3160', // 輸入框/邊框
                            600: '#234280', // 次要互動
                            500: '#315cb5', // 主色調亮藍
                            400: '#4c7cd4'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #060b19; color: #e2e8f0; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0a142c; }
        ::-webkit-scrollbar-thumb { background: #1a3160; border-radius: 3px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <!-- LEFT SIDEBAR -->
    <aside class="w-72 bg-cosmic-900 border-r border-cosmic-700/50 flex flex-col justify-between shrink-0 select-none">
        <div>
            <!-- LOGO 區域 -->
            <div class="p-6 border-b border-cosmic-700/30 flex items-center space-x-3">
                <div class="w-10 h-10 bg-gradient-to-tr from-cosmic-500 to-cyan-400 rounded-xl flex items-center justify-center shadow-lg shadow-cosmic-500/20">
                    <i class="fa-solid fa-chart-network text-white text-lg"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-wider text-white">睿立集團</h1>
                    <p class="text-xs text-slate-400">RUILI GROUP SYSTEM</p>
                </div>
            </div>

            <!-- 導覽功能列表 -->
            <nav class="p-4 space-y-1.5 overflow-y-auto max-h-[calc(100vh-160px)]">
                
                <!-- 1. 案件評估大項目 -->
                <div>
                    <button onclick="toggleCategory('case-eval')" id="btn-case-eval" class="w-full flex items-center justify-between px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-folder-open w-5 text-center text-cyan-400"></i>
                            <span class="font-medium text-sm tracking-wide">案件評估</span>
                        </div>
                        <i id="arrow-case-eval" class="fa-solid fa-chevron-down text-xs text-slate-500 transition-transform duration-200"></i>
                    </button>
                    <!-- 動態展開子清單容器 -->
                    <div id="sub-list-case-eval" class="hidden pl-9 pr-2 mt-1 space-y-1 border-l border-cosmic-700/40 ml-6">
                        <!-- JS 動態插入已儲存案件 -->
                    </div>
                </div>

                <!-- 2. 工廠太陽能自建 -->
                <div>
                    <button onclick="toggleCategory('solar')" id="btn-solar" class="w-full flex items-center justify-between px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-solar-panel w-5 text-center text-amber-400"></i>
                            <span class="font-medium text-sm tracking-wide">工廠太陽能自建</span>
                        </div>
                        <i id="arrow-solar" class="fa-solid fa-chevron-down text-xs text-slate-500 transition-transform duration-200"></i>
                    </button>
                    <!-- 動態展開子清單容器 -->
                    <div id="sub-list-solar" class="hidden pl-9 pr-2 mt-1 space-y-1 border-l border-cosmic-700/40 ml-6">
                        <!-- JS 動態插入太陽能案件 -->
                    </div>
                </div>

                <!-- 3. 工廠買賣案件資料表 -->
                <button onclick="switchTab('trading')" id="btn-trading" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60 text-left">
                    <i class="fa-solid fa-building-circle-arrow-right w-5 text-center text-emerald-400"></i>
                    <span class="font-medium text-sm tracking-wide">工廠買賣案件資料表</span>
                </button>

                <!-- 4. 公司會議記錄 -->
                <button onclick="switchTab('internal-meet')" id="btn-internal-meet" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60 text-left">
                    <i class="fa-solid fa-comments w-5 text-center text-indigo-400"></i>
                    <span class="font-medium text-sm tracking-wide">公司會議記錄</span>
                </button>

                <!-- 5. 合作夥伴會議記錄 -->
                <button onclick="switchTab('partner-meet')" id="btn-partner-meet" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60 text-left">
                    <i class="fa-solid fa-handshake w-5 text-center text-purple-400"></i>
                    <span class="font-medium text-sm tracking-wide">合作夥伴會議記錄</span>
                </button>
            </nav>
        </div>

        <!-- 側邊欄下方個人資訊 -->
        <div class="p-4 border-t border-cosmic-700/30 bg-cosmic-950/40">
            <div class="flex items-center space-x-3">
                <div class="w-9 h-9 rounded-full bg-cosmic-700 flex items-center justify-center font-bold text-sm text-cyan-300 border border-cosmic-500/30">
                    經理
                </div>
                <div class="overflow-hidden">
                    <p class="text-xs text-slate-400">專案登入身分</p>
                    <p class="text-sm font-medium text-slate-200 truncate">系統管理員</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT CONTAINER -->
    <main class="flex-1 flex flex-col overflow-hidden bg-cosmic-950">
        
        <!-- TOP CONTROL BAR -->
        <header class="h-16 border-b border-cosmic-700/40 px-8 flex items-center justify-between shrink-0 bg-cosmic-900/40 backdrop-blur-md">
            <div class="flex items-center space-x-4">
                <div class="relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                    <input type="text" id="global-search" oninput="filterCases()" placeholder="關鍵字檢索公司名稱/統編/地號..." class="w-80 bg-cosmic-950 border border-cosmic-700 rounded-xl pl-10 pr-4 py-1.5 text-sm focus:outline-none focus:border-cosmic-500 transition placeholder-slate-500">
                </div>
            </div>
            <div class="flex items-center space-x-3">
                <button onclick="addNewCase()" class="bg-gradient-to-r from-cosmic-500 to-blue-600 hover:from-cosmic-400 hover:to-blue-500 text-white text-xs font-semibold px-4 py-2 rounded-xl flex items-center space-x-1.5 shadow-lg shadow-cosmic-500/10 transition">
                    <i class="fa-solid fa-plus"></i>
                    <span>＋ 新增公司案件</span>
                </button>
                <button onclick="window.print()" class="bg-cosmic-800 hover:bg-cosmic-700 text-slate-300 text-xs font-semibold px-3.5 py-2 rounded-xl border border-cosmic-700/60 transition">
                    <i class="fa-solid fa-print mr-1"></i> 匯出/列印
                </button>
                <button onclick="saveToCloud()" class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-semibold px-4 py-2 rounded-xl transition flex items-center space-x-1.5 shadow-md">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <span>儲存同步</span>
                </button>
            </div>
        </header>

        <!-- ROUTING TABS VIEWPORT -->
        <div class="flex-1 overflow-y-auto p-8">
            
            <!-- TAB 1: 案件評估 (CORE ARCHITECTURE) -->
            <section id="tab-case-eval" class="tab-content active space-y-6">
                <div>
                    <h2 class="text-2xl font-bold text-white tracking-wide">案件評估管理層</h2>
                    <p class="text-xs text-slate-400 mt-1">即時維護與評估工廠基礎資料、地籍與 ESG 指標</p>
                </div>
                <div id="cases-loop-container" class="space-y-8">
                    <!-- 案件詳情表單會在這裡渲染 -->
                </div>
            </section>

            <!-- TAB 2: 工廠太陽能自建 -->
            <section id="tab-solar" class="tab-content space-y-6">
                <div>
                    <h2 class="text-2xl font-bold text-amber-400 tracking-wide">工廠太陽能自建工程模組</h2>
                    <p class="text-xs text-slate-400 mt-1">專注於光電容量、綠電躉購與碳資產效益最大化評估</p>
                </div>
                <div id="solar-loop-container" class="space-y-8">
                    <!-- 太陽能特定檢視表單會在這裡渲染 -->
                </div>
            </section>

            <!-- TAB 3: 工廠買賣案件資料表 -->
            <section id="tab-trading" class="tab-content space-y-6">
                <div class="bg-cosmic-800/40 border border-cosmic-700/40 rounded-2xl p-8 text-center py-20">
                    <div class="w-16 h-16 bg-emerald-500/10 text-emerald-400 rounded-full flex items-center justify-center mx-auto text-2xl mb-4">
                        <i class="fa-solid fa-building-circle-arrow-right"></i>
                    </div>
                    <h3 class="text-xl font-bold text-white">工廠買賣案件資料表</h3>
                    <p class="text-slate-400 text-sm max-w-md mx-auto mt-2">媒合特定工廠、合法丁建土地流轉，整合買賣方意願需求。</p>
                </div>
            </section>

            <!-- TAB 4: 公司會議記錄 -->
            <section id="tab-internal-meet" class="tab-content space-y-6">
                <div class="bg-cosmic-800/40 border border-cosmic-700/40 rounded-2xl p-8 text-center py-20">
                    <div class="w-16 h-16 bg-indigo-500/10 text-indigo-400 rounded-full flex items-center justify-center mx-auto text-2xl mb-4">
                        <i class="fa-solid fa-comments"></i>
                    </div>
                    <h3 class="text-xl font-bold text-white">公司內部會議記錄</h3>
                    <p class="text-slate-400 text-sm max-w-md mx-auto mt-2">記錄工廠改善方案進度、跨部門政策追蹤與內部工作指派。</p>
                </div>
            </section>

            <!-- TAB 5: 合作夥伴會議記錄 -->
            <section id="tab-partner-meet" class="tab-content space-y-6">
                <div class="bg-cosmic-800/40 border border-cosmic-700/40 rounded-2xl p-8 text-center py-20">
                    <div class="w-16 h-16 bg-purple-500/10 text-purple-400 rounded-full flex items-center justify-center mx-auto text-2xl mb-4">
                        <i class="fa-solid fa-handshake"></i>
                    </div>
                    <h3 class="text-xl font-bold text-white">合作夥伴會議記錄</h3>
                    <p class="text-slate-400 text-sm max-w-md mx-auto mt-2">與地政士事務所、綠能技師、公會代表聯席會議之決議備忘錄。</p>
                </div>
            </section>

        </div>
    </main>

    <!-- CORE LOGIC AND EVENT BINDINGS -->
    <script>
        // 1. 狀態管理層 (Global State) -> casesArray
        let casesData = [
            {
                id: "case-1",
                date: "2026-07-18T10:00",
                status: "初期評估",
                manager: "樊靖畇",
                remark: "大鼎精密頂樓欲規劃 200kWp 太陽能自建。",
                source: "公會轉介",
                companyName: "大鼎精密工業股份有限公司",
                taxId: "83746291",
                factoryLicense: "64009876",
                industryType: "金屬製品製造業",
                contact: "王大鼎",
                phone: "0912-345678",
                email: "tading@precision.com",
                address: "高雄市岡山區本工路88號",
                services: [
                    { name: "特定工廠合法化轉型", desc: "特定工廠登記申請及實質改善計畫", result: "可行，符合建蔽率規定", quote: "350000" },
                    { name: "屋頂太陽能自建評估", desc: "綠能一體化設計", result: "估計可建置 200kWp", quote: "120000" }
                ],
                lands: [{ section: "岡山段", number: "105-002", sqm: "1500", ping: "453.75" }],
                landTotalSqm: "1500", landTotalPing: "453.75",
                landPattern: "都市計畫外使用地類別", landRemark: "特定農業區丁種建築用地",
                buildings: [{ number: "建號 402", sqm: "800", ping: "242" }],
                buildYear: "2005", legalBuildPing: "242", illegalBuildPing: "120", buildRemark: "",
                esg: {
                    hasSuccessor: "是", isExport: "是", euCarbonRequired: "是",
                    avgElectricBill: "185000", horsepower: "150", contractCapacity: "120",
                    isHighVoltage: "否", isTimeRate: "是", electricTimePeriods: ["白天為主"]
                },
                docsChecked: ["電費單", "使用執照"],
                uploadedFilesCount: 2, ruili调阅FilesCount: 1,
                hasSolarProject: true // 用於太陽能篩選過濾
            },
            {
                id: "case-2",
                date: "2026-07-18T14:30",
                status: "準備簽約",
                manager: "鄭家承",
                remark: "第二代接班推動綠能減碳轉型，評估純太陽能融資案。",
                source: "老客戶介紹",
                companyName: "旭東橡膠製品廠",
                taxId: "22091834",
                factoryLicense: "64001122",
                industryType: "橡膠製品製造業",
                contact: "林旭東",
                phone: "0933-111222",
                email: "xudong@rubber.com",
                address: "高雄市路竹區環球路12號",
                services: [
                    { name: "屋頂太陽能自建評估", desc: "完全自發自用減碳規劃", result: "可行，面積寬廣", quote: "180000" }
                ],
                lands: [{ section: "路竹段", number: "88-15", sqm: "2200", ping: "665.5" }],
                landTotalSqm: "2200", landTotalPing: "665.5",
                landPattern: "都市計畫內使用分區", landRemark: "乙種工業區",
                buildings: [{ number: "建號 112", sqm: "1400", ping: "423.5" }],
                buildYear: "2012", legalBuildPing: "423.5", illegalBuildPing: "0", buildRemark: "",
                esg: {
                    hasSuccessor: "是", isExport: "否", euCarbonRequired: "否",
                    avgElectricBill: "320000", horsepower: "200", contractCapacity: "250",
                    isHighVoltage: "開", isTimeRate: "是", electricTimePeriods: ["平均分佈"]
                },
                docsChecked: ["電費單", "屋頂平面圖"],
                uploadedFilesCount: 1, ruili调阅FilesCount: 0,
                hasSolarProject: true
            }
        ];

        const managersList = ["樊靖畇", "鄭家承", "陳宥騰", "楊裕憲", "黃逸豪", "李宜璇", "王瑋聆", "許先生"];
        const statusConfig = {
            "初期評估": "bg-emerald-600 text-white",
            "已報價": "bg-blue-600 text-white",
            "準備簽約": "bg-amber-500 text-slate-900",
            "已簽約": "bg-red-600 text-white",
            "結案": "bg-purple-600 text-white",
            "沒下文": "bg-slate-700 text-white"
        };

        // 1. 狀態管理層 -> sidebarExpandedCategory
        let currentActiveTab = 'case-eval';
        let currentSelectedCaseId = 'case-1'; 

        // 核心觸行動機：切換及折疊左側大分類選單
        function toggleCategory(catId) {
            const subList = document.getElementById(`sub-list-${catId}`);
            const arrow = document.getElementById(`arrow-${catId}`);
            const isHidden = subList.classList.contains('hidden');

            // 收合所有其他大分類子選單
            document.getElementById('sub-list-case-eval').classList.add('hidden');
            document.getElementById('sub-list-solar').classList.add('hidden');
            document.getElementById('arrow-case-eval').classList.remove('rotate-180');
            document.getElementById('arrow-solar').classList.remove('rotate-180');

            // 展開點擊的分類
            if (isHidden) {
                subList.classList.remove('hidden');
                arrow.classList.add('rotate-180');
                renderSidebarSubLists(); 
            }
            
            switchTab(catId);
        }

        // 迴圈動態渲染夾在中間的儲存案件清單
        function renderSidebarSubLists() {
            // 一、渲染「案件評估」與「工廠太陽能自建」之間的案件清單
            const caseEvalContainer = document.getElementById('sub-list-case-eval');
            caseEvalContainer.innerHTML = casesData.map(c => `
                <button onclick="selectSpecificCase('${c.id}', 'case-eval')" class="w-full text-left py-1.5 px-3 rounded-lg text-xs truncate transition ${currentSelectedCaseId === c.id && currentActiveTab === 'case-eval' ? 'bg-cosmic-500 text-white font-semibold' : 'text-slate-400 hover:text-slate-200 hover:bg-cosmic-800/40'}">
                    <i class="fa-solid fa-folder mr-2 opacity-70 text-cyan-400"></i>${c.companyName}
                </button>
            `).join('');

            // 二、渲染「工廠太陽能自建」與「工廠買賣案件資料表」之間的案件清單
            const solarContainer = document.getElementById('sub-list-solar');
            // 只過濾篩選出有做太陽能自建項目的案件
            const solarCases = casesData.filter(c => c.hasSolarProject);
            solarContainer.innerHTML = solarCases.map(c => `
                <button onclick="selectSpecificCase('${c.id}', 'solar')" class="w-full text-left py-1.5 px-3 rounded-lg text-xs truncate transition ${currentSelectedCaseId === c.id && currentActiveTab === 'solar' ? 'bg-amber-600 text-white font-semibold' : 'text-slate-400 hover:text-slate-200 hover:bg-cosmic-800/40'}">
                    <i class="fa-solid fa-sun mr-2 opacity-70 text-amber-400"></i>${c.companyName}
                </button>
            `).join('');
        }

        function selectSpecificCase(caseId, tabId) {
            currentSelectedCaseId = caseId;
            currentActiveTab = tabId;
            
            document.getElementById(`sub-list-${tabId}`).classList.remove('hidden');
            document.getElementById(`arrow-${tabId}`).classList.add('rotate-180');

            switchTab(tabId);
        }

        function switchTab(tabId) {
            currentActiveTab = tabId;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            
            document.querySelectorAll('nav button[id^="btn-"]').forEach(el => {
                el.classList.remove('bg-cosmic-800', 'text-white');
            });
            const activeBtn = document.getElementById(`btn-${tabId}`);
            if(activeBtn) {
                activeBtn.classList.add('bg-cosmic-800', 'text-white');
            }

            renderSidebarSubLists();
            renderMainForms();
        }

        function renderMainForms() {
            const activeCase = casesData.find(c => c.id === currentSelectedCaseId) || casesData[0];
            if (!activeCase) return;

            if (currentActiveTab === 'case-eval') {
                document.getElementById("cases-loop-container").innerHTML = generateFormHTML(activeCase, 'eval');
            }
            if (currentActiveTab === 'solar') {
                document.getElementById("solar-loop-container").innerHTML = generateFormHTML(activeCase, 'solar');
            }
        }

        function generateFormHTML(c, mode) {
            const isSolarMode = mode === 'solar';
            return `
                <div class="bg-cosmic-800/70 border ${isSolarMode ? 'border-amber-500/30':'border-cosmic-700/50'} rounded-2xl shadow-xl overflow-hidden backdrop-blur-sm">
                    <div class="bg-cosmic-900/60 px-6 py-4 border-b border-cosmic-700/50 flex flex-wrap items-center justify-between gap-4">
                        <div class="flex items-center space-x-4">
                            <div>
                                <label class="block text-[11px] text-slate-400 mb-1">日期 / 時間</label>
                                <input type="datetime-local" value="${c.date}" onchange="updateField('${c.id}', 'date', this.value)" class="bg-cosmic-950 border border-cosmic-700 rounded-lg px-2.5 py-1 text-xs text-slate-200">
                            </div>
                            <div>
                                <label class="block text-[11px] text-slate-400 mb-1">案件狀態</label>
                                <select onchange="updateField('${c.id}', 'status', this.value); renderMainForms();" class="bg-cosmic-950 border border-cosmic-700 rounded-lg px-2.5 py-1 text-xs font-semibold ${statusConfig[c.status] || 'bg-slate-700'}">
                                    ${Object.keys(statusConfig).map(st => `<option value="${st}" ${c.status === st ? 'selected':''}>${st}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="p-6 space-y-6">
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div class="lg:col-span-2 bg-cosmic-950/40 border border-cosmic-700/30 p-4 rounded-xl space-y-3">
                                <h4 class="text-xs font-bold ${isSolarMode?'text-amber-400':'text-cyan-400'} tracking-wide border-b border-cosmic-700/30 pb-1.5">
                                    <i class="fa-solid fa-industry mr-1.5"></i>${isSolarMode ? '☀️ 太陽能工程建置檢視':'📁 工廠法規評估檢視'} - ${c.companyName}
                                </h4>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                                    <div>
                                        <label class="text-[11px] text-slate-400">公司名稱</label>
                                        <input type="text" value="${c.companyName}" oninput="updateField('${c.id}', 'companyName', this.value); renderSidebarSubLists();" class="w-full bg-cosmic-900 border border-cosmic-700 rounded-lg px-2.5 py-1.5 text-xs text-white">
                                    </div>
                                    <div>
                                        <label class="text-[11px] text-slate-400">工廠地址</label>
                                        <input type="text" value="${c.address}" oninput="updateField('${c.id}', 'address', this.value)" class="w-full bg-cosmic-900 border border-cosmic-700 rounded-lg px-2.5 py-1.5 text-xs text-white">
                                    </div>
                                </div>
                            </div>
                            <div class="bg-cosmic-950/40 border border-cosmic-700/30 p-4 rounded-xl">
                                <h4 class="text-xs font-bold text-slate-300 border-b border-cosmic-700/30 pb-1.5 mb-2">即時狀態備註</h4>
                                <textarea oninput="updateField('${c.id}', 'remark', this.value)" class="w-full bg-cosmic-900 border border-cosmic-700 rounded-lg px-2.5 py-1.5 text-xs text-white h-16 resize-none">${c.remark}</textarea>
                            </div>
                        </div>

                        <!-- 能源與電價分析數據 -->
                        <div class="bg-cosmic-950/40 border border-cosmic-700/30 p-4 rounded-xl">
                            <h4 class="text-xs font-bold text-teal-400 tracking-wide border-b border-cosmic-700/30 pb-1.5 mb-3"><i class="fa-solid fa-bolt mr-1.5"></i>核心用電與容量數據分析</h4>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-xs">
                                <div class="bg-cosmic-900/60 p-2.5 rounded-lg border border-cosmic-700/30">
                                    <div class="text-slate-400 text-[11px]">每月平均電費</div>
                                    <div class="text-base font-bold text-white mt-0.5">$${parseFloat(c.esg.avgElectricBill).toLocaleString()} 元</div>
                                </div>
                                <div class="bg-cosmic-900/60 p-2.5 rounded-lg border border-cosmic-700/30">
                                    <div class="text-slate-400 text-[11px]">契約容量</div>
                                    <div class="text-base font-bold text-amber-400 mt-0.5">${c.esg.contractCapacity} kW</div>
                                </div>
                                <div class="bg-cosmic-900/60 p-2.5 rounded-lg border border-cosmic-700/30">
                                    <div class="text-slate-400 text-[11px]">建置太陽能意願</div>
                                    <div class="text-base font-bold text-emerald-400 mt-0.5">高 (符合標準)</div>
                                </div>
                                <div class="bg-cosmic-900/60 p-2.5 rounded-lg border border-cosmic-700/30">
                                    <div class="text-slate-400 text-[11px]">時間電價</div>
                                    <div class="text-base font-bold text-white mt-0.5">${c.esg.isTimeRate}</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <footer class="bg-cosmic-950 px-6 py-4 border-t border-cosmic-700/40 text-[11px] text-slate-400 flex justify-between items-center">
                        <div><strong>睿立資產管理顧問有限公司</strong></div>
                        <div class="text-amber-400 font-medium">⚠️ 備註說明：此文件報價及建議有效期限一個月</div>
                    </footer>
                </div>
            `;
        }

        function updateField(id, field, value) {
            let target = casesData.find(c => c.id === id);
            if(target) target[field] = value;
        }

        function addNewCase() {
            const newId = "case-" + Date.now();
            const newCase = {
                id: newId,
                date: new Date().toISOString().slice(0, 16),
                status: "初期評估",
                manager: "樊靖畇",
                remark: "新建立案件",
                source: "系統新增",
                companyName: "新增儲存企業案 " + (casesData.length + 1),
                taxId: "", factoryLicense: "", address: "",
                services: [], lands: [], landTotalSqm: "0", landTotalPing: "0", landPattern: "都市計畫內使用分區", landRemark: "",
                buildings: [], buildYear: "", legalBuildPing: "0", illegalBuildPing: "0", buildRemark: "",
                esg: { hasSuccessor: "否", isExport: "否", euCarbonRequired: "否", avgElectricBill: "50000", horsepower: "0", contractCapacity: "50", isHighVoltage: "否", isTimeRate: "否", electricTimePeriods: [] },
                docsChecked: [], uploadedFilesCount: 0, ruili调阅FilesCount: 0,
                hasSolarProject: true
            };
            casesData.unshift(newCase);
            currentSelectedCaseId = newId;
            
            document.getElementById(`sub-list-${currentActiveTab}`).classList.remove('hidden');
            
            renderSidebarSubLists();
            renderMainForms();
        }

        function filterCases() {
            const query = document.getElementById("global-search").value.toLowerCase().trim();
            const container = document.getElementById('sub-list-case-eval');
            container.classList.remove('hidden');
            const filtered = casesData.filter(c => c.companyName.toLowerCase().includes(query));
            container.innerHTML = filtered.map(c => `
                <button onclick="selectSpecificCase('${c.id}', 'case-eval')" class="w-full text-left py-1.5 px-3 rounded-lg text-xs truncate transition ${currentSelectedCaseId === c.id ? 'bg-cosmic-500 text-white' : 'text-slate-400'}">
                    <i class="fa-solid fa-folder mr-2 text-cyan-400"></i>${c.companyName}
                </button>
            `).join('');
        }

        function saveToCloud() {
            alert("已同步更新至雲端資料庫！");
        }

        window.onload = function() {
            toggleCategory('case-eval'); // 預設展開第一個項目
        };
    </script>
</body>
</html>
