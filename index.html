        // 電腦、平板、手機均可開啟預覽/下載功能
        function previewFileUrl(url, fileName) {
            if (!url) {
                alert("目前檔案尚未有雲端完整 URL，無法開啟。");
                return;
            }
            const ext = (fileName || '').split('.').pop().toLowerCase();
            if (['jpg', 'jpeg', 'png', 'gif', 'webp', 'pdf'].includes(ext)) {
                window.open(url, '_blank');
            } else {
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName || 'download';
                a.target = '_blank';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }
        }

        }

        function generateSolarHTML(c) {
            let totalLandSqm = c.lands ? c.lands.reduce((sum, l) => sum + parseFloat(l.sqm || 0), 0) : 0;

        function calculateSolarLive(id) {
            const activeCase = solarData.find(c => c.id === id);
            if (!activeCase) return;
            const estPing = parseFloat(activeCase.estPing || 0);
            const estPrice = parseFloat(activeCase.estPrice || 3.5);
            const resEst1 = Math.round((estPing / 1.5) * 590 / 1000 * 4 * 365 * estPrice);
            const resEst2 = Math.round(resEst1 * 0.1);
            const estRentUnit = parseFloat(activeCase.estRentUnit || 0);
            const resEst3 = Math.round(estPing * estRentUnit);

            if(document.getElementById(`res-est-1-${id}`)) document.getElementById(`res-est-1-${id}`).innerText = resEst1.toLocaleString();
            if(document.getElementById(`res-est-2-${id}`)) document.getElementById(`res-est-2-${id}`).innerText = resEst2.toLocaleString();
            if(document.getElementById(`res-est-3-${id}`)) document.getElementById(`res-est-3-${id}`).innerText = resEst3.toLocaleString();

            const surPanels = parseFloat(activeCase.surveyPanels || 0);
            const surWatts = parseFloat(activeCase.surveyWatts || 0);
            const surPrice = parseFloat(activeCase.surveyPrice || 0);
            const resSurKwh = Math.round(surPanels * surWatts / 1000 * 4 * 365);
            const resSur1 = Math.round(resSurKwh * surPrice);
            const resSur2 = Math.round(resSur1 * 0.1);
            const surBill = parseFloat(activeCase.surveyBill || 0);
            const resSur3 = Math.round(resSur1 - surBill - resSur2);

            if(document.getElementById(`res-sur-kwh-${id}`)) document.getElementById(`res-sur-kwh-${id}`).innerText = resSurKwh.toLocaleString();
            if(document.getElementById(`res-sur-1-${id}`)) document.getElementById(`res-sur-1-${id}`).innerText = resSur1.toLocaleString();
            if(document.getElementById(`res-sur-2-${id}`)) document.getElementById(`res-sur-2-${id}`).innerText = resSur2.toLocaleString();
            if(document.getElementById(`res-sur-3-${id}`)) document.getElementById(`res-sur-3-${id}`).innerText = resSur3.toLocaleString();
        }

                    const targetIndex = dataArr.findIndex(c => c.id === activeId);
                    if (targetIndex !== -1) dataArr.splice(targetIndex, 1);
                    await supabaseClient.from('cases').delete().eq('id', activeId);
                } else {
                    target.is_deleted = true;
                    target.deleted_at = new Date().toISOString();
                    await supabaseClient.from('cases').upsert({
                        id: target.id,
                        tab_category: currentActiveTab,
                        data: target,
                        is_deleted: true,
                        deleted_at: target.deleted_at
                    });
                }

                const visibleCases = dataArr.filter(c => !c.is_deleted && isCaseBelongsToUser(c, currentUserRole));
                if (visibleCases.length > 0) {
                    selectedIds[currentActiveTab] = visibleCases[0].id;
                } else {
                    selectedIds[currentActiveTab] = null;
                }

                closeDeleteModal();
                renderSidebarSubLists();
                renderMainForms();
            }
        }

        async function saveToCloudSilent() {
            const currentObj = getTargetDataArray(currentActiveTab).find(c => c.id === selectedIds[currentActiveTab]);
            if (currentObj) {
                await supabaseClient.from('cases').upsert({
                    id: currentObj.id,
                    tab_category: currentActiveTab,
                    data: currentObj,
                    is_deleted: currentObj.is_deleted || false,
                    deleted_at: currentObj.deleted_at || null
                });
            }
        }

        async function saveToCloud() {
            await saveToCloudSilent();
            alert("資料已儲存！");
        }

        // ==================== 回收桶與一鍵復原機制 ====================
        function openTrashModal() {
            const trashContainer = document.getElementById('trash-items-list');
            let allDeletedCases = [];

            ["case-eval", "solar", "trading", "meeting", "internal-meet"].forEach(tabId => {
                const arr = getTargetDataArray(tabId);
                arr.filter(c => c.is_deleted).forEach(c => {
                    allDeletedCases.push({ ...c, tabId });
                });
            });

            if (allDeletedCases.length === 0) {
                trashContainer.innerHTML = `<p class="text-xs text-slate-500 py-4 text-center">回收桶目前是空的。</p>`;
            } else {
                trashContainer.innerHTML = allDeletedCases.map(item => `
                    <div class="flex items-center justify-between bg-cosmic-950 p-3 rounded-xl border border-cosmic-700/50 text-xs">
                        <div>
                            <span class="font-bold text-white mr-2">${item.companyName || item.meetSubject || '未命名案件'}</span>
                            <span class="text-[10px] text-slate-400 bg-cosmic-800 px-2 py-0.5 rounded border border-cosmic-700">類別: ${item.tabId}</span>
                            <span class="text-[10px] text-slate-500 block mt-1">刪除時間: ${item.deleted_at ? new Date(item.deleted_at).toLocaleString() : '未知'}</span>
                        </div>
                        <button onclick="restoreCase('${item.id}', '${item.tabId}')" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-3 py-1.5 rounded-lg text-xs transition">
                            <i class="fa-solid fa-rotate-left mr-1"></i>一鍵復原
                        </button>
                    </div>
                `).join('');
            }

            document.getElementById('trash-modal').classList.remove('hidden');
        }

        function closeTrashModal() {
            document.getElementById('trash-modal').classList.add('hidden');
        }

        async function restoreCase(id, tabId) {
            const dataArr = getTargetDataArray(tabId);
            const target = dataArr.find(c => c.id === id);
            if (target) {
                target.is_deleted = false;
                target.deleted_at = null;
                await supabaseClient.from('cases').upsert({
                    id: target.id,
                    tab_category: tabId,
                    data: target,
                    is_deleted: false,
                    deleted_at: null
                });
                renderSidebarSubLists();
                renderMainForms();
                openTrashModal();
            }
        }

        // ==================== Supabase 資料載入與 Realtime 即時監聽 ====================
        async function fetchSupabaseData() {
            const { data, error } = await supabaseClient.from('cases').select('*');
            if (error) {
                console.error("Fetch Supabase Error:", error);
                return;
            }
            if (data && data.length > 0) {
                caseEvalData = []; solarData = []; tradingData = []; meetingData = []; internalMeetData = [];
                data.forEach(row => {
                    const caseObj = { ...row.data, is_deleted: row.is_deleted, deleted_at: row.deleted_at };
                    if (row.tab_category === 'case-eval') caseEvalData.push(caseObj);
                    else if (row.tab_category === 'solar') solarData.push(caseObj);
                    else if (row.tab_category === 'trading') tradingData.push(caseObj);
                    else if (row.tab_category === 'meeting') meetingData.push(caseObj);
                    else if (row.tab_category === 'internal-meet') internalMeetData.push(caseObj);
                });
                renderSidebarSubLists();
                renderMainForms();
            }
        }

        function initSupabaseRealtime() {
            supabaseClient
                .channel('schema-db-changes')
                .on(
                    'postgres_changes',
                    { event: '*', schema: 'public', table: 'cases' },
                    (payload) => {
                        fetchSupabaseData();
                    }
                )
                .subscribe();
        }

        window.onload = function() {
            renderSidebarSubLists();
            renderMainForms();
        };
    </script>
</body>
</html>
