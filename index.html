<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>睿立業務系統 - 案件評估</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome 圖標 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans" id="app">

    <!-- 頂部導覽列 -->
    <header class="bg-gradient-to-r from-slate-900 to-indigo-950 text-white shadow-md px-6 py-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center space-x-3">
                <i class="fa-solid fa-layer-group text-2xl text-cyan-400"></i>
                <div>
                    <h1 class="text-xl font-bold tracking-wider">睿立業務系統</h1>
                    <p class="text-xs text-slate-400">核心業務流轉與自動化管理平台</p>
                </div>
            </div>
            
            <!-- 頂部控制列 -->
            <div class="flex flex-wrap items-center gap-3">
                <!-- 關鍵字動態篩選 -->
                <div class="relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-slate-400 text-sm"></i>
                    <input type="text" id="searchInput" oninput="filterCases()" placeholder="搜尋公司名稱、專案經理..." class="pl-9 pr-4 py-1.5 rounded-lg text-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500 w-60">
                </div>
                <button onclick="addNewCase()" class="bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-semibold px-4 py-1.5 rounded-lg shadow transition flex items-center gap-1">
                    <i class="fa-solid fa-plus"></i> 新增公司案件
                </button>
                <button onclick="window.print()" class="bg-slate-700 hover:bg-slate-600 text-white text-sm font-semibold px-3 py-1.5 rounded-lg shadow transition flex items-center gap-1">
                    <i class="fa-solid fa-print"></i> 匯出/列印
                </button>
                <button onclick="saveToCloud()" class="bg-cyan-600 hover:bg-cyan-500 text-white text-sm font-bold px-4 py-1.5 rounded-lg shadow transition flex items-center gap-1">
                    <i class="fa-solid fa-cloud-arrow-up"></i> 儲存按鍵
                </button>
            </div>
        </div>
    </header>

    <!-- 主內容區 -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- 案件動態表渲染容器 -->
        <div id="casesContainer" class="space-y-8">
            <!-- 預設動態生成的物件會經由 JS 渲染到這裡 -->
        </div>
    </main>

    <!-- 頁尾與聲明（每一頁最下面必需顯示） -->
    <footer class="bg-white border-t border-slate-200 mt-12 py-8 px-6 text-sm text-slate-500">
        <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
                <div class="flex flex-wrap gap-x-4 gap-y-1 text-slate-700 font-semibold">
                    <span>睿立資產管理顧問有限公司 <span class="text-xs font-normal text-slate-400">統編：90411790</span></span>
                    <span>元業綠能驗證有限公司 <span class="text-xs font-normal text-slate-400">統編：90000831</span></span>
                    <span>天梁不動產股份有限公司 <span class="text-xs font-normal text-slate-400">統編：93628169</span></span>
                </div>
                <p class="text-xs">
                    TEL：07-222-5595 &nbsp;|&nbsp; FAX：07-269-3091 &nbsp;|&nbsp; 
                    E-mail：ruilu1101108@gmail.com &nbsp;|&nbsp; 
                    ADD：高雄市苓雅區新光路38號30樓之2
                </p>
            </div>
            <div class="md:text-right flex flex-col justify-end">
                <p class="text-amber-600 font-bold flex items-center md:justify-end gap-1">
                    <i class="fa-solid fa-triangle-exclamation"></i> 備註說明：此文件報價及建議有效期限一個月。
                </p>
            </div>
        </div>
    </footer>

    <!-- 前端邏輯核心：1.狀態管理層 2.使用者介面層 -->
    <script>
        // 專案經理與狀態選單資料庫
        const MANAGERS = ["樊靖畇", "鄭家承", "陳宥騰", "楊裕憲", "黃逸豪", "李宜璇", "王瑋聆", "許先生"];
        const STATUSES = [
            { name: "初期評估", bg: "bg-green-100 text-green-800 border-green-300" },
            { name: "已報價", bg: "bg-blue-100 text-blue-800 border-blue-300" },
            { name: "準備簽約", bg: "bg-amber-100 text-amber-800 border-amber-300" },
            { name: "已簽約", bg: "bg-red-100 text-red-800 border-red-300" },
            { name: "結案", bg: "bg-purple-100 text-purple-800 border-purple-300" },
            { name: "沒下文", bg: "bg-slate-200 text-slate-800 border-slate-400" }
        ];
        const REQUIRED_DOCS = ["電費單", "屋頂現況照片（多角度）", "屋頂平面圖", "使用執照", "建築圖", "場域線路分佈圖", "廠區空拍圖"];

        // 1. 狀態管理層：初始動態案件陣列
        let casesState = [
            {
                id: "case-1",
                date: "2026-07-18",
                status: "初期評估",
                manager: "樊靖畇",
                companyName: "睿立綠能轉型示範廠",
                taxId: "90411790",
                factoryCert: "F1234567",
                industryType: "金屬加工業",
                contact: "王經理",
                phone: "0912-345678",
                email: "service@ruili.com",
                address: "高雄市小港區工業路88號",
                remark: "積極轉型中，預計評估屋頂太陽能與低碳轉型",
                lands: [{ id: "l-1", section: "新光段", num: "101", sqm: 330.5, ping: 100 }],
                buildings: [{ id: "b-1", num: "888", sqm: 165.2, ping: 50, year: "2015", legal: 50, illegal: 0 }],
                esg: { successor: "是", export: "是", euCarbon: "是", electricity: "120,000", hp: "50", capacity: "99", isHighVoltage: "是", isTimeRate: "是", peakTime: "白天為主" },
                docs: ["電費單", "使用執照", "建築圖"]
            }
        ];

        // 渲染動態表格
        function renderCases() {
            const container = document.getElementById('casesContainer');
            container.innerHTML = '';

            if (casesState.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-slate-400 bg-white rounded-xl shadow-sm border border-dashed border-slate-300">目前無匹配的案件名單，請點擊上方新增。</div>`;
                return;
            }

            casesState.forEach((c) => {
                // 計算總坪數
                let totalLandPing = c.lands.reduce((sum, l) => sum + Number(l.ping || 0), 0);
                let totalLandSqm = c.lands.reduce((sum, l) => sum + Number(l.sqm || 0), 0);

                let caseHtml = `
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200/80 p-6 transition hover:shadow-md relative" id="${c.id}">
                    <!-- 刪除按鈕 -->
                    <button onclick="deleteCase('${c.id}')" class="absolute top-5 right-6 text-slate-400 hover:text-red-500 transition text-sm">
                        <i class="fa-regular fa-trash-can"></i> 可刪除動態案件名單的按鈕
                    </button>

                    <div class="border-b border-slate-100 pb-4 mb-6">
                        <span class="text-xs font-bold uppercase tracking-wider text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-full">案件評估單</span>
                        <h2 class="text-xl font-bold text-slate-800 mt-2 flex items-center gap-2">
                            <i class="fa-solid fa-industry text-slate-400"></i> ${c.companyName || '未命名公司案件'}
                        </h2>
                    </div>

                    <!-- 一、專案人員 -->
                    <div class="bg-slate-50/80 rounded-xl p-4 border border-slate-100 grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">一、專案人員 / 日期時間</label>
                            <input type="date" value="${c.date}" onchange="updateField('${c.id}', 'date', this.value)" class="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">案件狀態（下拉選單）</label>
                            <div class="flex flex-wrap gap-1.5">
                                ${STATUSES.map(st => `
                                    <button onclick="updateField('${c.id}', 'status', '${st.name}')" class="text-xs px-2.5 py-1 rounded-md border font-medium transition ${c.status === st.name ? st.bg + ' ring-2 ring-offset-1 ring-indigo-500 shadow-sm' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}">
                                        ${st.name}
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">專案經理（下拉選單）</label>
                            <select onchange="updateField('${c.id}', 'manager', this.value)" class="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                                ${MANAGERS.map(m => `<option value="${m}" ${c.manager === m ? 'selected' : ''}>${m}</option>`).join('')}
                            </select>
                        </div>
                    </div>

                    <!-- 二、公司基本資料 -->
                    <div class="mb-6">
                        <h3 class="text-sm font-bold text-slate-700 mb-3 flex items-center gap-1"><i class="fa-regular fa-address-card text-indigo-500"></i> 二、公司基本資料</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
                            <div><label class="text-xs text-slate-400">公司名稱</label><input type="text" value="${c.companyName}" oninput="updateField('${c.id}', 'companyName', this.value)" class="w-full border border-slate-200 rounded-lg px-3 py-1.5 text-sm"></div>
                            <div><label class="text-xs text-slate-400">統編</label><input type="text" value="${c.taxId}" oninput="updateField('${c.id}', 'taxId', this.value)" class="w-full border border-slate-200 rounded-lg px-3 py-1.5 text-sm"></div>
                            <div><label class="text-xs text-slate-400">工廠登記證字號</label><input type="text" value="${c.factoryCert}" oninput="updateField('${c.id}', 'factoryCert', this.value)" class="w-full border border-slate-200 rounded-lg px-3 py-1.5 text-sm"></div>
                            <div><label class="text-xs text-slate-400">產業類型</label><input type="text" value="${c.industryType}" oninput="updateField('${c.id}', 'industryType', this.value)" class="w-full border border-slate-200 rounded-lg px-3 py-1.5 text-sm"></div>
                            <div><label class="text-xs text-slate-400">聯絡人</label><input type="text" value="${c.contact}" class="w-full border border-slate-200 rounded-lg px-3 py-1.5 text-sm"></div>
                            <div><label class="text-xs text-slate-400">聯絡電話</label><input type="text" value="${c.phone}" class="w-full border border-slate-200 rounded-lg px-3 py-1.5 text-sm"></div>
                            <div><label class="text-xs text-slate-400">E-mail</label><input type="text" value="${c.email}" class="w-full border border-slate-200 rounded-lg px-3 py-1.5 text-sm"></div>
                            <div><label class="text-xs text-slate-400">工廠地址</label><input type="text" value="${c.address}" class="w-full border border-slate-200 rounded-lg px-3 py-1.5 text-sm"></div>
                        </div>
                        <div class="mt-3">
                            <label class="text-xs text-slate-400">業務即時狀態備註</label>
                            <textarea oninput="updateField('${c.id}', 'remark', this.value)" class="w-full border border-slate-200 rounded-lg px-3 py-1.5 text-sm h-12">${c.remark || ''}</textarea>
                        </div>
                    </div>

                    <!-- 三、土地基本資料 -->
                    <div class="mb-6 bg-slate-50/40 p-4 rounded-xl border border-slate-200/60">
                        <div class="flex justify-between items-center mb-3">
                            <h3 class="text-sm font-bold text-slate-700 flex items-center gap-1"><i class="fa-solid fa-map-location-dot text-emerald-500"></i> 三、土地基本資料</h3>
                            <button onclick="addLand('${c.id}')" class="text-xs bg-emerald-50 text-emerald-700 border border-emerald-200 px-2.5 py-1 rounded-md hover:bg-emerald-100 transition">
                                <i class="fa-solid fa-plus"></i> ［＋ 地段地號］按鈕
                            </button>
                        </div>
                        <div class="space-y-2">
                            ${c.lands.map((l, index) => `
                                <div class="grid grid-cols-2 md:grid-cols-5 gap-3 bg-white p-2.5 rounded-lg border border-slate-200 text-xs">
                                    <div>地段: <input type="text" value="${l.section}" oninput="updateSubField('${c.id}', 'lands', '${l.id}', 'section', this.value)" class="border px-1.5 py-0.5 rounded w-full mt-0.5"></div>
                                    <div>地號: <input type="text" value="${l.num}" oninput="updateSubField('${c.id}', 'lands', '${l.id}', 'num', this.value)" class="border px-1.5 py-0.5 rounded w-full mt-0.5"></div>
                                    <div>平方公尺: <input type="number" value="${l.sqm}" oninput="updateSubField('${c.id}', 'lands', '${l.id}', 'sqm', this.value); syncArea('${c.id}', 'lands', '${l.id}', 'sqm', this.value)" class="border px-1.5 py-0.5 rounded w-full mt-0.5"></div>
                                    <div>坪: <input type="number" value="${l.ping}" oninput="updateSubField('${c.id}', 'lands', '${l.id}', 'ping', this.value); syncArea('${c.id}', 'lands', '${l.id}', 'ping', this.value)" class="border px-1.5 py-0.5 rounded w-full mt-0.5"></div>
                                    <div class="flex items-end justify-end"><button onclick="deleteSubItem('${c.id}', 'lands', '${l.id}')" class="text-red-400 hover:text-red-600 py-1">刪除</button></div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="text-xs text-slate-500 mt-2 flex gap-4 font-medium px-1">
                            <span>土地型態: 都市計畫內使用分區 / 都市計畫外使用地類別</span>
                            <span class="ml-auto text-slate-700">總計: <strong class="text-emerald-600">${totalLandSqm.toFixed(2)}</strong> 平方公尺 / <strong class="text-emerald-600">${totalLandPing.toFixed(2)}</strong> 坪</span>
                        </div>
                    </div>

                    <!-- 四、建物基本資料 -->
                    <div class="mb-6 bg-slate-50/40 p-4 rounded-xl border border-slate-200/60">
                        <div class="flex justify-between items-center mb-3">
                            <h3 class="text-sm font-bold text-slate-700 flex items-center gap-1"><i class="fa-solid fa-tents text-cyan-600"></i> 四、建物基本資料</h3>
                            <button onclick="addBuilding('${c.id}')" class="text-xs bg-cyan-50 text-cyan-700 border border-cyan-200 px-2.5 py-1 rounded-md hover:bg-cyan-100 transition">
                                <i class="fa-solid fa-plus"></i> ［＋ 建號］按鈕
                            </button>
                        </div>
                        <div class="space-y-2">
                            ${c.buildings.map((b) => `
                                <div class="grid grid-cols-2 md:grid-cols-6 gap-3 bg-white p-2.5 rounded-lg border border-slate-200 text-xs">
                                    <div>建號: <input type="text" value="${b.num}" oninput="updateSubField('${c.id}', 'buildings', '${b.id}', 'num', this.value)" class="border px-1.5 py-0.5 rounded w-full mt-0.5"></div>
                                    <div>建造年份: <input type="text" value="${b.year}" oninput="updateSubField('${c.id}', 'buildings', '${b.id}', 'year', this.value)" class="border px-1.5 py-0.5 rounded w-full mt-0.5"></div>
                                    <div>合法坪數: <input type="number" value="${b.legal}" oninput="updateSubField('${c.id}', 'buildings', '${b.id}', 'legal', this.value)" class="border px-1.5 py-0.5 rounded w-full mt-0.5"></div>
                                    <div>違章坪數: <input type="number" value="${b.illegal}" oninput="updateSubField('${c.id}', 'buildings', '${b.id}', 'illegal', this.value)" class="border px-1.5 py-0.5 rounded w-full mt-0.5"></div>
                                    <div>總坪數: <span class="block mt-1.5 font-bold text-slate-600">${(Number(b.legal || 0) + Number(b.illegal || 0))} 坪</span></div>
                                    <div class="flex items-end justify-end"><button onclick="deleteSubItem('${c.id}', 'buildings', '${b.id}')" class="text-red-400 hover:text-red-600 py-1">刪除</button></div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <!-- 五、ESG 評估 -->
                    <div class="mb-6 border border-teal-100 bg-teal-50/20 p-4 rounded-xl">
                        <h3 class="text-sm font-bold text-teal-800 mb-3 flex items-center gap-1"><i class="fa-solid fa-leaf text-teal-600"></i> 五、ESG 評估與企業永續現況</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 text-xs mb-4">
                            <div>
                                <label class="text-slate-500">是否有接班人</label>
                                <select onchange="updateEsg('${c.id}', 'successor', this.value)" class="w-full border bg-white p-1.5 rounded mt-1">
                                    <option value="是" ${c.esg.successor === '是' ? 'selected' : ''}>是</option>
                                    <option value="否" ${c.esg.successor === '否' ? 'selected' : ''}>否</option>
                                    <option value="不清楚" ${c.esg.successor === '不清楚' ? 'selected' : ''}>不清楚</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-slate-500">產品是否外銷</label>
                                <select onchange="updateEsg('${c.id}', 'export', this.value)" class="w-full border bg-white p-1.5 rounded mt-1">
                                    <option value="是" ${c.esg.export === '是' ? 'selected' : ''}>是</option>
                                    <option value="否" ${c.esg.export === '否' ? 'selected' : ''}>否</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-slate-500">是否受歐盟減碳要求</label>
                                <select onchange="updateEsg('${c.id}', 'euCarbon', this.value)" class="w-full border bg-white p-1.5 rounded mt-1">
                                    <option value="是" ${c.esg.euCarbon === '是' ? 'selected' : ''}>是</option>
                                    <option value="否" ${c.esg.euCarbon === '否' ? 'selected' : ''}>否</option>
                                </select>
                            </div>
                        </div>
                        <div class="border-t border-teal-100/70 pt-3 grid grid-cols-2 md:grid-cols-4 gap-4 text-xs">
                            <div>每月平均電費: <input type="text" value="${c.esg.electricity}" oninput="updateEsg('${c.id}', 'electricity', this.value)" class="w-full border px-2 py-1 rounded mt-0.5 bg-white"></div>
                            <div>馬力: <input type="text" value="${c.esg.hp}" oninput="updateEsg('${c.id}', 'hp', this.value)" class="w-full border px-2 py-1 rounded mt-0.5 bg-white"></div>
                            <div>契約容量(kW): <input type="text" value="${c.esg.capacity}" oninput="updateEsg('${c.id}', 'capacity', this.value)" class="w-full border px-2 py-1 rounded mt-0.5 bg-white"></div>
                            <div>用電時段（複選機制）: 
                                <select onchange="updateEsg('${c.id}', 'peakTime', this.value)" class="w-full border px-2 py-1 rounded mt-0.5 bg-white">
                                    <option value="白天為主" ${c.esg.peakTime === '白天為主' ? 'selected' : ''}>白天為主</option>
                                    <option value="夜間為主" ${c.esg.peakTime === '夜間為主' ? 'selected' : ''}>夜間為主</option>
                                    <option value="平均分佈" ${c.esg.peakTime === '平均分佈' ? 'selected' : ''}>平均分佈</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- 六、客戶應備文件 -->
                    <div>
                        <h3 class="text-sm font-bold text-slate-700 mb-2 flex items-center gap-1"><i class="fa-regular fa-folder-open text-amber-500"></i> 六、客戶應備文件清單（可打勾）</h3>
                        <div class="flex flex-wrap gap-3 mb-3">
                            ${REQUIRED_DOCS.map(doc => {
                                const checked = c.docs.includes(doc) ? 'checked' : '';
                                return `
                                    <label class="inline-flex items-center gap-1.5 bg-slate-100 hover:bg-slate-200/80 px-2.5 py-1.5 rounded-lg text-xs cursor-pointer transition select-none">
                                        <input type="checkbox" ${checked} onchange="toggleDoc('${c.id}', '${doc}')" class="rounded border-slate-300 text-indigo-600 focus:ring-indigo-500">
                                        <span>${doc}</span>
                                    </label>
                                `;
                            }).join('')}
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-xs mt-2">
                            <div class="p-3 border border-dashed rounded-xl bg-slate-50/50">
                                <span class="font-bold text-slate-600 block mb-1">應備文件檔案上傳（可存任何類型檔案）</span>
                                <input type="file" class="w-full text-slate-500 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text-xs file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                            </div>
                            <div class="p-3 border border-dashed rounded-xl bg-slate-50/50">
                                <span class="font-bold text-slate-600 block mb-1">睿立調閱內部檔案區</span>
                                <button class="bg-slate-200 hover:bg-slate-300 px-3 py-1 rounded text-slate-700 font-medium transition">載入內部地政及地籍圖檔資料</button>
                            </div>
                        </div>
                    </div>
                </div>
                `;
                container.innerHTML += caseHtml;
            });
        }

        // 新增公司案件
        function addNewCase() {
            const newId = "case-" + Date.now();
            const newObj = {
                id: newId,
                date: new Date().toISOString().split('T')[0],
                status: "初期評估",
                manager: "樊靖畇",
                companyName: "新増工廠案件-" + casesState.length,
                taxId: "", factoryCert: "", industryType: "", contact: "", phone: "", email: "", address: "", remark: "",
                lands: [],
                buildings: [],
                esg: { successor: "不清楚", export: "否", euCarbon: "否", electricity: "", hp: "", capacity: "", isHighVoltage: "否", isTimeRate: "否", peakTime: "白天為主" },
                docs: []
            };
            casesState.unshift(newObj);
            renderCases();
            document.getElementById(newId).scrollIntoView({ behavior: 'smooth' });
        }

        // 刪除案件
        function deleteCase(id) {
            if (confirm("確定要移除此筆動態案件資料嗎？")) {
                casesState = casesState.filter(c => c.id !== id);
                renderCases();
            }
        }

        // 更新一級欄位
        function updateField(caseId, field, value) {
            const index = casesState.findIndex(c => c.id === caseId);
            if (index !== -1) {
                casesState[index][field] = value;
                if (field === 'status' || field === 'manager') renderCases(); // 狀態或人員更換重新渲染
            }
        }

        // 更新子數組欄位（地段地號、建號）
        function updateSubField(caseId, subArray, subId, field, value) {
            const cIndex = casesState.findIndex(c => c.id === caseId);
            if (cIndex !== -1) {
                const sIndex = casesState[cIndex][subArray].findIndex(s => s.id === subId);
                if (sIndex !== -1) {
                    casesState[cIndex][subArray][sIndex][field] = value;
                }
            }
        }

        // 平方公尺與坪數自動同步自動換算
        function syncArea(caseId, subArray, subId, triggerField, value) {
            const cIndex = casesState.findIndex(c => c.id === caseId);
            if (cIndex !== -1) {
                const sIndex = casesState[cIndex][subArray].findIndex(s => s.id === subId);
                if (sIndex !== -1) {
                    if (triggerField === 'sqm') {
                        casesState[cIndex][subArray][sIndex]['ping'] = (Number(value) * 0.3025).toFixed(2);
                    } else if (triggerField === 'ping') {
                        casesState[cIndex][subArray][sIndex]['sqm'] = (Number(value) / 0.3025).toFixed(2);
                    }
                    // 為了不讓焦點消失，手動更新統計總數而不用完整刷新
                    renderCases();
                }
            }
        }

        // 更新ESG欄位
        function updateEsg(caseId, field, value) {
            const index = casesState.findIndex(c => c.id === caseId);
            if (index !== -1) {
                casesState[index].esg[field] = value;
            }
        }

        // 客戶文件打勾機制
        function toggleDoc(caseId, docName) {
            const index = casesState.findIndex(c => c.id === caseId);
            if (index !== -1) {
                let currentDocs = casesState[index].docs;
                if (currentDocs.includes(docName)) {
                    casesState[index].docs = currentDocs.filter(d => d !== docName);
                } else {
                    casesState[index].docs.push(docName);
                }
            }
        }

        // 新增土地地號
        function addLand(caseId) {
            const index = casesState.findIndex(c => c.id === caseId);
            if (index !== -1) {
                casesState[index].lands.push({ id: "l-" + Date.now(), section: "", num: "", sqm: 0, ping: 0 });
                renderCases();
            }
        }

        // 新增建物建號
        function addBuilding(caseId) {
            const index = casesState.findIndex(c => c.id === caseId);
            if (index !== -1) {
                casesState[index].buildings.push({ id: "b-" + Date.now(), num: "", year: "", legal: 0, illegal: 0 });
                renderCases();
            }
        }

        // 刪除子項目
        function deleteSubItem(caseId, subArray, subId) {
            const index = casesState.findIndex(c => c.id === caseId);
            if (index !== -1) {
                casesState[index][subArray] = casesState[index][subArray].filter(s => s.id !== subId);
                renderCases();
            }
        }

        // 關鍵字動態篩選
        function filterCases() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const originalState = [...casesState];
            
            // 進行簡易的前端顯示控制
            casesState.forEach(c => {
                const element = document.getElementById(c.id);
                if (element) {
                    const match = c.companyName.toLowerCase().includes(term) || c.manager.toLowerCase().includes(term);
                    if (match) {
                        element.classList.remove('hidden');
                    } else {
                        element.classList.add('hidden');
                    }
                }
            });
        }

        // 儲存雲端資料庫模擬
        function saveToCloud() {
            alert("✅ [寫入完成] 正在將目前的動態案件資料串流，一次性同步「寫入/更新」至雲端資料庫 (PostgreSQL/MySQL)！");
            console.log("儲存的資料結構主體：", casesState);
        }

        // 初始渲染
        renderCases();
    </script>
</body>
</html>
