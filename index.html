<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>睿立業務系統 - I核心管理平台</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome 圖標 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cosmic: {
                            950: '#060b19', 900: '#0a142c', 800: '#112246', 700: '#1a3160', 600: '#234280', 500: '#315cb5', 400: '#4c7cd4'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #060b19; color: #e2e8f0; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* 📜 專屬直式 A4 列印與一鍵匯出排版優化 */
        @media print {
            body { background: white !important; color: black !important; }
            aside, header, .no-print { display: none !important; }
            main { p: 0 !important; overflow: visible !important; }
            .print-container { 
                width: 210mm !important; 
                min-height: 297mm !important; 
                background: white !important; 
                color: black !important; 
                padding: 20mm !important;
                box-shadow: none !important;
                border: none !important;
            }
            input, select, textarea { 
                background: transparent !important; 
                color: black !important; 
                border: none !important; 
                border-bottom: 1px solid #ccc !important;
                border-radius: 0 !important;
                padding: 2px !important;
            }
            .bg-cosmic-950, .bg-cosmic-900, .bg-cosmic-800, .bg-cosmic-950\/40, .bg-cosmic-900\/60 { background: transparent !important; }
            footer { border-top: 2px solid black !important; color: black !important; }
            h3, h4 { color: black !important; border-bottom: 1px solid black !important; }
        }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <!-- LEFT SIDEBAR (UI - 左側導覽列組件) -->
    <aside class="w-72 bg-cosmic-900 border-r border-cosmic-700/50 flex flex-col justify-between shrink-0 select-none">
        <div>
            <div class="p-6 border-b border-cosmic-700/30 flex items-center space-x-3">
                <div class="w-10 h-10 bg-gradient-to-tr from-cosmic-500 to-cyan-400 rounded-xl flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-folder-tree text-white text-lg"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-wider text-white">睿立集團</h1>
                    <p class="text-xs text-slate-400">RUILI SYSTEM I</p>
                </div>
            </div>

            <nav class="p-4 space-y-1.5 overflow-y-auto max-h-[calc(100vh-180px)]">
                <div>
                    <button onclick="toggleCategory('case-eval')" class="w-full flex items-center justify-between px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-folder-open w-5 text-center text-cyan-400"></i>
                            <span class="font-medium text-sm tracking-wide">案件評估</span>
                        </div>
                        <i id="arrow-case-eval" class="fa-solid fa-chevron-down text-xs text-slate-500 transition-transform"></i>
                    </button>
                    <div id="sub-list-case-eval" class="hidden pl-9 pr-2 mt-1 space-y-1 border-l border-cosmic-700/40 ml-6"></div>
                </div>
            </nav>
        </div>
    </aside>

    <!-- MAIN CONTENT CONTAINER -->
    <main class="flex-1 flex flex-col overflow-hidden bg-cosmic-950">
        <!-- TOP CONTROL BAR -->
        <header class="h-16 border-b border-cosmic-700/40 px-8 flex items-center justify-between shrink-0 bg-cosmic-900/40 backdrop-blur-md">
            <div>
                <input type="text" id="global-search" oninput="filterCases()" placeholder="按公司關鍵字篩選..." class="w-80 bg-cosmic-950 border border-cosmic-700 rounded-xl px-4 py-1.5 text-sm text-white">
            </div>
            <div class="flex items-center space-x-3">
                <button onclick="addNewCase()" class="bg-gradient-to-r from-cosmic-500 to-blue-600 text-white text-xs font-semibold px-4 py-2 rounded-xl flex items-center space-x-1.5 shadow-md">
                    <i class="fa-solid fa-plus"></i><span>[＋ 新增公司案件]</span>
                </button>
                <button onclick="window.print()" class="bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white text-xs font-semibold px-4 py-2 rounded-xl flex items-center shadow-lg transition">
                    <i class="fa-solid fa-file-pdf mr-1.5"></i> 一鍵直式A4列印/存檔
                </button>
                <button onclick="saveToCloud()" class="bg-emerald-600 text-white text-xs font-semibold px-4 py-2 rounded-xl">儲存按鍵</button>
            </div>
        </header>

        <!-- ROUTING VIEWPORT -->
        <div class="flex-1 overflow-y-auto p-8 flex justify-center">
            <section id="tab-case-eval" class="tab-content active w-full max-w-5xl">
                <div id="case-eval-container" class="print-container space-y-6"></div>
            </section>
        </div>
    </main>

    <script>
        // 核心動態數據 - 完美精確封裝 I版『案件評估』全新功能
        let caseEvalData = [
            {
                id: "eval-1", date: "2026-07-18T16:00", status: "初期評估", manager: "樊靖畇", remark: "加強ESG接班人盤點。", source: "公會引介",
                companyName: "大鼎精密工業股份有限公司", taxId: "83746291", factoryLicense: "64009876", industryType: "金屬製品製造業", contact: "王大鼎", phone: "0912-345678", email: "tading@precision.com", address: "高雄市岡山區本工路88號", website: "https://www.tading.com",
                services: [{ name: "特定工廠轉型諮詢", desc: "改善計畫編製與變更手續", remark: "進度正常", quote: "350000", contract: "350000", p1: "100000", d1: "2026-08-01", p2: "150000", d2: "2026-10-01", p3: "100000", d3: "2026-12-01", p4: "", d4: "", p5: "", d5: "" }],
                lands: [{ section: "岡山段", number: "105-02", pattern: "都市計畫外使用地類別", sqm: "1500", ping: "453.75" }],
                buildingsLegal: [{ number: "402", type: "鋼構廠房", year: "2005", sqm: "800", ping: "242" }],
                buildingsIllegal: [{ type: "頂樓加蓋", year: "2010", sqm: "400", ping: "121" }],
                electricBill: "185000", horsepower: "150", contractCapacity: "120", isHighVoltage: "否", isTimeRate: "是", timePeriod: "白天為主", electricRemark: "",
                esgHasSuccessor: "是", esgIsExport: "是", esgEuCarbon: "是", esgGreenCert: "評估中", esgStorage: "否", esgRemark: "",
                customDocsClient: ["電費單", "使用執照"], customDocsRuili: ["土地謄本", "地籍圖"]
            }
        ];

        let selectedIds = { "case-eval": "eval-1" };
        let currentActiveTab = "case-eval";

        const managersList = ["樊靖畇", "鄭家承", "陳宥騰", "楊裕憲", "黃逸豪", "李宜璇", "王瑋聆", "許先生", "鄭至宏"];
        const statusConfig = { "初期評估": "bg-emerald-500", "已報價": "bg-blue-500", "準備簽約": "bg-amber-500", "已簽約": "bg-red-500", "結案": "bg-purple-500", "沒下文": "bg-slate-600" };

        function toggleCategory(catId) {
            document.getElementById(`sub-list-${catId}`)?.classList.toggle('hidden');
            renderSidebarSubLists();
        }

        function renderSidebarSubLists() {
            const container = document.getElementById(`sub-list-case-eval`);
            if (!container) return;
            container.innerHTML = caseEvalData.map(c => `
                <button onclick="selectSpecificCase('${c.id}')" class="w-full text-left py-1.5 px-3 rounded-lg text-xs truncate transition ${selectedIds["case-eval"] === c.id ? 'bg-cosmic-500 text-white font-semibold' : 'text-slate-400 hover:text-slate-200'}">
                    <i class="fa-solid fa-folder mr-2"></i>${c.companyName || '未命名項目'}
                </button>
            `).join('');
        }

        function selectSpecificCase(id) { selectedIds["case-eval"] = id; renderMainForms(); renderSidebarSubLists(); }

        function renderMainForms() {
            const activeCase = caseEvalData.find(c => c.id === selectedIds["case-eval"]) || caseEvalData[0];
            const container = document.getElementById("case-eval-container");
            if (!activeCase) { container.innerHTML = "<p class='text-xs text-slate-500'>暫無案件。</p>"; return; }

            // 自動加總土地與建物坪數
            let totalLandSqm = activeCase.lands.reduce((sum, l) => sum + parseFloat(l.sqm || 0), 0);
            let totalLandPing = activeCase.lands.reduce((sum, l) => sum + parseFloat(l.ping || 0), 0);
            let totalLegalPing = activeCase.buildingsLegal.reduce((sum, b) => sum + parseFloat(b.ping || 0), 0);
            let totalIllegalPing = activeCase.buildingsIllegal.reduce((sum, b) => sum + parseFloat(b.ping || 0), 0);

            container.innerHTML = `
                <div class="bg-cosmic-800/70 border border-cosmic-700/50 rounded-2xl p-6 space-y-6">
                    
                    <!-- 一、專案人員區塊 -->
                    <div class="bg-cosmic-900/60 p-4 border border-cosmic-700/50 rounded-xl space-y-3">
                        <div class="flex justify-between items-center"><h3 class="text-sm font-bold text-cyan-400"><i class="fa-solid fa-user-tie mr-2"></i>一、專案人員</h3></div>
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-3 text-xs">
                            <div><label class="text-slate-400 block mb-1">專案經理</label>
                                <select onchange="updateField('${activeCase.id}', 'manager', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1 text-white">
                                    ${managersList.map(m => `<option value="${m}" ${activeCase.manager === m ? 'selected':''}>${m}</option>`).join('')}
                                </select>
                            </div>
                            <div><label class="text-slate-400 block mb-1">日期 / 時間</label><input type="datetime-local" value="${activeCase.date}" onchange="updateField('${activeCase.id}', 'date', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1 text-white"></div>
                            <div><label class="text-slate-400 block mb-1">案件來源</label><input type="text" value="${activeCase.source||''}" oninput="updateField('${activeCase.id}', 'source', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1 text-white"></div>
                            <div><label class="text-slate-400 block mb-1">案件狀態</label>
                                <select onchange="updateField('${activeCase.id}', 'status', this.value); renderMainForms();" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1 text-white">
                                    ${Object.keys(statusConfig).map(st => `<option value="${st}" ${activeCase.status === st ? 'selected':''}>${st}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- 服務項目層（含可刪除 X 圖示、報價與分期付款期程明細） -->
                    <div class="bg-cosmic-950/40 border border-cosmic-700/30 p-4 rounded-xl space-y-4">
                        <div class="flex justify-between items-center border-b border-cosmic-700/40 pb-1.5">
                            <h4 class="text-xs font-bold text-indigo-400"><i class="fa-solid fa-layer-group mr-1.5"></i>服務項目層</h4>
                            <button onclick="addServiceRow('${activeCase.id}')" class="text-[10px] bg-indigo-900 border border-indigo-700 px-2 py-0.5 rounded no-print">[＋ 新增服務項目]</button>
                        </div>
                        <div class="space-y-3">
                            ${activeCase.services.map((srv, idx) => `
                                <div class="bg-cosmic-900/40 border border-cosmic-700/40 p-3 rounded-lg space-y-2 relative">
                                    <i onclick="removeServiceRow('${activeCase.id}', ${idx})" class="fa-solid fa-circle-xmark text-red-400 absolute top-2 right-2 cursor-pointer text-sm hover:text-red-300 no-print"></i>
                                    <div class="grid grid-cols-1 md:grid-cols-4 gap-2 text-xs">
                                        <input type="text" value="${srv.name||''}" placeholder="服務項目" oninput="updateServiceField('${activeCase.id}', ${idx}, 'name', this.value)" class="bg-cosmic-950 p-1.5 border border-cosmic-700 rounded text-white">
                                        <input type="text" value="${srv.desc||''}" placeholder="案件說明" oninput="updateServiceField('${activeCase.id}', ${idx}, 'desc', this.value)" class="bg-cosmic-950 p-1.5 border border-cosmic-700 rounded text-white">
                                        <input type="number" value="${srv.quote||''}" placeholder="報價金額" oninput="updateServiceField('${activeCase.id}', ${idx}, 'quote', this.value)" class="bg-cosmic-950 p-1.5 border border-cosmic-700 rounded text-white">
                                        <input type="number" value="${srv.contract||''}" placeholder="簽約金額" oninput="updateServiceField('${activeCase.id}', ${idx}, 'contract', this.value)" class="bg-cosmic-950 p-1.5 border border-cosmic-700 rounded text-white">
                                    </div>
                                    <div class="grid grid-cols-2 md:grid-cols-5 gap-1.5 text-[11px] pt-1 border-t border-cosmic-700/20">
                                        ${[1,2,3,4,5].map(p => `
                                            <div>
                                                <input type="number" value="${srv['p'+p]||''}" placeholder="第${p}期金額" oninput="updateServiceField('${activeCase.id}', ${idx}, 'p${p}', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 p-1 rounded text-white text-center mb-1">
                                                <input type="date" value="${srv['d'+p]||''}" onchange="updateServiceField('${activeCase.id}', ${idx}, 'd${p}', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 p-1 rounded text-white text-center">
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="text-xs"><label class="text-slate-400 block mb-1">業務即時狀態備註</label><textarea oninput="updateField('${activeCase.id}', 'remark', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded p-2 text-white h-12 resize-none">${activeCase.remark||''}</textarea></div>
                    </div>

                    <!-- 二、公司基本資料 -->
                    <div class="bg-cosmic-950/40 border border-cosmic-700/30 p-4 rounded-xl space-y-3">
                        <h4 class="text-xs font-bold text-cyan-400 border-b border-cosmic-700/30 pb-1.5"><i class="fa-solid fa-industry mr-1.5"></i>二、公司基本資料</h4>
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-3 text-xs">
                            <div class="md:col-span-2"><label class="text-slate-400">公司名稱</label><input type="text" value="${activeCase.companyName}" oninput="updateCompanyName('${activeCase.id}', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1.5 text-white font-medium"></div>
                            <div><label class="text-slate-400">統編</label><input type="text" value="${activeCase.taxId||''}" oninput="updateField('${activeCase.id}', 'taxId', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1.5 text-white"></div>
                            <div><label class="text-slate-400">工廠登記證字號</label><input type="text" value="${activeCase.factoryLicense||''}" oninput="updateField('${activeCase.id}', 'factoryLicense', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1.5 text-white"></div>
                            <div><label class="text-slate-400">產業類型</label><input type="text" value="${activeCase.industryType||''}" oninput="updateField('${activeCase.id}', 'industryType', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1.5 text-white"></div>
                            <div><label class="text-slate-400">聯絡人</label><input type="text" value="${activeCase.contact||''}" oninput="updateField('${activeCase.id}', 'contact', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1.5 text-white"></div>
                            <div><label class="text-slate-400">聯絡電話</label><input type="text" value="${activeCase.phone||''}" oninput="updateField('${activeCase.id}', 'phone', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1.5 text-white"></div>
                            <div><label class="text-slate-400">E-mail</label><input type="text" value="${activeCase.email||''}" oninput="updateField('${activeCase.id}', 'email', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1.5 text-white"></div>
                            <div class="md:col-span-2"><label class="text-slate-400">工廠地址</label><input type="text" value="${activeCase.address||''}" oninput="updateField('${activeCase.id}', 'address', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1.5 text-white"></div>
                            <div class="md:col-span-2"><label class="text-slate-400">公司網站連結</label><input type="text" value="${activeCase.website||''}" oninput="updateField('${activeCase.id}', 'website', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1.5 text-white"></div>
                        </div>
                    </div>

                    <!-- 三、土地基本資料（動態加總） -->
                    <div class="bg-cosmic-950/40 border border-cosmic-700/30 p-4 rounded-xl space-y-2">
                        <div class="flex justify-between items-center border-b border-cosmic-700/30 pb-1">
                            <h4 class="text-xs font-bold text-emerald-400">三、土地基本資料 (地段地號矩陣)</h4>
                            <button onclick="addLandRow('${activeCase.id}')" class="text-[10px] bg-emerald-900 border border-emerald-700 px-2 py-0.5 rounded no-print">[＋ 地段地號]</button>
                        </div>
                        <div class="space-y-1.5">
                            ${activeCase.lands.map((l, idx) => `
                                <div class="grid grid-cols-5 gap-1 text-[11px]">
                                    <input type="text" value="${l.section||''}" placeholder="地段" oninput="updateLandField('${activeCase.id}', ${idx}, 'section', this.value)" class="bg-cosmic-950 p-1 border border-cosmic-700 rounded text-white text-center">
                                    <input type="text" value="${l.number||''}" placeholder="地號" oninput="updateLandField('${activeCase.id}', ${idx}, 'number', this.value)" class="bg-cosmic-950 p-1 border border-cosmic-700 rounded text-white text-center">
                                    <select onchange="updateLandField('${activeCase.id}', ${idx}, 'pattern', this.value)" class="bg-cosmic-950 border border-cosmic-700 rounded p-1 text-white">
                                        <option value="都市計畫內使用分區" ${l.pattern==='都市計畫內使用分區'?'selected':''}>都市計畫內分區</option>
                                        <option value="都市計畫外使用地類別" ${l.pattern==='都市計畫外使用地類別'?'selected':''}>都市計畫外類別</option>
                                    </select>
                                    <input type="number" value="${l.sqm||''}" placeholder="平方公尺" oninput="updateLandField('${activeCase.id}', ${idx}, 'sqm', this.value); refreshSums();" class="bg-cosmic-950 p-1 border border-cosmic-700 rounded text-white text-center">
                                    <input type="number" value="${l.ping||''}" placeholder="坪" oninput="updateLandField('${activeCase.id}', ${idx}, 'ping', this.value); refreshSums();" class="bg-cosmic-950 p-1 border border-cosmic-700 rounded text-white text-center">
                                </div>
                            `).join('')}
                        </div>
                        <div class="p-2.5 bg-cosmic-950 rounded-lg text-xs mt-2 border border-cosmic-700/50 flex justify-between">
                            <span>土地總面積加總 (平方公尺): <strong class="text-emerald-400" id="sum-land-sqm">${totalLandSqm}</strong></span>
                            <span>土地總面積加總 (坪): <strong class="text-emerald-400" id="sum-land-ping">${totalLandPing}</strong></span>
                        </div>
                    </div>

                    <!-- 四、建物基本資料（有保存登記建物 ＆ 違章建物拆分加總） -->
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 text-xs">
                        <div class="bg-cosmic-950/40 border border-cosmic-700/30 p-4 rounded-xl space-y-2">
                            <div class="flex justify-between items-center border-b border-cosmic-700/30 pb-1">
                                <span class="font-bold text-blue-400">四、有保存登記建物明細</span>
                                <button onclick="addBuildRow('${activeCase.id}', 'legal')" class="text-[10px] bg-blue-900 border border-blue-700 px-1.5 py-0.5 rounded no-print">[＋ 建號]</button>
                            </div>
                            <div class="space-y-1">${activeCase.buildingsLegal.map((b, i) => `
                                <div class="grid grid-cols-3 gap-1"><input type="text" value="${b.number||''}" placeholder="建號" oninput="updateBuildField('${activeCase.id}', 'legal', ${i}, 'number', this.value)" class="bg-cosmic-950 p-1 text-white border border-cosmic-700 rounded text-center"><input type="text" value="${b.year||''}" placeholder="建造年份" oninput="updateBuildField('${activeCase.id}', 'legal', ${i}, 'year', this.value)" class="bg-cosmic-950 p-1 text-white border border-cosmic-700 rounded text-center"><input type="number" value="${b.ping||''}" placeholder="坪數" oninput="updateBuildField('${activeCase.id}', 'legal', ${i}, 'ping', this.value); refreshSums();" class="bg-cosmic-950 p-1 text-white border border-cosmic-700 rounded text-center"></div>
                            `).join('')}</div>
                            <div class="pt-2 border-t border-cosmic-700/20 text-[11px]">有保存登記總坪數: <strong class="text-blue-400" id="sum-legal-ping">${totalLegalPing}</strong> 坪</div>
                        </div>

                        <div class="bg-cosmic-950/40 border border-cosmic-700/30 p-4 rounded-xl space-y-2">
                            <div class="flex justify-between items-center border-b border-cosmic-700/30 pb-1">
                                <span class="font-bold text-red-400">四、違章建物明細</span>
                                <button onclick="addBuildRow('${activeCase.id}', 'illegal')" class="text-[10px] bg-red-950 border border-red-900 px-1.5 py-0.5 rounded no-print">[＋ 違章建物]</button>
                            </div>
                            <div class="space-y-1'">${activeCase.buildingsIllegal.map((b, i) => `
                                <div class="grid grid-cols-3 gap-1"><input type="text" value="${b.type||''}" placeholder="建物類別" oninput="updateBuildField('${activeCase.id}', 'illegal', ${i}, 'type', this.value)" class="bg-cosmic-950 p-1 text-white border border-cosmic-700 rounded text-center"><input type="text" value="${b.year||''}" placeholder="建造年份" oninput="updateBuildField('${activeCase.id}', 'illegal', ${i}, 'year', this.value)" class="bg-cosmic-950 p-1 text-white border border-cosmic-700 rounded text-center"><input type="number" value="${b.ping||''}" placeholder="坪數" oninput="updateBuildField('${activeCase.id}', 'illegal', ${i}, 'ping', this.value); refreshSums();" class="bg-cosmic-950 p-1 text-white border border-cosmic-700 rounded text-center"></div>
                            `).join('')}</div>
                            <div class="pt-2 border-t border-cosmic-700/20 text-[11px]">違章建物總坪數: <strong class="text-red-400" id="sum-illegal-ping">${totalIllegalPing}</strong> 坪</div>
                        </div>
                    </div>

                    <!-- 五、用電狀況 -->
                    <div class="bg-cosmic-950/40 border border-cosmic-700/30 p-4 rounded-xl space-y-2 text-xs">
                        <h4 class="font-bold text-teal-400 border-b border-cosmic-700/30 pb-1">五、用電狀況</h4>
                        <div class="grid grid-cols-2 md:grid-cols-6 gap-3">
                            <div><label class="text-slate-400">每月平均電費</label><input type="number" value="${activeCase.electricBill||''}" oninput="updateField('${activeCase.id}', 'electricBill', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1 text-white"></div>
                            <div><label class="text-slate-400">馬力</label><input type="text" value="${activeCase.horsepower||''}" oninput="updateField('${activeCase.id}', 'horsepower', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1 text-white"></div>
                            <div><label class="text-slate-400">契約容量(kW)</label><input type="number" value="${activeCase.contractCapacity||''}" oninput="updateField('${activeCase.id}', 'contractCapacity', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-2 py-1 text-white"></div>
                            <div><label class="text-slate-400">高壓用電</label><select onchange="updateField('${activeCase.id}', 'isHighVoltage', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 p-1 text-white"><option value="是" ${activeCase.isHighVoltage==='是'?'selected':''}>是</option><option value="否" ${activeCase.isHighVoltage==='否'?'selected':''}>否</option></select></div>
                            <div><label class="text-slate-400">時間電價</label><select onchange="updateField('${activeCase.id}', 'isTimeRate', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 p-1 text-white"><option value="是" ${activeCase.isTimeRate==='是'?'selected':''}>是</option><option value="否" ${activeCase.isTimeRate==='否'?'selected':''}>否</option><option value="不清楚" ${activeCase.isTimeRate==='不清楚'?'selected':''}>不清楚</option></select></div>
                            <div><label class="text-slate-400">用電時段</label><select onchange="updateField('${activeCase.id}', 'timePeriod', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 p-1 text-white"><option value="白天為主" ${activeCase.timePeriod==='白天為主'?'selected':''}>白天為主</option><option value="夜間為主" ${activeCase.timePeriod==='夜間為主'?'selected':''}>夜間為主</option><option value="平均分佈" ${activeCase.timePeriod==='平均分佈'?'selected':''}>平均分佈</option></select></div>
                        </div>
                    </div>

                    <!-- 六、ESG評估 -->
                    <div class="bg-cosmic-950/40 border border-cosmic-700/30 p-4 rounded-xl space-y-3 text-xs">
                        <h4 class="font-bold text-amber-400 border-b border-cosmic-700/30 pb-1">六、ESG評估</h4>
                        <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
                            ${[['esgHasSuccessor', '是否有接班人'], ['esgIsExport', '產品是否外銷'], ['esgEuCarbon', '是否受歐盟減碳要求'], ['esgGreenCert', '是否需要綠電憑證'], ['esgStorage', '是否需要儲能系統']].map(([key, label]) => `
                                <div>
                                    <label class="text-slate-400 block mb-0.5">${label}</label>
                                    <select onchange="updateField('${activeCase.id}', '${key}', this.value)" class="w-full bg-cosmic-950 border border-cosmic-700 rounded px-1.5 py-1 text-white">
                                        <option value="是" ${activeCase[key]==='是'?'selected':''}>是</option>
                                        <option value="否" ${activeCase[key]==='否'?'selected':''}>否</option>
                                        <option value="評估中" ${activeCase[key]==='評估中'?'selected':''}>評估中</option>
                                    </select>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <!-- 七、應備文件雙軌分流 -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs">
                        <div class="bg-cosmic-950/40 border border-cosmic-700/40 p-4 rounded-xl space-y-2">
                            <div class="flex justify-between items-center border-b border-cosmic-700/30 pb-1">
                                <span class="font-bold text-violet-400">七、客戶應備文件清單 (動態新增刪除)</span>
                                <button onclick="addDocItem('${activeCase.id}', 'client')" class="text-[10px] bg-violet-900 px-2 rounded no-print">[＋ 新增]</button>
                            </div>
                            <div class="space-y-1">${activeCase.customDocsClient.map((d, i) => `<div class="flex justify-between bg-cosmic-950 p-1.5 rounded border border-cosmic-700/40"><label class="flex items-center space-x-2"><input type="checkbox" checked class="text-violet-500"><span>${d}</span></label><i onclick="removeDocItem('${activeCase.id}', 'client', ${i})" class="fa-solid fa-trash text-red-400 cursor-pointer no-print"></i></div>`).join('')}</div>
                        </div>
                        <div class="bg-cosmic-950/40 border border-cosmic-700/40 p-4 rounded-xl space-y-2">
                            <div class="flex justify-between items-center border-b border-cosmic-700/30 pb-1">
                                <span class="font-bold text-cyan-400">七、睿立調閱文件清單</span>
                                <button onclick="addDocItem('${activeCase.id}', 'ruili')" class="text-[10px] bg-cyan-900 px-2 rounded no-print">[＋ 新增]</button>
                            </div>
                            <div class="space-y-1">${activeCase.customDocsRuili.map((d, i) => `<div class="flex justify-between bg-cosmic-950 p-1.5 rounded border border-cosmic-700/40"><label class="flex items-center space-x-2"><input type="checkbox" checked class="text-cyan-500"><span>${d}</span></label><i onclick="removeDocItem('${activeCase.id}', 'ruili', ${i})" class="fa-solid fa-trash text-red-400 cursor-pointer no-print"></i></div>`).join('')}</div>
                        </div>
                    </div>

                    <!-- 睿立三大公司資訊頁尾 -->
                    <footer class="bg-cosmic-950 px-6 py-4 border-t border-cosmic-700/40 text-[11px] text-slate-400 flex flex-col items-center space-y-2">
                        <div class="flex flex-wrap justify-center gap-x-6 font-medium">
                            <span>睿立資產管理顧問有限公司 (統編: 90411790)</span>
                            <span>元業綠能驗證有限公司 (統編: 90000831)</span>
                            <span>天梁不動產股份有限公司 (統編: 93628169)</span>
                        </div>
                        <div class="flex gap-x-4 text-slate-500"><span>TEL: 07-222-5595</span><span>FAX: 07-269-3091</span><span>E-mail: ruilu1101108@gmail.com</span></div>
                        <div class="text-amber-500 font-semibold text-center pt-1 border-t border-cosmic-700/10 w-full">⚠️ 備註說明：此文件報價及建議有效期限一個月（每一頁 A4 最下面必需顯示）</div>
                    </footer>
                </div>
            `;
        }

        // ==================== 函數邏輯與動態即時同步 ====================
        function updateField(id, field, value) { caseEvalData.find(c => c.id === id)[field] = value; }
        function updateCompanyName(id, value) {
            let target = caseEvalData.find(c => c.id === id);
            if (target) { target.companyName = value; renderSidebarSubLists(); }
        }
        function updateServiceField(id, idx, field, value) { caseEvalData.find(c => c.id === id).services[idx][field] = value; }
        function updateLandField(id, idx, field, value) { caseEvalData.find(c => c.id === id).lands[idx][field] = value; }
        function updateBuildField(id, side, idx, field, value) {
            let target = caseEvalData.find(c => c.id === id);
            if(side === 'legal') target.buildingsLegal[idx][field] = value;
            else target.buildingsIllegal[idx][field] = value;
        }

        function addServiceRow(id) { caseEvalData.find(c => c.id === id).services.push({ name: "", desc: "", remark: "", quote: "", contract: "" }); renderMainForms(); }
        function removeServiceRow(id, idx) { caseEvalData.find(c => c.id === id).services.splice(idx, 1); renderMainForms(); }
        function addLandRow(id) { caseEvalData.find(c => c.id === id).lands.push({ section: "", number: "", pattern: "都市計畫內使用分區", sqm: "", ping: "" }); renderMainForms(); }
        function addBuildRow(id, side) {
            let target = caseEvalData.find(c => c.id === id);
            if (side === 'legal') target.buildingsLegal.push({ number: "", type: "", year: "", sqm: "", ping: "" });
            else target.buildingsIllegal.push({ type: "", year: "", sqm: "", ping: "" });
            renderMainForms();
        }

        function addDocItem(id, side) {
            let item = prompt("請輸入新增的文件項目：");
            if (item) {
                let target = caseEvalData.find(c => c.id === id);
                if (side === 'client') target.customDocsClient.push(item);
                else target.customDocsRuili.push(item);
                renderMainForms();
            }
        }
        function removeDocItem(id, side, idx) {
            let target = caseEvalData.find(c => c.id === id);
            if (side === 'client') target.customDocsClient.splice(idx, 1);
            else target.customDocsRuili.splice(idx, 1);
            renderMainForms();
        }

        function refreshSums() {
            let activeCase = caseEvalData.find(c => c.id === selectedIds["case-eval"]);
            if (!activeCase) return;
            document.getElementById("sum-land-sqm").innerText = activeCase.lands.reduce((sum, l) => sum + parseFloat(l.sqm || 0), 0);
            document.getElementById("sum-land-ping").innerText = activeCase.lands.reduce((sum, l) => sum + parseFloat(l.ping || 0), 0);
            document.getElementById("sum-legal-ping").innerText = activeCase.buildingsLegal.reduce((sum, b) => sum + parseFloat(b.ping || 0), 0);
            document.getElementById("sum-illegal-ping").innerText = activeCase.buildingsIllegal.reduce((sum, b) => sum + parseFloat(b.ping || 0), 0);
        }

        function addNewCase() {
            const nid = "id-" + Date.now();
            caseEvalData.unshift({
                id: nid, date: new Date().toISOString().slice(0, 16), status: "初期評估", manager: "樊靖畇", companyName: "全新公司案件 " + (caseEvalData.length + 1),
                services: [], lands: [], buildingsLegal: [], buildingsIllegal: [], customDocsClient: ["電費單"], customDocsRuili: ["土地謄本"]
            });
            selectedIds["case-eval"] = nid;
            renderSidebarSubLists(); renderMainForms();
        }

        function saveToCloud() { alert("I版『案件評估』精確重構架構：已100%成功與雲端同步。"); }
        window.onload = function() { toggleCategory('case-eval'); selectSpecificCase('eval-1'); };
    </script>
</body>
</html>
