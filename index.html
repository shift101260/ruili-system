<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>睿立業務系統 - N核心管理平台 (Supabase MVP)</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome 圖標 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cosmic: {
                            950: '#060b19', 900: '#0a142c', 800: '#112246', 700: '#1a3160', 600: '#234280', 500: '#315cb5', 400: '#4c7cd4'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #060b19; color: #e2e8f0; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        @media print {
            @page { size: portrait; margin: 10mm !important; }
            body { background: white !important; color: black !important; overflow: visible !important; }
            aside, header, .no-print, input[type="file"], button { display: none !important; }
            main { padding: 0 !important; margin: 0 !important; overflow: visible !important; display: block !important; }
            .print-container { width: 210mm !important; max-width: 100% !important; background: white !important; color: black !important; padding: 0mm !important; box-shadow: none !important; border: none !important; display: block !important; }
            .card-box { background: transparent !important; border: 1px solid #000 !important; color: black !important; padding: 12px !important; border-radius: 8px !important; page-break-inside: avoid !important; }
            input, select, textarea { background: transparent !important; color: black !important; border: none !important; border-bottom: 1px solid #666 !important; border-radius: 0 !important; padding: 2px !important; font-weight: bold !important; }
            .text-white, .text-slate-300, .text-slate-400, .text-amber-300, .text-amber-400, .text-cyan-400, .text-emerald-400, .text-purple-300, .text-purple-400, .text-indigo-300, .text-indigo-400, .text-teal-400, .text-sky-400, .text-violet-400, label { color: black !important; -webkit-text-fill-color: black !important; opacity: 1 !important; display: inline-block !important; font-weight: bold !important; }
            .bg-cosmic-950, .bg-cosmic-900, .bg-cosmic-800, .bg-cosmic-950\/40, .bg-cosmic-900\/60, .bg-cosmic-950\/60, .bg-cosmic-900\/30, .bg-cosmic-950\/80, .bg-cosmic-950\/50 { background: transparent !important; }
            footer { border-top: 1px solid black !important; color: black !important; margin-top: 20px !important; }
            h3, h4 { color: black !important; border-bottom: 1px solid black !important; padding-bottom: 4px !important; }
        }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <!-- PIN 碼身分驗證 Overlay Modal -->
    <div id="pin-login-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-50 flex items-center justify-center">
        <div class="bg-cosmic-900 border border-cosmic-700 rounded-2xl p-8 w-96 shadow-2xl space-y-6 text-center">
            <div class="w-16 h-16 bg-gradient-to-tr from-cosmic-500 to-cyan-400 rounded-2xl flex items-center justify-center mx-auto shadow-lg">
                <i class="fa-solid fa-lock text-white text-2xl"></i>
            </div>
            <div>
                <h2 class="text-xl font-bold text-white tracking-wider">睿立系統登入</h2>
                <p class="text-xs text-slate-400 mt-1">請輸入您的個人 PIN 碼解鎖系統</p>
            </div>
            <div class="space-y-3">
                <input type="password" id="pin-input" maxlength="10" placeholder="請輸入 PIN 碼" class="w-full bg-cosmic-950 border border-cosmic-600 rounded-xl px-4 py-3 text-center text-lg font-bold text-white tracking-widest focus:outline-none focus:border-cyan-400 transition">
                <button onclick="loginWithPin()" class="w-full bg-gradient-to-r from-cosmic-500 to-cyan-500 hover:from-cosmic-600 hover:to-cyan-600 text-white font-bold py-3 rounded-xl shadow-lg transition">驗證登入</button>
            </div>
            <div class="text-[11px] text-slate-500 text-left space-y-1 bg-cosmic-950/50 p-3 rounded-lg border border-cosmic-800">
                <p>測試 PIN 碼示範：</p>
                <p>• 黃逸豪 (業務): <span class="text-cyan-400 font-mono">800506</span></p>
                <p>• 中央控台 (股東): <span class="text-amber-400 font-mono">1101108</span></p>
            </div>
        </div>
    </div>

    <!-- LEFT SIDEBAR -->
    <aside class="w-72 bg-cosmic-900 border-r border-cosmic-700/50 flex flex-col justify-between shrink-0 select-none">
        <div>
            <div class="p-6 border-b border-cosmic-700/30 flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-gradient-to-tr from-cosmic-500 to-cyan-400 rounded-xl flex items-center justify-center shadow-lg">
                        <i class="fa-solid fa-folder-tree text-white text-lg"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold tracking-wider text-white">睿立集團</h1>
                        <p class="text-xs text-slate-400">RUILI SYSTEM N</p>
                    </div>
                </div>
            </div>

            <!-- 當前使用者卡片 -->
            <div class="px-4 py-3 bg-cosmic-950/60 border-b border-cosmic-700/30 flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <span id="user-role-badge" class="px-2 py-0.5 rounded text-[10px] font-bold bg-blue-500/20 text-blue-400 border border-blue-500/30">業務</span>
                    <span id="user-name-display" class="text-xs font-bold text-white">未登入</span>
                </div>
                <button onclick="switchUserPin()" class="text-[11px] text-slate-400 hover:text-white underline"><i class="fa-solid fa-right-from-bracket mr-1"></i>切換</button>
            </div>

            <!-- 五大軌道選單 -->
            <nav class="p-4 space-y-1.5 overflow-y-auto max-h-[calc(100vh-240px)]">
                <div>
                    <button onclick="toggleCategory('case-eval')" class="w-full flex items-center justify-between px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-folder-open w-5 text-center text-cyan-400"></i>
                            <span class="font-medium text-sm tracking-wide">專案管理</span>
                        </div>
                        <i id="arrow-case-eval" class="fa-solid fa-chevron-down text-xs text-slate-500"></i>
                    </button>
                    <div id="sub-list-case-eval" class="hidden pl-9 pr-2 mt-1 space-y-1 border-l border-cosmic-700/40 ml-6"></div>
                </div>

                <div>
                    <button onclick="toggleCategory('solar')" class="w-full flex items-center justify-between px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-solar-panel w-5 text-center text-amber-400"></i>
                            <span class="font-medium text-sm tracking-wide">太陽能自建</span>
                        </div>
                        <i id="arrow-solar" class="fa-solid fa-chevron-down text-xs text-slate-500"></i>
                    </button>
                    <div id="sub-list-solar" class="hidden pl-9 pr-2 mt-1 space-y-1 border-l border-cosmic-700/40 ml-6"></div>
                </div>

                <div>
                    <button onclick="toggleCategory('trading')" class="w-full flex items-center justify-between px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-building-circle-arrow-right w-5 text-center text-emerald-400"></i>
                            <span class="font-medium text-sm tracking-wide">工廠買賣案件資料表</span>
                        </div>
                        <i id="arrow-trading" class="fa-solid fa-chevron-down text-xs text-slate-500"></i>
                    </button>
                    <div id="sub-list-trading" class="hidden pl-9 pr-2 mt-1 space-y-1 border-l border-cosmic-700/40 ml-6"></div>
                </div>

                <div>
                    <button onclick="toggleCategory('meeting')" class="w-full flex items-center justify-between px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-handshake w-5 text-center text-purple-400"></i>
                            <span class="font-medium text-sm tracking-wide">會議記錄</span>
                        </div>
                        <i id="arrow-meeting" class="fa-solid fa-chevron-down text-xs text-slate-500"></i>
                    </button>
                    <div id="sub-list-meeting" class="hidden pl-9 pr-2 mt-1 space-y-1 border-l border-cosmic-700/40 ml-6"></div>
                </div>

                <div>
                    <button onclick="toggleCategory('internal-meet')" class="w-full flex items-center justify-between px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-comments w-5 text-center text-indigo-400"></i>
                            <span class="font-medium text-sm tracking-wide">睿立會議紀錄</span>
                        </div>
                        <i id="arrow-internal-meet" class="fa-solid fa-chevron-down text-xs text-slate-500"></i>
                    </button>
                    <div id="sub-list-internal-meet" class="hidden pl-9 pr-2 mt-1 space-y-1 border-l border-cosmic-700/40 ml-6"></div>
                </div>
            </nav>
        </div>
    </aside>

    <!-- MAIN VIEWPORT -->
    <main class="flex-1 flex flex-col overflow-hidden bg-cosmic-950">
        <!-- TOP BAR -->
        <header class="h-16 border-b border-cosmic-700/40 px-8 flex items-center justify-between shrink-0 bg-cosmic-900/40 backdrop-blur-md z-10 no-print">
            <div class="flex items-center space-x-3">
                <input type="text" id="global-search" oninput="filterCases()" placeholder="按關鍵字篩選案件..." class="w-72 bg-cosmic-950 border border-cosmic-700 rounded-xl px-4 py-1.5 text-sm text-white focus:outline-none focus:border-cyan-500">
                <!-- 股東控台專用：資源回收桶切換 -->
                <div id="trash-toggle-container" class="hidden flex items-center space-x-1.5 pl-3 border-l border-cosmic-700/50">
                    <label class="flex items-center space-x-2 text-xs text-slate-400 cursor-pointer select-none">
                        <input type="checkbox" id="show-trash-checkbox" onchange="toggleTrashView(this.checked)" class="w-4 h-4 text-amber-500 rounded border-cosmic-700 bg-cosmic-950">
                        <span><i class="fa-solid fa-trash-arrow-up mr-1 text-amber-400"></i>顯示資源回收桶</span>
                    </label>
                </div>
            </div>
            <div class="flex items-center space-x-3">
                <button onclick="addNewCase()" class="bg-gradient-to-r from-cosmic-500 to-blue-600 text-white text-xs font-semibold px-4 py-2 rounded-xl flex items-center space-x-1.5 shadow-md hover:opacity-90 transition">
                    <i class="fa-solid fa-plus"></i><span>新增案件</span>
                </button>
                <button onclick="deleteCurrentCase()" class="bg-red-600 hover:bg-red-500 text-white text-xs font-semibold px-4 py-2 rounded-xl flex items-center space-x-1.5 shadow-md transition">
                    <i class="fa-solid fa-trash-can"></i><span>刪除案件</span>
                </button>
                <!-- 股東控台專用：一鍵復原 -->
                <button id="restore-btn" onclick="restoreCurrentCase()" class="hidden bg-amber-600 hover:bg-amber-500 text-white text-xs font-semibold px-4 py-2 rounded-xl flex items-center space-x-1.5 shadow-md transition">
                    <i class="fa-solid fa-rotate-left"></i><span>一鍵復原</span>
                </button>
                <button onclick="window.print()" class="bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white text-xs font-semibold px-4 py-2 rounded-xl flex items-center shadow-lg transition">
                    <i class="fa-solid fa-print mr-1.5"></i> 一鍵匯出/列印
                </button>
                <button onclick="saveToCloud()" class="bg-emerald-600 text-white text-xs font-semibold px-4 py-2 rounded-xl hover:bg-emerald-500 transition shadow-md">
                    <i class="fa-solid fa-cloud-arrow-up mr-1"></i>儲存
                </button>
            </div>
        </header>

        <!-- ROUTING CONTENT -->
        <div class="flex-1 overflow-y-auto p-8 flex justify-center">
            <div class="w-full max-w-5xl print-container">
                <section id="tab-case-eval" class="tab-content active"><div id="case-eval-container" class="space-y-6"></div></section>
                <section id="tab-solar" class="tab-content"><div id="solar-container" class="space-y-6"></div></section>
                <section id="tab-trading" class="tab-content"><div id="trading-container" class="space-y-6"></div></section>
                <section id="tab-meeting" class="tab-content"><div id="meeting-container" class="space-y-6"></div></section>
                <section id="tab-internal-meet" class="tab-content"><div id="internal-meet-container" class="space-y-6"></div></section>
            </div>
        </div>
    </main>

    <!-- 自訂刪除案件確認彈窗 (Modal) -->
    <div id="delete-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden flex items-center justify-center no-print">
        <div class="bg-cosmic-900 border border-cosmic-700 rounded-2xl p-6 w-96 shadow-2xl space-y-5 text-center">
            <div class="w-12 h-12 bg-red-500/20 text-red-500 rounded-full flex items-center justify-center mx-auto text-xl">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <h3 class="text-base font-bold text-white">確定要刪除嗎？</h3>
            <p class="text-xs text-slate-400" id="delete-target-text">刪除後資料將移至安全軟刪除狀態。</p>
            <div class="flex justify-center space-x-3 pt-2">
                <button onclick="confirmDeleteCase()" class="bg-red-600 hover:bg-red-500 text-white text-xs font-bold px-5 py-2 rounded-xl transition">確認刪除</button>
                <button onclick="closeDeleteModal()" class="bg-slate-700 hover:bg-slate-600 text-white text-xs font-bold px-5 py-2 rounded-xl transition">取消</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== Supabase 設定與初始化 ====================
        const SUPABASE_URL = 'https://YOUR_SUPABASE_PROJECT_ID.supabase.co'; // 請替換為您的 Supabase URL
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';                // 請替換為您的 Supabase Key
        let db = null;
        
        try {
            db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch(e) {
            console.warn("Supabase 尚未設定 URL 與 Key，預設將採用本地 Memory 模式。");
        }

        // 身分名單配置與 PIN 碼
        const USER_PROFILES = {
            "800506": { name: "黃逸豪", role: "sales" },
            "1101108": { name: "中央控台", role: "shareholder" }
        };

        let currentUser = null; // 當前使用者物件
        let showTrash = false;   // 股東控台是否檢視資源回收桶

        // 案件全域數據
        let allCases = [];
        let selectedIds = { "case-eval": null, "solar": null, "trading": null, "meeting": null, "internal-meet": null };
        let currentActiveTab = "case-eval";

        const managersList = ["樊靖畇", "鄭家承", "陳宥騰", "楊裕憲", "楊淯淳", "黃逸豪"];
        const statusConfig = { "初期評估": "bg-emerald-500", "已報價": "bg-blue-500", "準備簽約": "bg-amber-500", "已簽約": "bg-red-500", "結案": "bg-purple-500", "沒下文": "bg-slate-600" };

        // ═══ 1. PIN 碼登入機制 ═══
        function loginWithPin() {
            const pin = document.getElementById('pin-input').value.trim();
            if (USER_PROFILES[pin]) {
                currentUser = USER_PROFILES[pin];
                document.getElementById('pin-login-modal').classList.add('hidden');
                document.getElementById('user-name-display').innerText = currentUser.name;
                
                const badge = document.getElementById('user-role-badge');
                if (currentUser.role === 'shareholder') {
                    badge.innerText = "股東控台";
                    badge.className = "px-2 py-0.5 rounded text-[10px] font-bold bg-amber-500/20 text-amber-400 border border-amber-500/30";
                    document.getElementById('trash-toggle-container').classList.remove('hidden');
                } else {
                    badge.innerText = "業務";
                    badge.className = "px-2 py-0.5 rounded text-[10px] font-bold bg-blue-500/20 text-blue-400 border border-blue-500/30";
                    document.getElementById('trash-toggle-container').classList.add('hidden');
                }

                loadCasesFromCloud();
                setupRealtimeSubscription();
            } else {
                alert("PIN 碼錯誤，請重新輸入！");
            }
        }

        function switchUserPin() {
            document.getElementById('pin-input').value = "";
            document.getElementById('pin-login-modal').classList.remove('hidden');
        }

        // ═══ 2. Supabase 資料讀取與 Realtime 監聽 ═══
        async function loadCasesFromCloud() {
            if (!db) {
                // 本地模擬測試數據
                loadMockData();
                renderSidebarSubLists();
                renderMainForms();
                return;
            }

            let query = db.from('cases').select('*');

            // 業務登入：僅顯示個人案件且未被刪除者
            if (currentUser.role === 'sales') {
                query = query.eq('sales_name', currentUser.name).eq('is_deleted', false);
            } else if (currentUser.role === 'shareholder') {
                // 股東登入：顯示全公司案件，若開啟回收桶才包含刪除者
                if (!showTrash) {
                    query = query.eq('is_deleted', false);
                }
            }

            const { data, error } = await query.order('created_at', { ascending: false });

            if (error) {
                console.error("載入失敗：", error);
                return;
            }

            allCases = data.map(item => ({
                id: item.id,
                sales_name: item.sales_name,
                category: item.category,
                is_deleted: item.is_deleted,
                deleted_at: item.deleted_at,
                ...item.content
            }));

            // 選取各軌道第一筆資料作為預設
            ["case-eval", "solar", "trading", "meeting", "internal-meet"].forEach(cat => {
                const catData = getTargetDataArray(cat);
                if (catData.length > 0 && !selectedIds[cat]) {
                    selectedIds[cat] = catData[0].id;
                }
            });

            renderSidebarSubLists();
            renderMainForms();
        }

        function setupRealtimeSubscription() {
            if (!db) return;

            db.channel('public:cases')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'cases' }, payload => {
                    console.log('⚡ Realtime 收到變更:', payload);
                    loadCasesFromCloud(); // 即時重新整理清單
                })
                .subscribe();
        }

        function toggleTrashView(isChecked) {
            showTrash = isChecked;
            loadCasesFromCloud();
        }

        function getTargetDataArray(tabId) {
            return allCases.filter(c => c.category === tabId);
        }

        // ═══ 3. 軟刪除 (Soft Delete) 與 一鍵復原 ═══
        function deleteCurrentCase() {
            const dataArr = getTargetDataArray(currentActiveTab);
            if (dataArr.length === 0) { alert("目前沒有可刪除的項目！"); return; }
            
            const activeId = selectedIds[currentActiveTab];
            const target = dataArr.find(c => c.id === activeId);
            if (target) {
                const name = target.companyName || target.meetSubject || '當前項目';
                document.getElementById('delete-target-text').innerText = `確定要刪除「${name}」嗎？點擊後將放入回收桶備查。`;
                document.getElementById('delete-modal').classList.remove('hidden');
            }
        }

        function closeDeleteModal() { document.getElementById('delete-modal').classList.add('hidden'); }

        async function confirmDeleteCase() {
            const activeId = selectedIds[currentActiveTab];
            const deletedTimeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            if (db) {
                // Supabase 軟刪除更新
                await db.from('cases').update({
                    is_deleted: true,
                    deleted_at: deletedTimeStr
                }).eq('id', activeId);
            } else {
                // 本地記憶體模擬軟刪除
                const item = allCases.find(c => c.id === activeId);
                if (item) {
                    item.is_deleted = true;
                    item.deleted_at = deletedTimeStr;
                }
            }

            closeDeleteModal();
            loadCasesFromCloud();
        }

        async function restoreCurrentCase() {
            const activeId = selectedIds[currentActiveTab];
            if (db) {
                await db.from('cases').update({
                    is_deleted: false,
                    deleted_at: null
                }).eq('id', activeId);
            } else {
                const item = allCases.find(c => c.id === activeId);
                if (item) {
                    item.is_deleted = false;
                    item.deleted_at = null;
                }
            }
            alert("案件已成功復原！");
            loadCasesFromCloud();
        }

        // ═══ 4. 雲端儲存 (Save to Supabase) ═══
        async function saveToCloud() {
            const activeId = selectedIds[currentActiveTab];
            const activeCase = allCases.find(c => c.id === activeId);

            if (!activeCase) { alert("無可儲存的案件。"); return; }

            const { id, sales_name, category, is_deleted, deleted_at, ...contentData } = activeCase;
            const title = activeCase.companyName || activeCase.meetSubject || '未命名項目';

            if (db) {
                const { error } = await db.from('cases').upsert({
                    id: id,
                    sales_name: sales_name || currentUser.name,
                    category: category,
                    title: title,
                    content: contentData,
                    is_deleted: is_deleted || false
                });

                if (error) {
                    alert("儲存失敗：" + error.message);
                } else {
                    alert("雲端同步儲存成功！");
                    loadCasesFromCloud();
                }
            } else {
                alert("【測試模式】案件資料已儲存至暫存記憶體！");
            }
        }

        // ═══ 5. 側邊欄與多軌道切換 ═══
        function toggleCategory(catId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            ["case-eval", "solar", "trading", "meeting", "internal-meet"].forEach(id => {
                document.getElementById(`sub-list-${id}`)?.classList.add('hidden');
            });
            document.getElementById(`sub-list-${catId}`)?.classList.remove('hidden');
            currentActiveTab = catId;
            document.getElementById(`tab-${catId}`)?.classList.add('active');
            renderSidebarSubLists(); 
            renderMainForms();
        }

        function renderSidebarSubLists() {
            ["case-eval", "solar", "trading", "meeting", "internal-meet"].forEach(tabId => {
                const container = document.getElementById(`sub-list-${tabId}`);
                if (!container) return;
                const dataArr = getTargetDataArray(tabId);
                
                container.innerHTML = dataArr.map(c => {
                    const isSelected = selectedIds[tabId] === c.id && currentActiveTab === tabId;
                    const deleteTag = (currentUser.role === 'shareholder' && c.is_deleted) 
                        ? `<span class="ml-1 bg-gray-700 text-gray-300 px-1 py-0.2 rounded text-[10px]">[${c.sales_name||'業務'}已刪除 ${c.deleted_at||''}]</span>` 
                        : '';

                    return `
                        <button onclick="selectSpecificCase('${c.id}', '${tabId}')" class="w-full text-left py-1.5 px-3 rounded-lg text-xs truncate transition flex items-center justify-between ${isSelected ? 'bg-cosmic-500 text-white font-semibold' : 'text-slate-400 hover:text-slate-200'}">
                            <span class="truncate"><i class="fa-solid fa-folder mr-2"></i>${c.companyName || c.meetSubject || '未命名項目'}</span>
                            ${deleteTag}
                        </button>
                    `;
                }).join('');
            });
        }

        function selectSpecificCase(id, tabId) { 
            selectedIds[tabId] = id; 
            renderMainForms(); 
            renderSidebarSubLists(); 
        }

        function filterCases() {
            const query = document.getElementById('global-search').value.toLowerCase();
            const container = document.getElementById(`sub-list-${currentActiveTab}`);
            if (!container) return;
            const dataArr = getTargetDataArray(currentActiveTab);
            container.innerHTML = dataArr.filter(c => {
                const name = c.companyName || c.meetSubject || '';
                return name.toLowerCase().includes(query);
            }).map(c => `
                <button onclick="selectSpecificCase('${c.id}', '${currentActiveTab}')" class="w-full text-left py-1.5 px-3 rounded-lg text-xs truncate transition ${selectedIds[currentActiveTab] === c.id ? 'bg-cosmic-500 text-white font-semibold' : 'text-slate-400 hover:text-slate-200'}">
                    <i class="fa-solid fa-folder mr-2"></i>${c.companyName || c.meetSubject || '未命名項目'}
                </button>
            `).join('');
        }

        // ═══ 6. 渲染主要表單內容 ═══
        function renderMainForms() {
            const dataArr = getTargetDataArray(currentActiveTab);
            const activeCase = dataArr.find(c => c.id === selectedIds[currentActiveTab]) || dataArr[0];
            const container = document.getElementById(currentActiveTab + "-container");
            if (!container) return;

            if (!activeCase) { container.innerHTML = "<p class='text-xs text-slate-500 p-4'>暫無項目。</p>"; return; }

            // 控制一鍵復原按鈕顯示
            const restoreBtn = document.getElementById('restore-btn');
            if (currentUser.role === 'shareholder' && activeCase.is_deleted) {
                restoreBtn.classList.remove('hidden');
            } else {
                restoreBtn.classList.add('hidden');
            }

            if (currentActiveTab === 'case-eval') {
                container.innerHTML = generateCaseEvalHTML(activeCase);
            } else if (currentActiveTab === 'solar') {
                container.innerHTML = generateSolarHTML(activeCase);
                calculateSolarLive(activeCase.id);
            } else if (currentActiveTab === 'trading') {
                container.innerHTML = generateTradingHTML(activeCase);
            } else if (currentActiveTab === 'meeting') {
                container.innerHTML = generateMeetingHTML(activeCase);
            } else if (currentActiveTab === 'internal-meet') {
                container.innerHTML = generateInternalMeetHTML(activeCase);
            }
        }

            let obj = {

                category: currentActiveTab,
                is_deleted: false,
                date: new Date().toISOString().slice(0, 16),
                status: "初期評估",
                manager: currentUser.name
            };

            if (currentActiveTab === 'internal-meet') {
                obj.meetSubject = "新睿立會議紀錄";
                obj.attendees = [currentUser.name];
                obj.caseReports = []; obj.proposalReports = []; obj.uploadedFiles = [];
            } else if (currentActiveTab === 'meeting') {
                obj.meetSubject = "外部對接會議記錄";
                obj.ruiliAttendees = [currentUser.name];
                obj.externalRepresentatives = []; obj.contents = []; obj.uploadedFiles = [];
            } else {
                obj.companyName = "全新案件項目";
                obj.services = []; obj.solarServices = []; obj.lands = []; obj.buildingsLegal = []; obj.buildingsIllegal = [];
                obj.customDocsClient = ["電費單", "使用執照"]; obj.customDocsRuili = ["土地謄本"];
                obj.clientFilesObj = []; obj.ruiliFilesObj = [];
            }

            allCases.unshift(obj);
            selectedIds[currentActiveTab] = nid;
            renderSidebarSubLists();
            renderMainForms();
        }
