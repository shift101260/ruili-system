<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>睿立業務系統</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome 圖標 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS Client CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cosmic: {
                            950: '#060b19', 900: '#0a142c', 800: '#112246', 700: '#1a3160', 600: '#234280', 500: '#315cb5', 400: '#4c7cd4'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #060b19; color: #e2e8f0; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* 自訂滾動條 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #060b19; }
        ::-webkit-scrollbar-thumb { background: #1a3160; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #315cb5; }

        /* 📜 N版極致：專屬直式 A4 滿頁匯出與物理屏蔽排版優化 */
        @media print {
            @page {
                size: portrait A4;
                margin: 10mm !important;
            }
            html, body {
                background: #ffffff !important;
                color: #000000 !important;
                overflow: visible !important;
                height: auto !important;
                width: 100% !important;
                font-size: 12pt !important;
            }
            aside, header, .no-print, input[type="file"], button, #login-overlay, #trash-modal, #rotate-hint, #delete-modal {
                display: none !important;
            }
            main {
                padding: 0 !important;
                margin: 0 !important;
                overflow: visible !important;
                display: block !important;
                background: transparent !important;
            }
            .print-container { 
                width: 100% !important; 
                max-width: 100% !important;
                background: #ffffff !important; 
                color: #000000 !important; 
                padding: 0 !important;
                box-shadow: none !important;
                border: none !important;
                display: block !important;
            }
            .card-box {
                background: #ffffff !important;
                border: 1px solid #000000 !important;
                color: #000000 !important;
                padding: 12px !important;
                border-radius: 6px !important;
                box-shadow: none !important;
                page-break-inside: avoid !important;
                margin-bottom: 12px !important;
            }
            input, select, textarea { 
                background: transparent !important; 
                color: #000000 !important; 
                border: none !important; 
                border-bottom: 1px solid #444444 !important;
                border-radius: 0 !important;
                padding: 2px 4px !important;
                font-weight: bold !important;
                box-shadow: none !important;
                outline: none !important;
            }
            textarea {
                height: auto !important;
                overflow: visible !important;
                resize: none !important;
            }
            .text-white, .text-slate-300, .text-slate-400, .text-amber-300, .text-amber-400, .text-cyan-400, .text-emerald-400, .text-purple-300, .text-purple-400, .text-indigo-300, .text-indigo-400, .text-teal-400, .text-sky-400, .text-violet-400, label { 
                color: #000000 !important; 
                -webkit-text-fill-color: #000000 !important;
                opacity: 1 !important;
                display: inline-block !important;
                font-weight: bold !important;
            }
            .bg-cosmic-950, .bg-cosmic-900, .bg-cosmic-800, .bg-cosmic-950\/40, .bg-cosmic-900\/60, .bg-cosmic-950\/60, .bg-cosmic-900\/30, .bg-cosmic-950\/80, .bg-cosmic-950\/50, .bg-cosmic-900\/80, .bg-cosmic-900\/30 {
                background: transparent !important;
            }
            footer {
                border-top: 1px solid #000000 !important;
                color: #000000 !important;
                margin-top: 20px !important;
                padding-top: 10px !important;
            }
            h3, h4 {
                color: #000000 !important;
                border-bottom: 1px solid #000000 !important;
                padding-bottom: 4px !important;
            }
        }

        /* 📱 手機直立時顯示旋轉提示 */
        #rotate-hint { display: none; }
        @media screen and (max-width: 932px) and (orientation: portrait) {
            #rotate-hint { display: flex; }
        }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <!-- 🔄 手機直拿時的旋轉提示 UX 設計 -->
    <div id="rotate-hint" class="fixed inset-0 bg-cosmic-950/95 z-50 flex-col items-center justify-center p-6 text-center no-print">
        <div class="w-16 h-16 bg-cyan-500/20 text-cyan-400 rounded-full flex items-center justify-center text-3xl mb-4 animate-bounce">
            🔄
        </div>
        <h3 class="text-lg font-bold text-white mb-2">請將手機轉為橫向以獲得最佳體驗</h3>
        <p class="text-xs text-slate-400">工廠法規政策顧問，培您轉型與體面退場</p>
    </div>

    <!-- 🔒 全螢幕獨立登入門檻遮罩 -->
    <div id="login-overlay" class="fixed inset-0 bg-cosmic-950 z-50 flex items-center justify-center p-4">
        <div class="bg-cosmic-900 border border-cosmic-700/60 rounded-3xl p-8 w-full max-w-md shadow-2xl space-y-6 text-center">
            <div class="w-16 h-16 bg-gradient-to-tr from-cosmic-500 to-cyan-400 rounded-2xl flex items-center justify-center shadow-lg mx-auto">
                <i class="fa-solid fa-user-lock text-white text-2xl"></i>
            </div>
            
            <div>
                <h2 class="text-2xl font-bold tracking-wide text-white">睿立系統登入</h2>
                <p class="text-xs text-slate-400 mt-2">請選擇身份並輸入個人密碼以存取資料</p>
            </div>

            <div class="space-y-4 text-left">
                <div>
                    <label class="text-xs text-slate-400 block mb-1">登入權限身份：</label>
                    <select id="login-role" class="w-full bg-cosmic-950 border border-cosmic-700 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-cyan-400">
                        <option value="黃逸豪" class="bg-cosmic-900">黃逸豪</option>
                        <option value="中央控台" class="bg-cosmic-900">中央控台</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs text-slate-400 block mb-1">密碼：</label>
                    <input type="password" id="login-pass" placeholder="請輸入密碼" onkeydown="if(event.key==='Enter') handleRoleLogin()" class="w-full bg-cosmic-950 border border-cosmic-700 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-cyan-400 tracking-widest">
                </div>
            </div>

            <button onclick="handleRoleLogin()" class="w-full bg-gradient-to-r from-cosmic-500 to-cyan-500 hover:from-cosmic-400 hover:to-cyan-400 text-white font-bold py-3.5 rounded-xl shadow-lg transition duration-200">
                驗證登入
            </button>
        </div>
    </div>

    <!-- LEFT SIDEBAR -->
    <aside class="w-72 bg-cosmic-900 border-r border-cosmic-700/50 flex flex-col justify-between shrink-0 select-none">
        <div>
            <div class="p-6 border-b border-cosmic-700/30 flex items-center space-x-3">
                <div class="w-10 h-10 bg-gradient-to-tr from-cosmic-500 to-cyan-400 rounded-xl flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-folder-tree text-white text-lg"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-wider text-white">睿立集團</h1>
                    <p class="text-xs text-slate-400">RUILI SYSTEM N</p>
                </div>
            </div>

            <!-- 五大軌道 -->
            <nav class="p-4 space-y-1.5 overflow-y-auto max-h-[calc(100vh-240px)]">
                <div>
                    <button onclick="toggleCategory('case-eval')" class="w-full flex items-center justify-between px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-folder-open w-5 text-center text-cyan-400"></i>
                            <span class="font-medium text-sm tracking-wide">專案管理</span>
                        </div>
                        <i id="arrow-case-eval" class="fa-solid fa-chevron-down text-xs text-slate-500"></i>
                    </button>
                    <div id="sub-list-case-eval" class="hidden pl-9 pr-2 mt-1 space-y-1 border-l border-cosmic-700/40 ml-6"></div>
                </div>

                <div>
                    <button onclick="toggleCategory('solar')" class="w-full flex items-center justify-between px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-solar-panel w-5 text-center text-amber-400"></i>
                            <span class="font-medium text-sm tracking-wide">太陽能自建</span>
                        </div>
                        <i id="arrow-solar" class="fa-solid fa-chevron-down text-xs text-slate-500"></i>
                    </button>
                    <div id="sub-list-solar" class="hidden pl-9 pr-2 mt-1 space-y-1 border-l border-cosmic-700/40 ml-6"></div>
                </div>

                <div>
                    <button onclick="toggleCategory('trading')" class="w-full flex items-center justify-between px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-building-circle-arrow-right w-5 text-center text-emerald-400"></i>
                            <span class="font-medium text-sm tracking-wide">工廠買賣案件資料表</span>
                        </div>
                        <i id="arrow-trading" class="fa-solid fa-chevron-down text-xs text-slate-500"></i>
                    </button>
                    <div id="sub-list-trading" class="hidden pl-9 pr-2 mt-1 space-y-1 border-l border-cosmic-700/40 ml-6"></div>
                </div>

                <div>
                    <button onclick="toggleCategory('meeting')" class="w-full flex items-center justify-between px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-handshake w-5 text-center text-purple-400"></i>
                            <span class="font-medium text-sm tracking-wide">會議記錄</span>
                        </div>
                        <i id="arrow-meeting" class="fa-solid fa-chevron-down text-xs text-slate-500"></i>
                    </button>
                    <div id="sub-list-meeting" class="hidden pl-9 pr-2 mt-1 space-y-1 border-l border-cosmic-700/40 ml-6"></div>
                </div>

                <div>
                    <button onclick="toggleCategory('internal-meet')" class="w-full flex items-center justify-between px-4 py-3 rounded-xl transition text-slate-300 hover:bg-cosmic-800/60">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-comments w-5 text-center text-indigo-400"></i>
                            <span class="font-medium text-sm tracking-wide">睿立會議紀錄</span>
                        </div>
                        <i id="arrow-internal-meet" class="fa-solid fa-chevron-down text-xs text-slate-500"></i>
                    </button>
                    <div id="sub-list-internal-meet" class="hidden pl-9 pr-2 mt-1 space-y-1 border-l border-cosmic-700/40 ml-6"></div>
                </div>
            </nav>
        </div>

        <!-- 股東端專用：資源回收桶按鈕 -->
        <div id="trash-bin-button-container" class="p-4 border-t border-cosmic-700/30 hidden">
            <button onclick="openTrashModal()" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-semibold py-2.5 px-4 rounded-xl flex items-center justify-center space-x-2 border border-slate-600 transition">
                <i class="fa-solid fa-trash-arrow-up text-amber-400"></i>
                <span>資源回收桶 (一鍵復原)</span>
            </button>
        </div>
    </aside>

    <!-- MAIN VIEWPORT -->
    <main class="flex-1 flex flex-col overflow-hidden bg-cosmic-950">
        <!-- TOP BAR -->
        <header class="h-16 border-b border-cosmic-700/40 px-4 md:px-8 flex items-center justify-between shrink-0 bg-cosmic-900/40 backdrop-blur-md z-10 no-print overflow-x-auto gap-2">
            <div class="flex items-center space-x-3 shrink-0">
                <input type="text" id="global-search" oninput="filterCases()" placeholder="按公司或會議主題關鍵字篩選..." class="w-48 md:w-64 bg-cosmic-950 border border-cosmic-700 rounded-xl px-4 py-1.5 text-sm text-white focus:outline-none">
                
                <!-- 已登入使用者提示資訊 -->
                <div id="current-user-badge" class="hidden flex items-center space-x-2 bg-cosmic-950/80 border border-cyan-500/50 px-3 py-1 rounded-xl text-xs text-cyan-400 shrink-0">
                    <i class="fa-solid fa-user-shield"></i>
                    <span>已登入：<strong id="user-display-name" class="text-white"></strong></span>
                    <button onclick="handleLogout()" class="ml-2 text-red-400 hover:text-red-300 text-[11px] underline">登出</button>
                </div>

                <!-- 🔄 自動同步狀態提示徽章 -->
                <div id="sync-status-badge" class="hidden flex items-center space-x-1.5 text-xs px-2.5 py-1 rounded-lg bg-cosmic-900 border border-cosmic-700 text-slate-400">
                    <i id="sync-icon" class="fa-solid fa-cloud"></i>
                    <span id="sync-text">已連線</span>
                </div>
            </div>

            <!-- 右側功能按鈕 -->
            <div class="flex items-center space-x-2 md:space-x-3 shrink-0">
                <button onclick="addNewCase()" class="bg-gradient-to-r from-cosmic-500 to-blue-600 text-white text-xs font-semibold px-3 md:px-4 py-2 rounded-xl flex items-center space-x-1.5 shadow-md hover:opacity-90 transition shrink-0 whitespace-nowrap">
                    <i class="fa-solid fa-plus"></i><span>新增案件</span>
                </button>
                <button onclick="deleteCurrentCase()" class="bg-red-600 hover:bg-red-500 text-white text-xs font-semibold px-3 md:px-4 py-2 rounded-xl flex items-center space-x-1.5 shadow-md transition shrink-0 whitespace-nowrap">
                    <i class="fa-solid fa-trash-can"></i><span>刪除案件</span>
                </button>
                <button onclick="window.print()" class="bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white text-xs font-semibold px-3 md:px-4 py-2 rounded-xl flex items-center shadow-lg transition shrink-0 whitespace-nowrap">
                    <i class="fa-solid fa-print mr-1.5"></i> 一鍵匯出/列印
                </button>
                <button onclick="saveToCloud()" class="bg-emerald-600 text-white text-xs font-semibold px-3 md:px-4 py-2 rounded-xl hover:bg-emerald-500 transition shrink-0 whitespace-nowrap">
                    儲存
                </button>
            </div>
        </header>

        <!-- ROUTING CONTENT -->
        <div class="flex-1 overflow-y-auto p-8 flex justify-center">
            <div class="w-full max-w-5xl print-container">
                <section id="tab-case-eval" class="tab-content active"><div id="case-eval-container" class="space-y-6"></div></section>
                <section id="tab-solar" class="tab-content"><div id="solar-container" class="space-y-6"></div></section>
                <section id="tab-trading" class="tab-content"><div id="trading-container" class="space-y-6"></div></section>
                <section id="tab-meeting" class="tab-content"><div id="meeting-container" class="space-y-6"></div></section>
                <section id="tab-internal-meet" class="tab-content"><div id="internal-meet-container" class="space-y-6"></div></section>
            </div>
        </div>
    </main>

    <!-- 自訂刪除案件確認彈窗 -->
    <div id="delete-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden flex items-center justify-center no-print">
        <div class="bg-cosmic-900 border border-cosmic-700 rounded-2xl p-6 w-96 shadow-2xl space-y-5 text-center">
            <div class="w-12 h-12 bg-red-500/20 text-red-500 rounded-full flex items-center justify-center mx-auto text-xl">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <h3 class="text-base font-bold text-white">確定要刪除嗎？</h3>
            <p class="text-xs text-slate-400" id="delete-target-text">刪除後資料將無法復原。</p>
            <div class="flex justify-center space-x-3 pt-2">
                <button onclick="confirmDeleteCase()" class="bg-red-600 hover:bg-red-500 text-white text-xs font-bold px-5 py-2 rounded-xl transition">確認</button>
                <button onclick="closeDeleteModal()" class="bg-slate-700 hover:bg-slate-600 text-white text-xs font-bold px-5 py-2 rounded-xl transition">取消</button>
            </div>
        </div>
    </div>

    <!-- 股東端專用：資源回收桶 Modal -->
    <div id="trash-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4 no-print">
        <div class="bg-cosmic-900 border border-cosmic-700 rounded-2xl p-6 w-full max-w-2xl shadow-2xl space-y-4">
            <div class="flex justify-between items-center border-b border-cosmic-700/50 pb-3">
                <h3 class="text-base font-bold text-white flex items-center space-x-2">
                    <i class="fa-solid fa-trash-arrow-up text-amber-400"></i>
                    <span>資源回收桶 (業務已刪除案件列表)</span>
                </h3>
                <button onclick="closeTrashModal()" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div id="trash-items-list" class="space-y-2 max-h-96 overflow-y-auto pr-1"></div>
            <div class="text-right pt-2 border-t border-cosmic-700/30">
                <button onclick="closeTrashModal()" class="bg-slate-700 hover:bg-slate-600 text-white text-xs font-bold px-4 py-2 rounded-xl transition">關閉</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== Supabase 設定與初始化 ====================
        const SUPABASE_URL = "https://mfgfifcyhxeqjyeaokub.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_b712iObCqLZeepWP9SVQaA__Rg2_PTj";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUserRole = "黃逸豪";

        let caseEvalData = [];
        let solarData = [];
        let tradingData = [];
        let meetingData = [];
        let internalMeetData = [];

        let selectedIds = { "case-eval": null, "solar": null, "trading": null, "meeting": null, "internal-meet": null };
        let currentActiveTab = "case-eval";

        const managersList = ["樊靖畇", "鄭家承", "陳宥騰", "楊裕憲", "楊淯淳", "黃逸豪"];
        const statusConfig = { "初期評估": "bg-emerald-500", "已報價": "bg-blue-500", "準備簽約": "bg-amber-500", "已簽約": "bg-red-500", "結案": "bg-purple-500", "沒下文": "bg-slate-600" };

        // ⏱️ 防抖與打斷自動防護計時器
        let autoSaveTimer = null;
        let isUserTyping = false;

        // 📐 自動延伸 Textarea 高度函數
        function autoResizeTextarea(el) {
            if (!el) return;
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        }

        function setSyncBadgeStatus(state, text) {
            const badge = document.getElementById('sync-status-badge');
            const icon = document.getElementById('sync-icon');
            const label = document.getElementById('sync-text');
            if(!badge) return;
            badge.classList.remove('hidden');
            
            if (state === 'saving') {
                icon.className = 'fa-solid fa-spinner animate-spin text-amber-400';
                label.innerText = text || '雲端同步中...';
                label.className = 'text-amber-400 font-medium';
            } else if (state === 'saved') {
                icon.className = 'fa-solid fa-cloud-check text-emerald-400';
                label.innerText = text || '資料已同步';
                label.className = 'text-emerald-400 font-medium';
            } else if (state === 'error') {
                icon.className = 'fa-solid fa-triangle-exclamation text-red-400';
                label.innerText = text || '同步失敗';
                label.className = 'text-red-400 font-medium';
            } else {
                icon.className = 'fa-solid fa-cloud text-slate-400';
                label.innerText = text || '已連線';
                label.className = 'text-slate-400';
            }
        }

        // 🛡️ 第二步優化：具備 Debounce 防抖與自動儲存防護
        function triggerAutoSave() {
            isUserTyping = true;
            setSyncBadgeStatus('saving', '編輯中...');
            
            if (autoSaveTimer) clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(async () => {
                await saveToCloudSilent();
                isUserTyping = false;
                setSyncBadgeStatus('saved', '雲端已同步');
            }, 800); // 停止輸入 0.8 秒後自動寫入資料庫
        }

        function handleRoleLogin() {
            const role = document.getElementById('login-role').value;
            const pass = document.getElementById('login-pass').value;
            
            if ((role === '黃逸豪' && pass === '8888') || (role === '中央控台' && pass === '9999')) {
                currentUserRole = role;
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('login-pass').value = '';
                
                document.getElementById('user-display-name').innerText = role;
                document.getElementById('current-user-badge').classList.remove('hidden');

                const trashBtn = document.getElementById('trash-bin-button-container');
                if (trashBtn) {
                    if (role === '中央控台') trashBtn.classList.remove('hidden');
                    else trashBtn.classList.add('hidden');
                }

                initSupabaseRealtime();
                fetchSupabaseData();
            } else {
                alert("密碼不正確，無法進入系統！");
            }
        }

        function handleLogout() {
            document.getElementById('login-overlay').classList.remove('hidden');
            document.getElementById('current-user-badge').classList.add('hidden');
        }

        function toggleCategory(catId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            ["case-eval", "solar", "trading", "meeting", "internal-meet"].forEach(id => {
                document.getElementById(`sub-list-${id}`)?.classList.add('hidden');
            });
            document.getElementById(`sub-list-${catId}`)?.classList.remove('hidden');
            currentActiveTab = catId;
            document.getElementById(`tab-${catId}`)?.classList.add('active');
            renderSidebarSubLists(); renderMainForms();
        }

        function getTargetDataArray(tabId) {
            if (tabId === 'case-eval') return caseEvalData;
            if (tabId === 'solar') return solarData;
            if (tabId === 'trading') return tradingData;
            if (tabId === 'meeting') return meetingData;
            if (tabId === 'internal-meet') return internalMeetData;
            return [];
        }

        function isCaseBelongsToUser(caseObj, userName) {
            if (currentUserRole === '中央控台') return true;
            if (caseObj.evalManager === userName || caseObj.solarManager === userName || caseObj.manager === userName) return true;
            if (caseObj.ruiliAttendees && caseObj.ruiliAttendees.includes(userName)) return true;
            if (caseObj.attendees && caseObj.attendees.includes(userName)) return true;
            return false;
        }

        function renderSidebarSubLists() {

                const container = document.getElementById(`sub-list-${tabId}`);
                if (!container) return;
                let dataArr = getTargetDataArray(tabId);

                if (currentUserRole !== '中央控台') {
                    dataArr = dataArr.filter(c => !c.is_deleted && isCaseBelongsToUser(c, currentUserRole));

                container.innerHTML = dataArr.map(c => {

                    if (c.is_deleted) {

                        deletedBadge = `<span class="ml-1 text-[10px] bg-slate-700 text-slate-300 px-1 py-0.5 rounded border border-slate-600">[業務已刪除 ${delTime}]</span>`;

        function filterCases() {
            const query = document.getElementById('global-search').value.toLowerCase();
            const container = document.getElementById(`sub-list-${currentActiveTab}`);
            if (!container) return;
            let dataArr = getTargetDataArray(currentActiveTab);
            if (currentUserRole !== '中央控台') {
                dataArr = dataArr.filter(c => !c.is_deleted && isCaseBelongsToUser(c, currentUserRole));
            }
            container.innerHTML = dataArr.filter(c => {
                const name = c.companyName || c.meetSubject || '';
                return name.toLowerCase().includes(query);
            }).map(c => {
                let deletedBadge = '';
                if (c.is_deleted) {
                    const delTime = c.deleted_at ? new Date(c.deleted_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';

        function renderMainForms() {
            let dataArr = getTargetDataArray(currentActiveTab);
            if (currentUserRole !== '中央控台') {
                dataArr = dataArr.filter(c => !c.is_deleted && isCaseBelongsToUser(c, currentUserRole));
            }

            if (!selectedIds[currentActiveTab] && dataArr.length > 0) {
                selectedIds[currentActiveTab] = dataArr[0].id;
            }

            const activeCase = dataArr.find(c => c.id === selectedIds[currentActiveTab]) || dataArr[0];
            const container = document.getElementById(currentActiveTab + "-container");
            if (!container) return;

            if (!activeCase) { container.innerHTML = "<p class='text-xs text-slate-500 p-4'>暫無項目。</p>"; return; }

            if (currentActiveTab === 'case-eval') {
                if (activeCase.city === undefined) activeCase.city = "高雄市";
                if (activeCase.region === undefined) activeCase.region = "岡山區";
                if (!activeCase.clientFilesObj) activeCase.clientFilesObj = [];
                if (!activeCase.ruiliFilesObj) activeCase.ruiliFilesObj = [];
                if (!activeCase.services) activeCase.services = [];
                container.innerHTML = generateCaseEvalHTML(activeCase);
            } else if (currentActiveTab === 'solar') {
                if (!activeCase.lands) activeCase.lands = [];
                if (!activeCase.buildingsLegal) activeCase.buildingsLegal = [];
                if (!activeCase.buildingsIllegal) activeCase.buildingsIllegal = [];
                if (!activeCase.solarServices) activeCase.solarServices = [];
                if (!activeCase.customDocsClient) activeCase.customDocsClient = [];
                if (!activeCase.customDocsRuili) activeCase.customDocsRuili = [];
                if (!activeCase.clientFilesObj) activeCase.clientFilesObj = [];
                if (!activeCase.ruiliFilesObj) activeCase.ruiliFilesObj = [];
                container.innerHTML = generateSolarHTML(activeCase);
                calculateSolarLive(activeCase.id);
            } else if (currentActiveTab === 'trading') {
                container.innerHTML = generateTradingHTML(activeCase);
            } else if (currentActiveTab === 'meeting') {
                if (!activeCase.ruiliAttendees) activeCase.ruiliAttendees = [];
                if (!activeCase.externalRepresentatives) activeCase.externalRepresentatives = [];
                if (!activeCase.contents) activeCase.contents = [];
                if (!activeCase.uploadedFiles) activeCase.uploadedFiles = [];
                container.innerHTML = generateMeetingHTML(activeCase);
            } else if (currentActiveTab === 'internal-meet') {
                if (!activeCase.attendees) activeCase.attendees = [];
                if (!activeCase.caseReports) activeCase.caseReports = [];
                if (!activeCase.proposalReports) activeCase.proposalReports = [];
                if (!activeCase.uploadedFiles) activeCase.uploadedFiles = [];
                container.innerHTML = generateInternalMeetHTML(activeCase);
            }

            // 自動適應全部 Textarea 高度
            setTimeout(() => {
                container.querySelectorAll('textarea').forEach(el => autoResizeTextarea(el));
            }, 0);
        }

        function previewFileUrl(url, fileName) {
            if (!url) {
                alert("目前檔案尚未有雲端完整 URL，無法開啟。");
                return;
            }
            const ext = (fileName || '').split('.').pop().toLowerCase();
            if (['jpg', 'jpeg', 'png', 'gif', 'webp', 'pdf'].includes(ext)) {
                window.open(url, '_blank');
            } else {
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName || 'download';
                a.target = '_blank';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }
        }

        function renderDownloadBtnHTML(fileUrl, fileName) {
            return `<button onclick="previewFileUrl('${fileUrl||''}', '${fileName||''}')" class="text-cyan-400 hover:text-cyan-300 text-xs mr-2 border border-cyan-500/40 px-2 py-0.5 rounded bg-cosmic-950 no-print" title="點擊下載/開啟檔案"><i class="fa-solid fa-download mr-1"></i>下載</button>`;
        }

        // 📂 拖曳檔案通用處理解析器
        function handleDragOver(e) {
            e.preventDefault();
            e.stopPropagation();
            e.currentTarget.classList.add('border-cyan-400', 'bg-cosmic-900/90');
        }

        function handleDragLeave(e) {
            e.preventDefault();
            e.stopPropagation();
            e.currentTarget.classList.remove('border-cyan-400', 'bg-cosmic-900/90');
        }

        async function handleDropFile(e, id, type, side) {
            e.preventDefault();
            e.stopPropagation();
            e.currentTarget.classList.remove('border-cyan-400', 'bg-cosmic-900/90');

            const files = e.dataTransfer.files;
            if (!files || files.length === 0) return;

            const dummyInput = { files: files };
            if (type === 'project') {
                await handleProjectFileUpload(dummyInput, id, side);
            } else if (type === 'solar') {
                await handleSolarFileUpload(dummyInput, id, side);
            } else if (type === 'meeting') {
                await handleExternalMeetingUpload(dummyInput, id);
            } else if (type === 'internal-meet') {
                await handleRuiliMeetUpload(dummyInput, id);
            }
        }

        async function uploadFileToSupabaseStorage(file) {
            try {
                // 1. 安全檔名清洗（Clean Filename）：過濾 Emoji、中文標點與特殊字元
                const rawExtension = file.name.includes('.') ? file.name.split('.').pop() : '';
                const baseName = file.name.includes('.') ? file.name.substring(0, file.name.lastIndexOf('.')) : file.name;
                
                // 僅保留字母、數字、點、底線、減號，其他一律轉為底線
                let cleanBase = baseName.replace(/[^a-zA-Z0-9.\-_]/g, '_').replace(/_+/g, '_');
                if (!cleanBase || cleanBase === '_') cleanBase = 'file';
                
                const cleanExt = rawExtension.replace(/[^a-zA-Z0-9]/g, '');
                const safeFileName = cleanExt ? `${cleanBase}.${cleanExt}` : cleanBase;

                // 2. 建立唯一路徑
                const uniqueId = (typeof crypto !== 'undefined' && crypto.randomUUID) 
                    ? crypto.randomUUID() 
                    : Math.random().toString(36).substring(2, 10);
                
                const filePath = `uploads/${Date.now()}_${uniqueId}_${safeFileName}`;
                
                // 3. 上傳至 Supabase Storage
                const { data, error } = await supabaseClient.storage.from('ruili-files').upload(filePath, file);
                if (error) {
                    console.error("Storage Error:", error);
                    return URL.createObjectURL(file);
                }
                
                // 4. 取得公開存取網址
                const { data: publicData } = supabaseClient.storage.from('ruili-files').getPublicUrl(filePath);
                return publicData.publicUrl;
            } catch (err) {
                console.error("Upload error:", err);
                return URL.createObjectURL(file);
            }
        }

        function calculateSolarLive(id) {
            const activeCase = solarData.find(c => c.id === id);
            if (!activeCase) return;
            const estPing = parseFloat(activeCase.estPing || 0);
            const estPrice = parseFloat(activeCase.estPrice || 3.5);
            const resEst1 = Math.round((estPing / 1.5) * 590 / 1000 * 4 * 365 * estPrice);
            const resEst2 = Math.round(resEst1 * 0.1);
            const estRentUnit = parseFloat(activeCase.estRentUnit || 0);
            const resEst3 = Math.round(estPing * estRentUnit);

            if(document.getElementById(`res-est-1-${id}`)) document.getElementById(`res-est-1-${id}`).innerText = resEst1.toLocaleString();
            if(document.getElementById(`res-est-2-${id}`)) document.getElementById(`res-est-2-${id}`).innerText = resEst2.toLocaleString();
            if(document.getElementById(`res-est-3-${id}`)) document.getElementById(`res-est-3-${id}`).innerText = resEst3.toLocaleString();

            const surPanels = parseFloat(activeCase.surveyPanels || 0);
            const surWatts = parseFloat(activeCase.surveyWatts || 0);
            const surPrice = parseFloat(activeCase.surveyPrice || 0);
            const resSurKwh = Math.round(surPanels * surWatts / 1000 * 4 * 365);
            const resSur1 = Math.round(resSurKwh * surPrice);
            const resSur2 = Math.round(resSur1 * 0.1);
            const surBill = parseFloat(activeCase.surveyBill || 0);
            const resSur3 = Math.round(resSur1 - surBill - resSur2);

            if(document.getElementById(`res-sur-kwh-${id}`)) document.getElementById(`res-sur-kwh-${id}`).innerText = resSurKwh.toLocaleString();
            if(document.getElementById(`res-sur-1-${id}`)) document.getElementById(`res-sur-1-${id}`).innerText = resSur1.toLocaleString();
            if(document.getElementById(`res-sur-2-${id}`)) document.getElementById(`res-sur-2-${id}`).innerText = resSur2.toLocaleString();
            if(document.getElementById(`res-sur-3-${id}`)) document.getElementById(`res-sur-3-${id}`).innerText = resSur3.toLocaleString();
        }

        }

        async function saveToCloud() {
            setSyncBadgeStatus('saving', '手動儲存中...');
            await saveToCloudSilent();
            setSyncBadgeStatus('saved', '雲端已儲存');
            alert("資料已手動儲存！");
        }

        // ==================== 回收桶與一鍵復原機制 ====================
        function openTrashModal() {
            const trashContainer = document.getElementById('trash-items-list');
            let allDeletedCases = [];

            ["case-eval", "solar", "trading", "meeting", "internal-meet"].forEach(tabId => {
                const arr = getTargetDataArray(tabId);
                arr.filter(c => c.is_deleted).forEach(c => {
                    allDeletedCases.push({ ...c, tabId });
                });
            });

            if (allDeletedCases.length === 0) {
                trashContainer.innerHTML = `<p class="text-xs text-slate-500 py-4 text-center">回收桶目前是空的。</p>`;
            } else {
                trashContainer.innerHTML = allDeletedCases.map(item => `
                    <div class="flex items-center justify-between bg-cosmic-950 p-3 rounded-xl border border-cosmic-700/50 text-xs">
                        <div>
                            <span class="font-bold text-white mr-2">${item.companyName || item.meetSubject || '未命名案件'}</span>
                            <span class="text-[10px] text-slate-400 bg-cosmic-800 px-2 py-0.5 rounded border border-cosmic-700">類別: ${item.tabId}</span>
                            <span class="text-[10px] text-slate-500 block mt-1">刪除時間: ${item.deleted_at ? new Date(item.deleted_at).toLocaleString() : '未知'}</span>
                        </div>
                        <button onclick="restoreCase('${item.id}', '${item.tabId}')" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-3 py-1.5 rounded-lg text-xs transition">
                            <i class="fa-solid fa-rotate-left mr-1"></i>一鍵復原
                        </button>
                    </div>
                `).join('');
            }

            document.getElementById('trash-modal').classList.remove('hidden');
        }

        function closeTrashModal() {
            document.getElementById('trash-modal').classList.add('hidden');
        }

        async function restoreCase(id, tabId) {
            const dataArr = getTargetDataArray(tabId);
            const target = dataArr.find(c => c.id === id);
            if (target) {
                target.is_deleted = false;
                target.deleted_at = null;
                await supabaseClient.from('cases').upsert({
                    id: target.id,
                    tab_category: tabId,
                    data: target,
                    is_deleted: false,
                    deleted_at: null
                });
                renderSidebarSubLists();
                renderMainForms();
                openTrashModal();
            }
        }

        // ==================== Supabase 資料載入與 第一步：優化 Realtime 靜默更新 ====================
        async function fetchSupabaseData(silent = false) {
            const { data, error } = await supabaseClient.from('cases').select('*');
            if (error) {
                console.error("Fetch Supabase Error:", error);
                return;
            }
            if (data) {
                caseEvalData = []; solarData = []; tradingData = []; meetingData = []; internalMeetData = [];
                data.forEach(row => {
                    const caseObj = { ...row.data, is_deleted: row.is_deleted, deleted_at: row.deleted_at };
                    if (row.tab_category === 'case-eval') caseEvalData.push(caseObj);
                    else if (row.tab_category === 'solar') solarData.push(caseObj);
                    else if (row.tab_category === 'trading') tradingData.push(caseObj);
                    else if (row.tab_category === 'meeting') meetingData.push(caseObj);
                    else if (row.tab_category === 'internal-meet') internalMeetData.push(caseObj);
                });
                
                // 🛡️ 防護 1：始終更新左側目錄選單（確保最新案件清單同步）
                renderSidebarSubLists();

                // 🛡️ 防護 2：如果使用者正在輸入打字、或表單中有輸入框處於 active 焦點狀態，避開表單強行重繪
                const activeTag = document.activeElement ? document.activeElement.tagName.toLowerCase() : '';
                const isFormFocused = ['input', 'textarea', 'select'].includes(activeTag);

                if (!silent && !isUserTyping && !isFormFocused) {
                    renderMainForms();
                }
            }
        }

        function initSupabaseRealtime() {
            supabaseClient
                .channel('schema-db-changes')
                .on(
                    'postgres_changes',
                    { event: '*', schema: 'public', table: 'cases' },
                    (payload) => {
                        // 靜默拉取最新資料，不干擾使用者當前游標與輸入動作
                        fetchSupabaseData(true);
                    }
                )
                .subscribe();
        }

        window.onload = function() {
            renderSidebarSubLists();
            renderMainForms();
        };
    </script>
</body>
</html>
